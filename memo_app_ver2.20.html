<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1814;--bg2:#211f1b;--bg3:#2a2722;
  --surface:#302d27;--surface2:#3a3730;
  --accent:#c8a96e;--text:#e8e0d0;--text2:#a09880;--text3:#706858;
  --border:#3f3b34;--danger:#c06040;
  --font-body:'Georgia',serif;--font-ui:'Courier New',monospace;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font-body)}
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
#sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
#sidebar-header{padding:12px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.sh-row{display:flex;align-items:center;justify-content:space-between;gap:6px}
.sh-title{font-family:var(--font-ui);font-size:10px;letter-spacing:2px;color:var(--text2);text-transform:uppercase}
.sh-btn{background:none;border:1px solid var(--border);color:var(--text2);font-size:10px;padding:3px 7px;cursor:pointer;font-family:var(--font-ui);letter-spacing:1px;transition:all .2s;white-space:nowrap}
.sh-btn:hover{border-color:var(--accent);color:var(--accent)}
#folder-status{font-family:var(--font-ui);font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#folder-status.ok{color:#7ec8a8}
#tree{flex:1;overflow-y:auto;padding:8px 0}
#tree::-webkit-scrollbar{width:3px}
#tree::-webkit-scrollbar-thumb{background:var(--border)}
.folder-item{user-select:none}
.folder-row{display:flex;align-items:center;padding:5px 10px 5px 12px;cursor:pointer;gap:6px;transition:background .15s}
.folder-row:hover{background:var(--surface)}
.folder-row.selected{background:var(--surface)}
.folder-color-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.folder-arrow{font-size:8px;color:var(--text3);transition:transform .2s;width:10px;text-align:center;flex-shrink:0}
.folder-arrow.open{transform:rotate(90deg)}
.folder-name{font-family:var(--font-ui);font-size:12px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.folder-name-input{font-family:var(--font-ui);font-size:12px;background:var(--bg3);border:1px solid var(--accent);color:var(--text);padding:1px 4px;width:100%;outline:none}
.folder-actions{display:none;gap:3px;align-items:center;flex-shrink:0}
.folder-row:hover .folder-actions{display:flex}
.f-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:11px;padding:2px 3px;font-family:var(--font-ui);transition:color .15s;line-height:1}
.f-btn:hover{color:var(--accent)}
.f-btn.del:hover{color:var(--danger)}
.file-list{padding-left:20px}
.file-item{display:flex;align-items:center;padding:4px 10px 4px 8px;cursor:pointer;gap:6px;font-family:var(--font-ui);font-size:11px;color:var(--text2);transition:background .15s}
.file-item:hover{background:var(--surface);color:var(--text)}
.file-item.active{background:var(--surface2);color:var(--accent)}
.file-icon{color:var(--text3);font-size:10px;flex-shrink:0}
.file-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file-actions{display:none;gap:3px;flex-shrink:0}
.file-item:hover .file-actions{display:flex}
.new-file-btn{display:block;text-align:center;padding:4px;font-family:var(--font-ui);font-size:10px;color:var(--text3);cursor:pointer;transition:all .15s;letter-spacing:1px;margin:2px 10px 2px 28px;border:1px dashed var(--border)}
.new-file-btn:hover{color:var(--accent);border-color:var(--accent)}

/* EDITOR */
#editor-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
#toolbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;flex-wrap:wrap}
#file-title{background:none;border:none;color:var(--text);font-family:var(--font-ui);font-size:13px;flex:1;min-width:80px;outline:none;letter-spacing:1px}
#file-title::placeholder{color:var(--text3)}
.tb-sep{width:1px;height:16px;background:var(--border);flex-shrink:0}
.tb-btn{background:none;border:1px solid transparent;color:var(--text2);font-family:var(--font-ui);font-size:11px;padding:3px 7px;cursor:pointer;letter-spacing:1px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tb-btn:hover{border-color:var(--border);color:var(--text)}
.tb-btn.active{border-color:var(--accent);color:var(--accent)}
#char-count{font-family:var(--font-ui);font-size:10px;color:var(--text3);white-space:nowrap;flex-shrink:0}
#char-count.warn{color:var(--danger)}

/* 通常スクロール型エディタ */
#editor-wrapper{flex:1;overflow:hidden;display:flex;flex-direction:column}
#editor-scroll{flex:1;overflow-y:auto;padding:32px 32px 80px 24px}
#editor-scroll::-webkit-scrollbar{width:3px}
#editor-scroll::-webkit-scrollbar-thumb{background:var(--border)}
#editor-content{
  max-width:860px;
  min-height:100%;
  outline:none;
  line-height:1.9;
  color:var(--text);
  caret-color:var(--accent);
  word-break:break-all;
}
#editor-content:empty:before{content:attr(data-placeholder);color:var(--text3);pointer-events:none}
.fs-sm{font-size:13px!important}
.fs-md{font-size:16px!important}
.fs-lg{font-size:21px!important}
#editor-content hr{border:none;border-top:1px solid var(--text3);margin:1em 0;display:block}
.editor-img{max-width:100%;border-radius:4px;margin:8px 0;display:block}

#empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:var(--text3);padding:40px}
#empty-state .big{font-size:40px;opacity:.15}
#empty-state p{font-family:var(--font-ui);font-size:11px;letter-spacing:2px;text-align:center;line-height:1.8}

/* COLOR PICKER */
#color-picker-popup{position:fixed;background:var(--bg3);border:1px solid var(--border);padding:8px;display:flex;gap:6px;z-index:100;box-shadow:0 4px 20px rgba(0,0,0,.6)}
.color-swatch{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color .15s}
.color-swatch:hover,.color-swatch.selected{border-color:var(--text2)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--bg3);border:1px solid var(--border);padding:28px;min-width:320px;max-width:480px;width:90%}
.modal h3{font-family:var(--font-ui);font-size:10px;letter-spacing:2px;color:var(--accent);margin-bottom:14px;text-transform:uppercase}
.modal p{font-size:13px;color:var(--text2);line-height:1.7}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;flex-wrap:wrap}
.modal-btn{background:none;border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-size:11px;padding:6px 14px;cursor:pointer;letter-spacing:1px;transition:all .15s}
.modal-btn:hover{border-color:var(--accent);color:var(--accent)}
.modal-btn.danger{border-color:var(--danger);color:var(--danger)}
.modal-btn.danger:hover{background:var(--danger);color:var(--bg)}
.modal-btn.primary{border-color:var(--accent);color:var(--accent)}
.modal-btn.primary:hover{background:var(--accent);color:var(--bg)}

#status-bar{background:var(--bg2);border-top:1px solid var(--border);padding:4px 14px;font-family:var(--font-ui);font-size:10px;color:var(--text3);display:flex;gap:14px;flex-shrink:0}
#status-saved{margin-left:auto;color:#7ec8a8}

/* SETUP */
#setup-screen{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center}
.setup-box{background:var(--bg3);border:1px solid var(--border);padding:40px;max-width:440px;width:90%;text-align:center}
.setup-box h1{font-family:var(--font-ui);font-size:13px;letter-spacing:3px;color:var(--accent);margin-bottom:8px;text-transform:uppercase}
.setup-box .sub{font-family:var(--font-ui);font-size:10px;color:var(--text3);margin-bottom:32px;letter-spacing:1px}
.setup-btn{display:block;width:100%;background:none;border:1px solid var(--border);color:var(--text2);font-family:var(--font-ui);font-size:11px;padding:14px;cursor:pointer;letter-spacing:2px;transition:all .2s;margin-bottom:12px;text-align:left}
.setup-btn:hover{border-color:var(--accent);color:var(--accent)}
.setup-btn .setup-btn-title{font-size:12px;color:var(--text);display:block;margin-bottom:4px}
.setup-btn .setup-btn-desc{font-size:10px;color:var(--text3);display:block;line-height:1.6}
.setup-note{font-family:var(--font-ui);font-size:10px;color:var(--text3);margin-top:16px;line-height:1.8}

/* SETTINGS MODAL */
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.settings-row:last-child{border-bottom:none}
.settings-label{font-family:var(--font-ui);font-size:11px;color:var(--text2)}
.settings-control{display:flex;gap:6px}
.settings-opt{background:none;border:1px solid var(--border);color:var(--text3);font-family:var(--font-ui);font-size:11px;padding:3px 10px;cursor:pointer;transition:all .15s}
.settings-opt:hover{border-color:var(--text2);color:var(--text)}
.settings-opt.active{border-color:var(--accent);color:var(--accent)}
</style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-box">
    <h1>Memo</h1>
    <div class="sub">ver 2.20</div>
    <button class="setup-btn" onclick="selectFolder()">
      <span class="setup-btn-title">📁 保存フォルダを選択して開始</span>
      <span class="setup-btn-desc">OneDrive・Dropbox等のフォルダに直接保存<br>クラウド同期が自動で行われます</span>
    </button>
    <button class="setup-btn" onclick="useBrowserStorage()">
      <span class="setup-btn-title">🌐 ブラウザ内に保存して開始</span>
      <span class="setup-btn-desc">フォルダ選択なしで即開始<br>ブラウザのデータ削除で消えることがあります</span>
    </button>
    <div class="setup-note">
      ※ フォルダ選択はChrome・Edge推奨<br>
      ※ デスクトップ/ダウンロード/ドキュメントはOS保護のため選択不可<br>
      ※ OneDrive内のフォルダを推奨
    </div>
  </div>
</div>

<div id="app" style="display:none">
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="sh-row">
        <span class="sh-title">Folders</span>
        <button class="sh-btn" onclick="createFolder()">＋ New</button>
      </div>
      <div id="folder-status">—</div>
      <div class="sh-row">
        <button class="sh-btn" onclick="exportZip()">↓ ZIP</button>
        <button class="sh-btn" onclick="showSaveModeModal()">📁 変更</button>
        <button class="sh-btn" onclick="showSettings()" title="設定">⚙</button>
      </div>
    </div>
    <div id="tree"></div>
  </div>

  <div id="editor-area">
    <div id="toolbar">
      <input id="file-title" placeholder="無題" maxlength="100">
      <div class="tb-sep"></div>
      <button class="tb-btn" id="fs-sm-btn" onclick="setFontSize('sm')">小</button>
      <button class="tb-btn" id="fs-md-btn" onclick="setFontSize('md')">中</button>
      <button class="tb-btn" id="fs-lg-btn" onclick="setFontSize('lg')">大</button>
      <div class="tb-sep"></div>
      <button class="tb-btn" onclick="insertHR()">— 区切り</button>
      <button class="tb-btn" onclick="triggerImageInsert()">⊞ 画像</button>
      <input type="file" id="img-input" accept="image/*" style="display:none" onchange="insertImage(event)">
      <div class="tb-sep"></div>
      <span id="char-count">0 / 50,000</span>
    </div>

    <div id="editor-wrapper">
      <div id="empty-state">
        <div class="big">✦</div>
        <p>フォルダを作成して<br>ファイルを追加してください</p>
      </div>
      <div id="editor-scroll" style="display:none">
        <div id="editor-content"
          contenteditable="true"
          data-placeholder="ここに入力…"
          oninput="handleInput()"
          onkeydown="handleKey(event)"></div>
      </div>
    </div>

    <div id="status-bar">
      <span id="status-file">—</span>
      <span id="status-folder">—</span>
      <span id="status-saved"></span>
    </div>
  </div>
</div>

<div id="color-picker-popup" style="display:none"></div>
<div id="modal-container"></div>

<script>
// ─── CONSTANTS ───
const FOLDER_COLORS=['#c8a96e','#7eb8c8','#a8c87e','#c87e9e','#c8907e','#8e7ec8','#7ec8a8','#c8c87e'];
const MAX_CHARS=50000;
// ① バージョン間でデータを共有するため固定キー名を使用
const LS_KEY='memo_app_data';
const LS_SETTINGS_KEY='memo_app_settings';

// ─── STATE ───
let rootDirHandle=null;
let useFS=false;
let data={folders:[],files:[]};
let settings={defaultFontSize:'sm'};
let activeFolderId=null;
let activeFileId=null;
let currentFontSize='sm';
let expandedFolders={};
let saveTimer=null;
let dirHandleCache={};

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

// ─── SETTINGS ───
function loadSettings(){
  try{
    const raw=localStorage.getItem(LS_SETTINGS_KEY);
    if(raw)settings=Object.assign(settings,JSON.parse(raw));
  }catch(e){}
}
function saveSettings(){
  localStorage.setItem(LS_SETTINGS_KEY,JSON.stringify(settings));
}

// ③ 設定モーダル
function showSettings(){
  const mc=document.getElementById('modal-container');mc.innerHTML='';
  const ov=document.createElement('div');ov.className='modal-overlay';
  ov.onclick=e=>{if(e.target===ov)mc.innerHTML='';};
  const box=document.createElement('div');box.className='modal';
  box.innerHTML=`<h3>設定</h3>`;

  const rows=document.createElement('div');

  // デフォルトフォントサイズ
  const r1=document.createElement('div');r1.className='settings-row';
  r1.innerHTML=`<span class="settings-label">デフォルト文字サイズ</span>`;
  const ctrl=document.createElement('div');ctrl.className='settings-control';
  ['sm','md','lg'].forEach(s=>{
    const label={sm:'小',md:'中',lg:'大'};
    const b=document.createElement('button');
    b.className='settings-opt'+(settings.defaultFontSize===s?' active':'');
    b.textContent=label[s];
    b.onclick=()=>{
      settings.defaultFontSize=s;
      saveSettings();
      ctrl.querySelectorAll('.settings-opt').forEach(el=>el.classList.remove('active'));
      b.classList.add('active');
    };
    ctrl.appendChild(b);
  });
  r1.appendChild(ctrl);
  rows.appendChild(r1);
  box.appendChild(rows);

  const btns=document.createElement('div');btns.className='modal-btns';
  const close=document.createElement('button');close.className='modal-btn primary';close.textContent='閉じる';
  close.onclick=()=>mc.innerHTML='';
  btns.appendChild(close);box.appendChild(btns);
  ov.appendChild(box);mc.appendChild(ov);
}

// ─── SETUP ───
async function selectFolder(){
  if(!('showDirectoryPicker' in window)){
    alert('このブラウザはFile System Access APIに対応していません。\nChrome または Edge をお使いください。');
    return;
  }
  try{
    rootDirHandle=await window.showDirectoryPicker({mode:'readwrite'});
    useFS=true;
    await loadFromFS();
    startApp();
  }catch(e){
    if(e.name!=='AbortError')alert('フォルダの選択に失敗しました: '+e.message);
  }
}

function useBrowserStorage(){
  useFS=false;
  loadFromLS();
  startApp();
}

function startApp(){
  document.getElementById('setup-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  updateFolderStatus();
  if(data.folders.length===0){
    const id=uid();
    data.folders.push({id,name:'メモ',color:FOLDER_COLORS[0]});
    expandedFolders[id]=true;
    saveMeta();
  }
  renderTree();
}

function showSaveModeModal(){
  const mc=document.getElementById('modal-container');mc.innerHTML='';
  const ov=document.createElement('div');ov.className='modal-overlay';
  ov.onclick=e=>{if(e.target===ov)mc.innerHTML='';};
  const box=document.createElement('div');box.className='modal';
  box.innerHTML=`<h3>保存先を変更</h3><p style="margin-bottom:12px">現在: ${useFS&&rootDirHandle?'📁 '+rootDirHandle.name:'🌐 ブラウザ内保存'}</p>`;
  const btns=document.createElement('div');btns.style.cssText='display:flex;flex-direction:column;gap:8px;margin-top:8px';
  if('showDirectoryPicker' in window){
    const b1=document.createElement('button');b1.className='modal-btn primary';
    b1.textContent='📁 フォルダを選択して切り替え';b1.style.textAlign='left';
    b1.onclick=async()=>{
      mc.innerHTML='';
      try{
        const h=await window.showDirectoryPicker({mode:'readwrite'});
        rootDirHandle=h;useFS=true;dirHandleCache={};
        await loadFromFS();
        activeFileId=null;activeFolderId=null;
        closeEditor();updateFolderStatus();renderTree();
      }catch(e){if(e.name!=='AbortError')alert('変更失敗: '+e.message);}
    };
    btns.appendChild(b1);
  }
  const b2=document.createElement('button');b2.className='modal-btn';
  b2.textContent='🌐 ブラウザ内保存に切り替え';b2.style.textAlign='left';
  b2.onclick=()=>{
    mc.innerHTML='';
    useFS=false;rootDirHandle=null;dirHandleCache={};
    loadFromLS();
    activeFileId=null;activeFolderId=null;
    closeEditor();updateFolderStatus();
    if(data.folders.length===0){
      const id=uid();
      data.folders.push({id,name:'メモ',color:FOLDER_COLORS[0]});
      expandedFolders[id]=true;saveMeta();
    }
    renderTree();
  };
  btns.appendChild(b2);
  const bc=document.createElement('button');bc.className='modal-btn';bc.textContent='キャンセル';
  bc.onclick=()=>mc.innerHTML='';
  btns.appendChild(bc);
  box.appendChild(btns);ov.appendChild(box);mc.appendChild(ov);
}

function updateFolderStatus(){
  const el=document.getElementById('folder-status');
  if(useFS&&rootDirHandle){el.textContent='📁 '+rootDirHandle.name;el.className='ok';}
  else{el.textContent='🌐 ブラウザ内保存';el.className='';}
}

// ─── LOCALSTORAGE ───
function loadFromLS(){
  const raw=localStorage.getItem(LS_KEY);
  if(raw)try{data=JSON.parse(raw);}catch(e){}
  if(!data.folders)data.folders=[];
  if(!data.files)data.files=[];
}
function saveToLS(){localStorage.setItem(LS_KEY,JSON.stringify(data));}

// ─── FILE SYSTEM ───
async function loadFromFS(){
  try{
    let metaText=null;
    try{
      const mh=await rootDirHandle.getFileHandle('_memo_meta.json');
      const f=await mh.getFile();metaText=await f.text();
    }catch(e){}
    if(metaText){
      const meta=JSON.parse(metaText);
      data.folders=meta.folders||[];data.files=meta.files||[];
      if(meta.expanded)expandedFolders=meta.expanded;
    }else{data={folders:[],files:[]};}
    for(const file of data.files){
      if(file.contentRef){
        try{
          const folder=data.folders.find(f=>f.id===file.folderId);if(!folder)continue;
          const dirH=await getOrCreateDirHandle(folder);
          const fh=await dirH.getFileHandle(file.contentRef);
          const f=await fh.getFile();file.content=await f.text();
        }catch(e){file.content='';}
      }
    }
  }catch(e){console.error('loadFromFS',e);data={folders:[],files:[]};}
}

async function getOrCreateDirHandle(folder){
  if(dirHandleCache[folder.id])return dirHandleCache[folder.id];
  const h=await rootDirHandle.getDirectoryHandle(sanitize(folder.name)||'folder_'+folder.id,{create:true});
  dirHandleCache[folder.id]=h;return h;
}

async function saveFileToFS(file){
  if(!useFS||!rootDirHandle)return;
  const folder=data.folders.find(f=>f.id===file.folderId);if(!folder)return;
  try{
    const dirH=await getOrCreateDirHandle(folder);
    const fileName=(sanitize(file.name)||'無題')+'.text';
    file.contentRef=fileName;
    const fh=await dirH.getFileHandle(fileName,{create:true});
    const w=await fh.createWritable();
    await w.write(htmlToPlainText(file.content||''));
    await w.close();
  }catch(e){console.error('saveFileToFS',e);}
}

async function saveMeta(){
  if(useFS&&rootDirHandle){
    try{
      const meta={folders:data.folders,files:data.files.map(f=>({...f,content:undefined})),expanded:expandedFolders};
      const fh=await rootDirHandle.getFileHandle('_memo_meta.json',{create:true});
      const w=await fh.createWritable();
      await w.write(JSON.stringify(meta,null,2));await w.close();
    }catch(e){console.error('saveMeta',e);}
  }else{saveToLS();}
}

// ─── SAVE ───
async function save(){
  if(activeFileId){
    const f=data.files.find(f=>f.id===activeFileId);
    if(f){
      f.content=document.getElementById('editor-content').innerHTML;
      f.name=document.getElementById('file-title').value||'無題';
      f.fontSize=currentFontSize;
      if(useFS)await saveFileToFS(f);
    }
  }
  await saveMeta();
  const s=document.getElementById('status-saved');
  s.textContent='保存済み ✓';
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>s.textContent='',2500);
}

// ─── TREE ───
function renderTree(){
  const tree=document.getElementById('tree');tree.innerHTML='';
  data.folders.forEach(folder=>{
    const div=document.createElement('div');div.className='folder-item';div.dataset.fid=folder.id;
    const row=document.createElement('div');
    row.className='folder-row'+(activeFolderId===folder.id?' selected':'');
    row.onclick=e=>{if(e.target.closest('.f-btn'))return;toggleFolder(folder.id);};
    const arrow=document.createElement('span');
    arrow.className='folder-arrow'+(expandedFolders[folder.id]?' open':'');arrow.textContent='▶';
    const dot=document.createElement('span');dot.className='folder-color-dot';dot.style.background=folder.color||FOLDER_COLORS[0];
    const name=document.createElement('span');name.className='folder-name';name.textContent=folder.name||'フォルダ';
    const actions=document.createElement('span');actions.className='folder-actions';
    actions.append(
      mkBtn('✎','名称変更',false,e=>{e.stopPropagation();startRename(folder.id,name);}),
      mkBtn('◉','色変更',false,e=>{e.stopPropagation();showColorPicker(folder.id,e.target);}),
      mkBtn('✕','削除',true,e=>{e.stopPropagation();deleteFolder(folder.id);})
    );
    row.append(arrow,dot,name,actions);div.appendChild(row);
    if(expandedFolders[folder.id]){
      const fl=document.createElement('div');fl.className='file-list';
      data.files.filter(f=>f.folderId===folder.id).forEach(file=>{
        const fi=document.createElement('div');
        fi.className='file-item'+(activeFileId===file.id?' active':'');
        fi.onclick=()=>openFile(file.id);
        const icon=document.createElement('span');icon.className='file-icon';icon.textContent='◈';
        const nm=document.createElement('span');nm.className='file-name';nm.textContent=file.name||'無題';
        const fa=document.createElement('span');fa.className='file-actions';
        fa.appendChild(mkBtn('✕','削除',true,e=>{e.stopPropagation();deleteFile(file.id);}));
        fi.append(icon,nm,fa);fl.appendChild(fi);
      });
      const add=document.createElement('div');add.className='new-file-btn';add.textContent='＋ ファイル追加';
      add.onclick=()=>createFile(folder.id);
      fl.appendChild(add);div.appendChild(fl);
    }
    tree.appendChild(div);
  });
}

function mkBtn(label,title,isDanger,onclick){
  const b=document.createElement('button');
  b.className='f-btn'+(isDanger?' del':'');
  b.textContent=label;b.title=title;b.onclick=onclick;return b;
}

function toggleFolder(fid){expandedFolders[fid]=!expandedFolders[fid];activeFolderId=fid;renderTree();}

function createFolder(){
  const id=uid();
  data.folders.push({id,name:'新しいフォルダ',color:FOLDER_COLORS[data.folders.length%FOLDER_COLORS.length]});
  expandedFolders[id]=true;activeFolderId=id;saveMeta();renderTree();
  const nameEl=document.querySelector(`.folder-item[data-fid="${id}"] .folder-name`);
  if(nameEl)startRename(id,nameEl);
}

function startRename(fid,nameEl){
  const folder=data.folders.find(f=>f.id===fid);if(!folder)return;
  const input=document.createElement('input');
  input.className='folder-name-input';input.value=folder.name;
  nameEl.replaceWith(input);input.focus();input.select();
  const finish=async()=>{
    const old=folder.name;folder.name=input.value.trim()||'フォルダ';
    if(useFS&&old!==folder.name)delete dirHandleCache[folder.id];
    await saveMeta();renderTree();
  };
  input.onblur=finish;
  input.onkeydown=e=>{if(e.key==='Enter')input.blur();if(e.key==='Escape'){input.value=folder.name;input.blur();}};
}

function showColorPicker(fid,anchor){
  const popup=document.getElementById('color-picker-popup');
  const rect=anchor.getBoundingClientRect();
  popup.style.left=rect.left+'px';popup.style.top=(rect.bottom+4)+'px';popup.innerHTML='';
  const folder=data.folders.find(f=>f.id===fid);
  FOLDER_COLORS.forEach(c=>{
    const sw=document.createElement('div');
    sw.className='color-swatch'+(folder.color===c?' selected':'');sw.style.background=c;
    sw.onclick=()=>{folder.color=c;saveMeta();renderTree();popup.style.display='none';};
    popup.appendChild(sw);
  });
  popup.style.display='flex';
}
document.addEventListener('click',e=>{
  const p=document.getElementById('color-picker-popup');
  if(p.style.display!=='none'&&!p.contains(e.target))p.style.display='none';
});

function deleteFolder(fid){
  const count=data.files.filter(f=>f.folderId===fid).length;
  showModal('フォルダを削除',`このフォルダと中のファイル（${count}件）を削除しますか？`,'danger',async()=>{
    data.files=data.files.filter(f=>f.folderId!==fid);
    data.folders=data.folders.filter(f=>f.id!==fid);
    if(activeFileId&&!data.files.find(f=>f.id===activeFileId))closeEditor();
    delete expandedFolders[fid];delete dirHandleCache[fid];
    if(activeFolderId===fid)activeFolderId=null;
    await saveMeta();renderTree();
  });
}

async function createFile(folderId){
  if(activeFileId)await save();
  const id=uid();
  data.files.push({id,folderId,name:'無題',content:'',fontSize:settings.defaultFontSize});
  await saveMeta();openFile(id);renderTree();
  setTimeout(()=>{document.getElementById('file-title').focus();document.getElementById('file-title').select();},50);
}

async function openFile(fileId){
  if(activeFileId&&activeFileId!==fileId)await save();
  activeFileId=fileId;
  const file=data.files.find(f=>f.id===fileId);if(!file)return;
  const folder=data.folders.find(f=>f.id===file.folderId);
  document.getElementById('file-title').value=file.name||'';
  const ec=document.getElementById('editor-content');
  ec.innerHTML=file.content||'';
  setFontSize(file.fontSize||settings.defaultFontSize,false);
  document.getElementById('empty-state').style.display='none';
  document.getElementById('editor-scroll').style.display='block';
  document.getElementById('status-file').textContent=file.name||'無題';
  document.getElementById('status-folder').textContent=folder?'📁 '+folder.name:'';
  updateCharCount();
  activeFolderId=file.folderId;
  expandedFolders[file.folderId]=true;
  renderTree();
  ec.focus();
}

function closeEditor(){
  activeFileId=null;
  document.getElementById('empty-state').style.display='flex';
  document.getElementById('editor-scroll').style.display='none';
  document.getElementById('status-file').textContent='—';
  document.getElementById('status-folder').textContent='—';
}

function deleteFile(fileId){
  showModal('ファイルを削除','このファイルを削除しますか？','danger',async()=>{
    data.files=data.files.filter(f=>f.id!==fileId);
    if(activeFileId===fileId)closeEditor();
    await saveMeta();renderTree();
  });
}

// ─── EDITOR ───
function setFontSize(size,doSave=true){
  currentFontSize=size;
  const el=document.getElementById('editor-content');
  el.classList.remove('fs-sm','fs-md','fs-lg');el.classList.add('fs-'+size);
  ['sm','md','lg'].forEach(s=>document.getElementById('fs-'+s+'-btn').classList.toggle('active',s===size));
  if(doSave)save();
}

function insertHR(){
  const ec=document.getElementById('editor-content');
  ec.focus();
  // カーソル位置に<hr>を挿入してその後に編集可能な位置を作る
  const sel=window.getSelection();
  if(sel&&sel.rangeCount){
    const range=sel.getRangeAt(0);
    range.deleteContents();
    const hr=document.createElement('hr');
    const br=document.createElement('br');
    range.insertNode(br);
    range.insertNode(hr);
    // カーソルをbrの後へ
    const newRange=document.createRange();
    newRange.setStartAfter(br);
    newRange.collapse(true);
    sel.removeAllRanges();sel.addRange(newRange);
  }
  handleInput();
}

function triggerImageInsert(){document.getElementById('img-input').click();}

function insertImage(e){
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    document.getElementById('editor-content').focus();
    document.execCommand('insertHTML',false,`<img class="editor-img" src="${ev.target.result}" alt="">`);
    handleInput();
  };
  reader.readAsDataURL(file);e.target.value='';
}

function updateCharCount(){
  const len=(document.getElementById('editor-content').innerText||'').length;
  const cc=document.getElementById('char-count');
  cc.textContent=len.toLocaleString()+' / 50,000';
  cc.classList.toggle('warn',len>MAX_CHARS*0.9);
}

function handleInput(){
  updateCharCount();
  if((document.getElementById('editor-content').innerText||'').length>MAX_CHARS){document.execCommand('undo');return;}
  save();
}

// ② 改行をtextareaと同じ自然な動作に：Enterキーをブラウザデフォルトに任せる
// contenteditable のデフォルトEnterは<div>挿入になるため<br>に統一
function handleKey(e){
  if(e.key==='Enter'){
    e.preventDefault();
    const sel=window.getSelection();
    if(!sel||!sel.rangeCount)return;
    const range=sel.getRangeAt(0);
    range.deleteContents();
    const br1=document.createElement('br');
    range.insertNode(br1);
    // 末尾判定：次の兄弟ノードがない or 次がbrでない場合は追加brで確実にカーソルを下へ
    let next=br1.nextSibling;
    if(!next||(next.nodeType===3&&next.textContent==='')||next===br1.parentNode.lastChild){
      const br2=document.createElement('br');
      br1.parentNode.insertBefore(br2,br1.nextSibling);
    }
    const newRange=document.createRange();
    newRange.setStartAfter(br1);newRange.collapse(true);
    sel.removeAllRanges();sel.addRange(newRange);
    handleInput();
  }
}

document.getElementById('file-title').oninput=function(){
  const f=data.files.find(f=>f.id===activeFileId);
  if(f){f.name=this.value||'無題';document.getElementById('status-file').textContent=f.name;}
  save();renderTree();
};

// ─── EXPORT ZIP ───
async function exportZip(){
  await save();
  if(typeof JSZip==='undefined'){alert('JSZipが読み込めません。');return;}
  const zip=new JSZip();
  data.folders.forEach(folder=>{
    const fn=sanitize(folder.name)||'folder';
    data.files.filter(f=>f.folderId===folder.id).forEach(file=>{
      zip.folder(fn).file((sanitize(file.name)||'無題')+'.text',htmlToPlainText(file.content||''));
    });
    if(!data.files.find(f=>f.folderId===folder.id))zip.folder(fn);
  });
  const blob=await zip.generateAsync({type:'blob'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='memo_export_'+new Date().toISOString().slice(0,10)+'.zip';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(url),5000);
}

// ─── UTILS ───
function htmlToPlainText(html){
  const tmp=document.createElement('div');tmp.innerHTML=html;
  tmp.querySelectorAll('hr').forEach(h=>h.replaceWith('\n────────────────────\n'));
  tmp.querySelectorAll('br').forEach(b=>b.replaceWith('\n'));
  tmp.querySelectorAll('img').forEach(i=>i.replaceWith('[画像]'));
  return (tmp.textContent||'').trim();
}
function sanitize(s){return(s||'').replace(/[\/\\:*?"<>|]/g,'_').trim();}

function showModal(title,msg,type,onConfirm){
  const mc=document.getElementById('modal-container');mc.innerHTML='';
  const ov=document.createElement('div');ov.className='modal-overlay';
  ov.onclick=e=>{if(e.target===ov)mc.innerHTML='';};
  const box=document.createElement('div');box.className='modal';
  box.innerHTML=`<h3>${title}</h3><p>${msg}</p>`;
  const btns=document.createElement('div');btns.className='modal-btns';
  const cancel=document.createElement('button');cancel.className='modal-btn';cancel.textContent='キャンセル';cancel.onclick=()=>mc.innerHTML='';
  const confirm=document.createElement('button');
  confirm.className='modal-btn '+(type==='danger'?'danger':'primary');
  confirm.textContent=type==='danger'?'削除する':'OK';
  confirm.onclick=()=>{mc.innerHTML='';onConfirm();};
  btns.append(cancel,confirm);box.appendChild(btns);ov.appendChild(box);mc.appendChild(ov);
}
