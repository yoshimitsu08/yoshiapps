<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memo</title>
<!--
  memo_app.html — Memo テキストエディタ
  Version : 1.00
  Author  : yoshimitsu08
  Updated : 2026-06-28
  Host    : GitHub Pages (yoshimitsu08.github.io/yoshiapps/)

  Features:
    - Firebase Realtime DB 同期
    - Google ログイン認証
    - フォルダ1階層 + タグ管理（絞り込み・一覧）
    - リッチテキスト編集（太字・斜体・下線・文字色・見出し・リスト・リンク）
    - 自動保存（2秒デバウンス）+ 手動保存
    - 検索（現在/フォルダ内/全体）+ 置換
    - スマホ・PC 両対応（明るいトーン）
-->

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

:root {
  --bg:        #F8F7F4;
  --bg2:       #FFFFFF;
  --bg3:       #EEF2FA;
  --surface:   #E4EBF8;
  --accent:    #4A7FD4;
  --accent2:   #2C5FAD;
  --text:      #2C2A26;
  --text2:     #6B6860;
  --text3:     #A5A39E;
  --border:    #DDD9D0;
  --ok:        #3A9E6F;
  --danger:    #C0392B;
  --warn:      #E67E22;
  --sidebar-w: 240px;
  --toolbar-h: 44px;
  --radius:    8px;
  --shadow:    0 2px 8px rgba(0,0,0,.08);
}

/* ===== LOGIN SCREEN ===== */
#login-screen {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; background: var(--bg); gap: 24px;
}
#login-screen h1 { font-size: 2rem; color: var(--text); letter-spacing: -.02em; }
#login-screen p  { color: var(--text2); font-size: .95rem; }
#btn-google-login {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 28px; border: 1.5px solid var(--border); border-radius: 50px;
  background: var(--bg2); color: var(--text); font-size: 1rem; cursor: pointer;
  box-shadow: var(--shadow); transition: box-shadow .15s, border-color .15s;
}
#btn-google-login:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(74,127,212,.15); }
#btn-google-login svg { width: 20px; height: 20px; }

/* ===== APP SHELL ===== */
#app { display: none; height: 100vh; overflow: hidden; background: var(--bg); }
#app.visible { display: flex; flex-direction: column; }

/* ===== TOP BAR ===== */
#topbar {
  display: flex; align-items: center; gap: 8px;
  height: 52px; padding: 0 12px;
  background: var(--bg2); border-bottom: 1px solid var(--border);
  flex-shrink: 0; position: relative; z-index: 20;
}
#btn-menu { display: none; background: none; border: none; cursor: pointer; padding: 6px; color: var(--text2); }
#topbar-title { font-size: 1.1rem; font-weight: 700; color: var(--text); letter-spacing: -.02em; flex: 1; }
.topbar-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 12px; font-size: .82rem; color: var(--text2); cursor: pointer;
  transition: background .15s, color .15s;
}
.topbar-btn:hover { background: var(--bg3); color: var(--text); }
#user-avatar {
  width: 30px; height: 30px; border-radius: 50%; object-fit: cover;
  border: 1.5px solid var(--border); cursor: pointer;
}
#user-menu {
  position: absolute; top: 48px; right: 12px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  box-shadow: var(--shadow); padding: 8px 0; min-width: 160px; z-index: 100;
  display: none;
}
#user-menu.open { display: block; }
#user-menu button {
  width: 100%; text-align: left; background: none; border: none;
  padding: 10px 16px; cursor: pointer; font-size: .88rem; color: var(--text);
}
#user-menu button:hover { background: var(--bg3); }
#user-name-label { padding: 10px 16px; font-size: .78rem; color: var(--text3); border-bottom: 1px solid var(--border); margin-bottom: 4px; }

/* ===== MAIN LAYOUT ===== */
#main { display: flex; flex: 1; overflow: hidden; }

/* ===== SIDEBAR ===== */
#sidebar {
  width: var(--sidebar-w); background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
  transition: width .2s, transform .2s;
}
/* PC: サイドバー縮小（アイコンのみ） */
#sidebar.collapsed {
  width: 48px;
}
#sidebar.collapsed #sidebar-tabs { display: none; }
#sidebar.collapsed #sidebar-panel { overflow: hidden; }
#sidebar.collapsed .sidebar-section-title { display: none; }
#sidebar.collapsed .sidebar-item-label { display: none; }
#sidebar.collapsed .sidebar-item-count { display: none; }
#sidebar.collapsed .sidebar-item-actions { display: none !important; }
#sidebar.collapsed .sidebar-item { justify-content: center; padding: 10px 0; font-size: 1rem; }
#sidebar.collapsed #btn-add-folder { display: none; }
#sidebar.collapsed + #note-list-panel { border-left: none; }

/* PC: ノートリスト縮小（タイトルのみ） */
#note-list-panel {
  width: 220px; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; background: var(--bg);
  transition: width .2s;
}
#note-list-panel.collapsed {
  width: 40px; overflow: hidden;
}
#note-list-panel.collapsed #note-list-header { display: none; }
#note-list-panel.collapsed #note-list { display: none; }
#note-list-panel.collapsed #note-list-collapsed-label {
  display: flex;
}
#sidebar-tabs {
  display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.stab {
  flex: 1; padding: 10px 4px; background: none; border: none; font-size: .78rem;
  color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent;
  transition: color .15s, border-color .15s;
}
.stab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

#sidebar-panel { flex: 1; overflow-y: auto; overflow-x: auto; padding: 8px 0; }

/* フォルダツリー横スクロール用ラッパー */
#folder-tree-wrap { min-width: 100%; width: max-content; padding-bottom: 4px; }

/* アコーディオン */
.folder-children { display: none; }
.folder-children.open { display: block; }
.folder-row {
  display: flex; align-items: center;
  padding: 6px 8px 6px 0; cursor: pointer;
  font-size: .88rem; color: var(--text2);
  transition: background .12s, color .12s;
  white-space: nowrap; user-select: none;
  border-radius: 4px;
}
.folder-row:hover { background: var(--bg3); color: var(--text); }
.folder-row.active { background: var(--surface); color: var(--accent); font-weight: 600; }
.folder-toggle {
  width: 20px; flex-shrink: 0; text-align: center;
  font-size: .65rem; color: var(--text3); transition: transform .15s;
}
.folder-toggle.open { transform: rotate(90deg); }
.folder-toggle.leaf { visibility: hidden; }
.folder-icon { margin-right: 4px; font-size: .9rem; }
.folder-name { flex: 1; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
.folder-count { font-size: .7rem; color: var(--text3); margin-left: 4px; margin-right: 4px; }
.folder-actions { display: none; gap: 2px; flex-shrink: 0; }
.folder-row:hover .folder-actions { display: flex; }

/* folder/tag list */
.sidebar-section-title {
  font-size: .7rem; font-weight: 700; color: var(--text3); letter-spacing: .08em;
  text-transform: uppercase; padding: 8px 14px 4px;
}
.sidebar-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 7px 14px; cursor: pointer; border-radius: 0;
  font-size: .88rem; color: var(--text2); transition: background .12s, color .12s;
  user-select: none;
}
.sidebar-item:hover { background: var(--bg3); color: var(--text); }
.sidebar-item.active { background: var(--surface); color: var(--accent); font-weight: 600; }
.sidebar-item-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.sidebar-item-count { font-size: .72rem; color: var(--text3); margin-left: 4px; }
.sidebar-item-actions { display: none; gap: 2px; }
.sidebar-item:hover .sidebar-item-actions { display: flex; }
.sidebar-icon-btn {
  background: none; border: none; cursor: pointer; padding: 2px 4px;
  font-size: .8rem; color: var(--text3); border-radius: 4px;
}
.sidebar-icon-btn:hover { background: var(--border); color: var(--text); }

/* note list */
#note-list-header {
  padding: 10px 12px 8px; border-bottom: 1px solid var(--border); flex-shrink: 0;
}
#note-list-header-row {
  display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px;
}
#note-list-context-label { font-size: .78rem; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; }
#btn-new-note {
  background: var(--accent); color: #fff; border: none; border-radius: 6px;
  padding: 5px 11px; font-size: .82rem; cursor: pointer; font-weight: 600;
  transition: background .15s;
}
#btn-new-note:hover { background: var(--accent2); }
#note-search-input {
  width: 100%; padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px;
  font-size: .85rem; background: var(--bg2); color: var(--text); outline: none;
}
#note-search-input:focus { border-color: var(--accent); }
#note-list { flex: 1; overflow-y: auto; }
.note-card {
  padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer;
  transition: background .12s;
}
.note-card:hover { background: var(--bg2); }
.note-card.active { background: var(--bg3); border-left: 3px solid var(--accent); }
.note-card-title { font-size: .9rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.note-card-preview { font-size: .78rem; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.note-card-meta { display: flex; gap: 6px; align-items: center; margin-top: 4px; flex-wrap: wrap; }
.note-card-date { font-size: .7rem; color: var(--text3); }
.note-tag { font-size: .68rem; padding: 1px 6px; border-radius: 10px; background: var(--surface); color: var(--accent2); }
.note-empty { padding: 24px 12px; color: var(--text3); font-size: .85rem; text-align: center; }

/* ===== EDITOR AREA ===== */
#editor-area {
  flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0;
}
#editor-topbar {
  display: flex; align-items: center; gap: 8px; padding: 8px 12px;
  border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0;
}
#note-title-input {
  flex: 1; border: none; outline: none; font-size: 1.05rem; font-weight: 700;
  color: var(--text); background: transparent; font-family: inherit;
}
/* モバイル：editor-topbarを非表示、タイトルはtopbarに表示 */
@media (max-width: 680px) {
  #editor-topbar { display: none; }
  #topbar-title-input {
    flex: 1; border: none; outline: none; font-size: .95rem; font-weight: 700;
    color: var(--text); background: transparent; font-family: inherit;
    min-width: 0;
  }
}
@media (min-width: 681px) {
  #topbar-title-input { display: none; }
  #mobile-save-status { display: none !important; }
  #mobile-btn-save    { display: none !important; }
  #mobile-btn-delete  { display: none !important; }
  #mobile-back-topbar { display: none !important; }
}
#save-status { font-size: .75rem; color: var(--text3); white-space: nowrap; }
#btn-save-manual {
  background: var(--accent); color: #fff; border: none; border-radius: 6px;
  padding: 5px 12px; font-size: .82rem; cursor: pointer; font-weight: 600;
  transition: background .15s;
}
#btn-save-manual:hover { background: var(--accent2); }
#btn-delete-note {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 10px; font-size: .82rem; color: var(--danger); cursor: pointer;
}
#btn-delete-note:hover { background: #fdf0ee; }

/* ===== RICH TEXT TOOLBAR ===== */
#rich-toolbar {
  display: flex; flex-wrap: wrap; gap: 2px; padding: 6px 10px;
  border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0;
}
.rt-btn {
  background: none; border: 1px solid transparent; border-radius: 5px;
  padding: 4px 7px; font-size: .82rem; cursor: pointer; color: var(--text2);
  min-width: 28px; transition: background .12s, border-color .12s;
}
.rt-btn:hover { background: var(--bg3); border-color: var(--border); }
.rt-btn.active { background: var(--surface); border-color: var(--accent); color: var(--accent); }
.rt-sep { width: 1px; background: var(--border); margin: 2px 3px; align-self: stretch; }
#color-picker-wrap { position: relative; display: flex; align-items: center; }
#rt-color-swatch {
  width: 22px; height: 22px; border-radius: 4px; border: 1.5px solid var(--border);
  cursor: pointer; display: block; background: #e74c3c;
}
#rt-color-input { position: absolute; opacity: 0; width: 0; height: 0; }
#tag-input-wrap {
  display: flex; align-items: center; gap: 6px; padding: 6px 10px;
  border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0;
  flex-wrap: wrap;
}
#tag-input-label { font-size: .75rem; color: var(--text3); white-space: nowrap; }
#tag-chips { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
.tag-chip {
  display: flex; align-items: center; gap: 3px; padding: 2px 8px;
  background: var(--surface); border-radius: 12px; font-size: .75rem; color: var(--accent2);
}
.tag-chip-remove { background: none; border: none; cursor: pointer; color: var(--text3); font-size: .8rem; line-height: 1; padding: 0 1px; }
.tag-chip-remove:hover { color: var(--danger); }
#tag-add-input {
  border: none; outline: none; font-size: .82rem; color: var(--text); background: transparent;
  min-width: 80px; flex: 1;
}
.folder-assign-wrap {
  display: flex; align-items: center; gap: 6px; padding: 4px 10px;
  border-bottom: 1px solid var(--border); background: var(--bg); flex-shrink: 0;
}
#folder-assign-label { font-size: .75rem; color: var(--text3); }
#folder-assign-select {
  border: 1px solid var(--border); border-radius: 6px; background: var(--bg2);
  padding: 3px 8px; font-size: .82rem; color: var(--text); outline: none;
}
#folder-assign-select:focus { border-color: var(--accent); }

/* ===== EDITOR ===== */
#editor-content-wrap { flex: 1; overflow-y: auto; padding: 16px 20px; }
#editor {
  min-height: 100%;
  outline: none;
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 1rem;
  line-height: 1.75;
  color: var(--text);
  max-width: 720px;
  margin: 0 auto;
}
#editor h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; line-height: 1.3; }
#editor h2 { font-size: 1.25rem; font-weight: 700; margin-bottom: 6px; }
#editor h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: 4px; }
#editor ul, #editor ol { padding-left: 1.5em; margin-bottom: 4px; }
#editor a { color: var(--accent); }
#editor:empty::before { content: 'ここにメモを入力...'; color: var(--text3); pointer-events: none; }

#no-note-placeholder {
  flex: 1; display: flex; align-items: center; justify-content: center;
  flex-direction: column; gap: 12px; color: var(--text3);
}
#no-note-placeholder svg { opacity: .3; }

/* ===== SEARCH/REPLACE PANEL ===== */
#search-panel {
  display: none; flex-direction: column; gap: 0;
  border-bottom: 1px solid var(--border); background: var(--bg2); flex-shrink: 0;
}
#search-panel.open { display: flex; }
#search-row, #replace-row {
  display: flex; align-items: center; gap: 6px; padding: 6px 10px;
  border-bottom: 1px solid var(--border);
}
#replace-row { border-bottom: none; }
.search-input {
  flex: 1; border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 10px; font-size: .85rem; color: var(--text); outline: none;
  background: var(--bg);
}
.search-input:focus { border-color: var(--accent); }
.search-btn {
  background: none; border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 10px; font-size: .8rem; color: var(--text2); cursor: pointer;
  white-space: nowrap; transition: background .12s;
}
.search-btn:hover { background: var(--bg3); }
.search-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.search-btn.primary:hover { background: var(--accent2); }
#search-scope-row {
  display: flex; align-items: center; gap: 8px; padding: 4px 10px;
  background: var(--bg3); border-bottom: 1px solid var(--border);
}
#search-scope-row label { font-size: .78rem; color: var(--text2); display: flex; align-items: center; gap: 3px; cursor: pointer; }
#search-count { font-size: .78rem; color: var(--text3); margin-left: auto; }
#btn-close-search {
  background: none; border: none; cursor: pointer; color: var(--text3);
  font-size: 1.1rem; padding: 2px 6px; border-radius: 4px;
}
#btn-close-search:hover { background: var(--border); }

/* ===== MODALS ===== */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
}
.modal {
  background: var(--bg2); border-radius: var(--radius); box-shadow: 0 8px 32px rgba(0,0,0,.18);
  padding: 24px; width: 100%; max-width: 400px;
}
.modal h2 { font-size: 1.05rem; font-weight: 700; color: var(--text); margin-bottom: 16px; }
.modal-input {
  width: 100%; border: 1px solid var(--border); border-radius: 6px;
  padding: 9px 12px; font-size: .95rem; color: var(--text); outline: none;
  background: var(--bg); margin-bottom: 12px;
}
.modal-input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }
.modal-btn {
  padding: 8px 18px; border-radius: 6px; font-size: .88rem; cursor: pointer;
  border: 1px solid var(--border); background: var(--bg2); color: var(--text);
  transition: background .12s;
}
.modal-btn:hover { background: var(--bg3); }
.modal-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.modal-btn.primary:hover { background: var(--accent2); }
.modal-btn.danger { background: var(--danger); color: #fff; border-color: var(--danger); }

/* ===== TAG LIST VIEW ===== */
#tag-list-view {
  flex: 1; overflow-y: auto; padding: 8px 0; display: none;
}
#tag-list-view.visible { display: block; }

/* ===== TOAST ===== */
#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--text); color: #fff; padding: 10px 20px; border-radius: 20px;
  font-size: .85rem; opacity: 0; transition: opacity .2s, transform .2s; z-index: 300;
  pointer-events: none; white-space: nowrap;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== MOBILE ===== */
@media (max-width: 680px) {
  /* モバイル3画面遷移：全画面を3枚並べてスライド */
  #main {
    position: relative; overflow: hidden;
  }
  /* サイドバー：1枚目（フォルダ画面） */
  #sidebar {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 100% !important; z-index: 10;
    transform: translateX(0); transition: transform .25s ease;
    border-right: none;
  }
  #sidebar.mobile-hidden { transform: translateX(-100%); }
  /* collapsed無効化 */
  #sidebar.collapsed { width: 100% !important; }
  /* ノートリスト：2枚目 */
  #note-list-panel {
    position: absolute; top: 0; left: 0; bottom: 0;
    width: 100% !important; border-right: none; z-index: 20;
    transform: translateX(100%); transition: transform .25s ease;
    display: flex !important;
  }
  #note-list-panel.mobile-visible { transform: translateX(0); }
  #note-list-panel.collapsed { width: 100% !important; }
  /* 編集エリア：3枚目 */
  #editor-area {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    width: 100% !important; z-index: 30;
    transform: translateX(100%); transition: transform .25s ease;
  }
  #editor-area.mobile-visible { transform: translateX(0); }
  /* topbar: 戻るボタン */
  #btn-menu { display: none !important; }
  #mobile-back {
    display: flex; align-items: center; gap: 4px;
    background: none; border: none; color: var(--accent); font-size: .9rem;
    cursor: pointer; padding: 0; margin-right: 4px; font-weight: 600;
  }
  /* サイドバーに戻るボタン不要（1枚目なので） */
  #mobile-folder-back { display: flex; }
}
@media (min-width: 681px) {
  #mobile-back { display: none; }
  #mobile-folder-back { display: none !important; }
  #btn-menu { display: none; }
}

/* 縮小ノートリストの縦ラベル */
#note-list-collapsed-label {
  display: none;
  writing-mode: vertical-rl; text-orientation: mixed;
  font-size: .72rem; font-weight: 700; color: var(--text3);
  text-transform: uppercase; letter-spacing: .1em;
  align-items: center; justify-content: center;
  width: 100%; padding: 12px 0; cursor: pointer;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h1>📝 Memo</h1>
  <p>Googleアカウントでログインしてください</p>
  <button id="btn-google-login">

<script>
// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyCPx0UFfXf2yWgvRz9L0oU5FDVTyk9dWM0",
  authDomain: "mymemoappsmy.firebaseapp.com",
  databaseURL: "https://mymemoappsmy-default-rtdb.firebaseio.com",
  projectId: "mymemoappsmy",
  storageBucket: "mymemoappsmy.firebasestorage.app",
  messagingSenderId: "320242001573",
  appId: "1:320242001573:web:a9379d4a05b77f7b3c0f4c"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db   = firebase.database();

// ===== STATE =====
let currentUser = null;
let userRef      = null;
let notesRef     = null;
let foldersRef   = null;

let allNotes   = {};  // { noteId: noteObj }
let allFolders = {};  // { folderId: folderObj }

let currentNoteId  = null;
let currentFolder  = '__all__';   // '__all__' | '__unfiled__' | folderId
let filterTag      = null;
let autoSaveTimer  = null;
let isDirty        = false;
let currentColor   = '#e74c3c';

// search state
let searchMatches  = [];
let searchIdx      = -1;

// ===== DOM REFS =====
const $ = id => document.getElementById(id);
const loginScreen  = $('login-screen');
const appEl        = $('app');
const userAvatar   = $('user-avatar');
const userNameLabel= $('user-name-label');
const userMenu     = $('user-menu');
const noteListEl   = $('note-list');
const editorInner  = $('editor-inner');
const noNotePH     = $('no-note-placeholder');
const editorEl     = $('editor');
const titleInput   = $('note-title-input');
const saveStatus   = $('save-status');
const folderList   = $('folder-list');
const tagChips     = $('tag-chips');
const tagAddInput  = $('tag-add-input');
const folderSelect = $('folder-assign-select');
const searchPanel  = $('search-panel');
const searchInput  = $('search-input');
const replaceInput = $('replace-input');
const searchCount  = $('search-count');
const allTagsList  = $('all-tags-list');

// ===== AUTH =====
$('btn-google-login').onclick = () => {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(e => showToast('ログイン失敗: ' + e.message));
};
$('btn-logout').onclick = () => { auth.signOut(); userMenu.classList.remove('open'); };
$('user-avatar').onclick = () => userMenu.classList.toggle('open');
document.addEventListener('click', e => {
  if (!e.target.closest('#user-avatar') && !e.target.closest('#user-menu')) userMenu.classList.remove('open');
});

auth.onAuthStateChanged(user => {
  if (user) {
    currentUser  = user;
    userRef      = db.ref('users/' + user.uid);
    notesRef     = userRef.child('notes');
    foldersRef   = userRef.child('folders');
    userAvatar.src = user.photoURL || '';
    userNameLabel.textContent = user.displayName || user.email;
    loginScreen.style.display = 'none';
    appEl.classList.add('visible');
    startListeners();
  } else {
    currentUser = null;
    loginScreen.style.display = '';
    appEl.classList.remove('visible');
    allNotes = {}; allFolders = {};
  }
});

// ===== FIREBASE LISTENERS =====
function startListeners() {
  // モバイル初期表示：フォルダ画面から開始
  if (isMobile()) setMobileScreen('folder');

  notesRef.on('value', snap => {
    allNotes = snap.val() || {};
    renderNoteList();
    renderSidebarCounts();
    // update open note if changed externally
    if (currentNoteId && allNotes[currentNoteId] && !isDirty) {
      loadNoteIntoEditor(currentNoteId, false);
    }
  });
  foldersRef.on('value', snap => {
    allFolders = snap.val() || {};
    renderFolderSidebar();
    renderFolderSelect();
  });
}

// ===== SIDEBAR TABS =====
document.querySelectorAll('.stab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    $('tab-folders').style.display = tab === 'folders' ? '' : 'none';
    $('tab-tags').style.display    = tab === 'tags'    ? '' : 'none';
    if (tab === 'tags') renderAllTagsList();
  };
});

// ===== FOLDER SIDEBAR (階層対応) =====
let expandedFolders = new Set(); // 展開中フォルダID

function getChildren(parentId) {
  return Object.entries(allFolders)
    .filter(([, f]) => (f.parentId || '') === (parentId || ''))
    .sort((a, b) => (a[1].name || '').localeCompare(b[1].name || ''));
}

function getNoteCount(fid) {
  // このフォルダ自身＋子孫フォルダのメモ数
  const descendants = getAllDescendants(fid);
  descendants.add(fid);
  return Object.values(allNotes).filter(n => descendants.has(n.folderId)).length;
}

function getAllDescendants(fid) {
  const result = new Set();
  const queue = [fid];
  while (queue.length) {
    const cur = queue.shift();
    Object.entries(allFolders).filter(([, f]) => f.parentId === cur).forEach(([id]) => {
      result.add(id);
      queue.push(id);
    });
  }
  return result;
}

function renderFolderTree(parentId, container, depth) {
  const children = getChildren(parentId);
  children.forEach(([fid, f]) => {
    const hasChildren = getChildren(fid).length > 0;
    const isExpanded  = expandedFolders.has(fid);
    const isActive    = currentFolder === fid;
    const count       = getNoteCount(fid);
    const indent      = depth * 16;

    // 行
    const row = document.createElement('div');
    row.className = 'folder-row' + (isActive ? ' active' : '');
    row.dataset.folder = fid;
    row.style.paddingLeft = (8 + indent) + 'px';
    row.innerHTML = `
      <span class="folder-toggle ${hasChildren ? (isExpanded ? 'open' : '') : 'leaf'}">▶</span>
      <span class="folder-icon">📁</span>
      <span class="folder-name">${esc(f.name)}</span>
      <span class="folder-count">${count || ''}</span>
      <span class="folder-actions">
        <button class="sidebar-icon-btn" data-action="addsub" data-fid="${fid}" title="サブフォルダ追加">＋</button>
        <button class="sidebar-icon-btn" data-action="rename" data-fid="${fid}" title="名前変更">✏</button>
        <button class="sidebar-icon-btn" data-action="delfolder" data-fid="${fid}" title="削除">🗑</button>
      </span>`;

    // トグルクリック
    const toggle = row.querySelector('.folder-toggle');
    toggle.addEventListener('click', e => {
      e.stopPropagation();
      if (!hasChildren) return;
      if (expandedFolders.has(fid)) expandedFolders.delete(fid);
      else expandedFolders.add(fid);
      renderFolderSidebar();
    });

    // 行クリック（フォルダ選択）
    row.addEventListener('click', e => {
      if (e.target.closest('.sidebar-icon-btn') || e.target.closest('.folder-toggle')) return;
      // 子があれば展開もする
      if (hasChildren) expandedFolders.add(fid);
      setCurrentFolder(fid);
    });

    container.appendChild(row);

    // 子フォルダ
    if (hasChildren) {
      const childWrap = document.createElement('div');
      childWrap.className = 'folder-children' + (isExpanded ? ' open' : '');
      renderFolderTree(fid, childWrap, depth + 1);
      container.appendChild(childWrap);
    }
  });
}

function renderFolderSidebar() {
  folderList.innerHTML = '';
  renderFolderTree('', folderList, 0);
  renderSidebarCounts();
}

function renderSidebarCounts() {
  $('count-all').textContent     = Object.keys(allNotes).length || '';
  $('count-unfiled').textContent = Object.values(allNotes).filter(n => !n.folderId).length || '';
  document.querySelectorAll('[data-folder]').forEach(el => {
    const isActive = el.dataset.folder === currentFolder;
    el.classList.toggle('active', isActive);
    if (el.classList.contains('folder-row')) {
      el.classList.toggle('active', isActive);
    }
  });
}

folderList.addEventListener('click', e => {
  const btn = e.target.closest('.sidebar-icon-btn');
  if (!btn) return;
  e.stopPropagation();
  const { action, fid } = btn.dataset;
  if (action === 'addsub')   openFolderModal('add', null, fid);
  if (action === 'rename')   openFolderModal('rename', fid);
  if (action === 'delfolder') confirmDeleteFolder(fid);
});

document.querySelectorAll('[data-folder]').forEach(el => {
  el.onclick = () => { setCurrentFolder(el.dataset.folder); closeSidebar(); };
});
// re-bind for static items
$('sidebar-panel').addEventListener('click', e => {
  const item = e.target.closest('[data-folder]');
  if (!item || e.target.closest('.sidebar-icon-btn')) return;
  setCurrentFolder(item.dataset.folder);
  // closeSidebarはsetCurrentFolder内のisMobile()分岐で呼ばれる
});

function setCurrentFolder(fid) {
  currentFolder = fid;
  filterTag = null;
  const label = fid === '__all__' ? 'すべて'
    : fid === '__unfiled__' ? '未分類'
    : (allFolders[fid]?.name || fid);
  $('note-list-context-label').textContent = label;
  renderNoteList();
  renderSidebarCounts();
  if (isMobile()) {
    setMobileScreen('list');
  } else {
    // PC：サイドバー縮小+ノートリスト展開（list状態）
    setPcLayout('list');
  }
}

// ===== FOLDER MODAL =====
let folderModalMode = 'add', folderModalTarget = null, folderModalParent = null;
$('btn-add-folder').onclick = () => openFolderModal('add', null, null);
function openFolderModal(mode, fid, parentId) {
  folderModalMode = mode; folderModalTarget = fid; folderModalParent = parentId || null;
  $('modal-folder-title').textContent = mode === 'add' ? 'フォルダ追加' : 'フォルダ名変更';
  $('modal-folder-input').value = mode === 'rename' ? (allFolders[fid]?.name || '') : '';
  // 親フォルダセレクトを更新
  const sel = $('modal-folder-parent');
  sel.innerHTML = '<option value="">なし（ルート）</option>';
  Object.entries(allFolders).sort((a,b)=>(a[1].name||'').localeCompare(b[1].name||'')).forEach(([id, f]) => {
    if (id === fid) return; // 自分自身は除外
    const opt = document.createElement('option');
    opt.value = id; opt.textContent = getFullPath(id);
    sel.appendChild(opt);
  });
  sel.value = parentId || (mode === 'rename' ? (allFolders[fid]?.parentId || '') : '');
  $('modal-folder').style.display = 'flex';
  $('modal-folder-input').focus();
}
function getFullPath(fid) {
  const parts = [];
  let cur = fid;
  let guard = 0;
  while (cur && guard++ < 10) {
    parts.unshift(allFolders[cur]?.name || cur);
    cur = allFolders[cur]?.parentId || '';
  }
  return parts.join(' / ');
}
$('modal-folder-cancel').onclick = () => $('modal-folder').style.display = 'none';
$('modal-folder-ok').onclick     = saveFolderModal;
$('modal-folder-input').onkeydown = e => { if (e.key === 'Enter') saveFolderModal(); };
function saveFolderModal() {
  const name = $('modal-folder-input').value.trim();
  if (!name) return;
  const parentId = $('modal-folder-parent').value || '';
  if (folderModalMode === 'add') {
    foldersRef.push({ name, parentId });
  } else {
    foldersRef.child(folderModalTarget).update({ name, parentId });
  }
  // 追加・変更したフォルダを自動展開
  if (parentId) expandedFolders.add(parentId);
  $('modal-folder').style.display = 'none';
}
function confirmDeleteFolder(fid) {
  const name = allFolders[fid]?.name || '';
  const descendants = getAllDescendants(fid);
  const hasChildren = descendants.size > 0;
  $('modal-confirm-msg').textContent = `フォルダ「${name}」を削除しますか？${hasChildren ? '（サブフォルダも含めて削除。' : '（'}メモは未分類に移動）`;
  $('modal-confirm').style.display = 'flex';
  $('modal-confirm-ok').onclick = () => {
    // 対象フォルダ＋子孫全部のメモを未分類へ
    const targets = new Set([fid, ...descendants]);
    Object.entries(allNotes).filter(([,n]) => targets.has(n.folderId)).forEach(([nid]) => {
      notesRef.child(nid).update({ folderId: '' });
    });
    // フォルダ削除
    targets.forEach(id => foldersRef.child(id).remove());
    expandedFolders.delete(fid);
    $('modal-confirm').style.display = 'none';
    if (targets.has(currentFolder)) setCurrentFolder('__all__');
  };
}
$('modal-confirm-cancel').onclick = () => $('modal-confirm').style.display = 'none';

// ===== FOLDER SELECT (in editor) =====
function renderFolderSelect() {
  folderSelect.innerHTML = '<option value="">未分類</option>';
  // ルートから順に表示（ツリー順）
  function addOptions(parentId, depth) {
    Object.entries(allFolders)
      .filter(([,f]) => (f.parentId||'') === (parentId||''))
      .sort((a,b)=>(a[1].name||'').localeCompare(b[1].name||''))
      .forEach(([fid, f]) => {
        const opt = document.createElement('option');
        opt.value = fid;
        opt.textContent = '　'.repeat(depth) + f.name;
        folderSelect.appendChild(opt);
        addOptions(fid, depth + 1);
      });
  }
  addOptions('', 0);
  if (currentNoteId && allNotes[currentNoteId]) {
    folderSelect.value = allNotes[currentNoteId].folderId || '';
  }
}
folderSelect.onchange = () => {
  if (!currentNoteId) return;
  notesRef.child(currentNoteId).update({ folderId: folderSelect.value });
  // update local cache（新規作成直後でキャッシュがない場合も対応）
  if (!allNotes[currentNoteId]) allNotes[currentNoteId] = {};
  allNotes[currentNoteId].folderId = folderSelect.value;
  // 一覧に即反映
  renderNoteList();
  renderSidebarCounts();
};

// ===== NOTE LIST =====
function getFilteredNotes() {
  let notes = Object.entries(allNotes).map(([id, n]) => ({ id, ...n }));
  // folder filter
  if (currentFolder === '__unfiled__') notes = notes.filter(n => !n.folderId);
  else if (currentFolder !== '__all__')  notes = notes.filter(n => n.folderId === currentFolder);
  // tag filter
  if (filterTag) notes = notes.filter(n => (n.tags || []).includes(filterTag));
  // search filter
  const q = $('note-search-input').value.trim().toLowerCase();
  if (q) notes = notes.filter(n => (n.title||'').toLowerCase().includes(q) || stripHtml(n.content||'').toLowerCase().includes(q));
  // sort
  notes.sort((a,b) => (b.updatedAt||0) - (a.updatedAt||0));
  return notes;
}

function renderNoteList() {
  const notes = getFilteredNotes();
  noteListEl.innerHTML = '';
  if (!notes.length) {
    noteListEl.innerHTML = '<div class="note-empty">メモがありません</div>';
    return;
  }
  notes.forEach(n => {
    const card = document.createElement('div');
    card.className = 'note-card' + (n.id === currentNoteId ? ' active' : '');
    const tags = (n.tags||[]).map(t => `<span class="note-tag">${esc(t)}</span>`).join('');
    card.innerHTML = `
      <div class="note-card-title">${esc(n.title || '無題')}</div>
      <div class="note-card-preview">${esc(stripHtml(n.content||'')).slice(0,60)}</div>
      <div class="note-card-meta">
        <span class="note-card-date">${fmtDate(n.updatedAt)}</span>
        ${tags}
      </div>`;
    card.onclick = () => { selectNote(n.id); };
    noteListEl.appendChild(card);
  });
}

$('note-search-input').oninput = () => renderNoteList();

// ===== SELECT / NEW / DELETE NOTE =====
function selectNote(id) {
  if (isDirty && currentNoteId) saveCurrentNote();
  currentNoteId = id;
  loadNoteIntoEditor(id, true);
  renderNoteList();
  if (isMobile()) {
    setMobileScreen('editor');
  } else {
    // PC：編集状態（両サイドバー縮小）へ
    setPcLayout('edit');
  }
}

$('btn-new-note').onclick = () => {
  if (isDirty && currentNoteId) saveCurrentNote();
  const now = Date.now();
  const folderId = currentFolder === '__all__' || currentFolder === '__unfiled__' ? '' : currentFolder;
  const newData = { title: '', content: '', tags: [], folderId, createdAt: now, updatedAt: now };
  const newRef = notesRef.push(newData);
  currentNoteId = newRef.key;
  // ローカルキャッシュに即反映（Firebaseリスナー待ちによるズレを防ぐ）
  allNotes[currentNoteId] = newData;
  loadNoteIntoEditor(currentNoteId, true);
  renderNoteList();
  renderSidebarCounts();
  titleInput.focus();
  if (isMobile()) setMobileScreen('editor');
};

$('btn-delete-note').onclick = () => {
  if (!currentNoteId) return;
  $('modal-confirm-msg').textContent = 'このメモを削除しますか？';
  $('modal-confirm').style.display = 'flex';
  $('modal-confirm-ok').onclick = () => {
    notesRef.child(currentNoteId).remove();
    currentNoteId = null;
    showEditor(false);
    $('modal-confirm').style.display = 'none';
    showToast('削除しました');
    if (isMobile()) setMobileScreen('list');
  };
};

// ===== LOAD NOTE INTO EDITOR =====
function loadNoteIntoEditor(id, resetDirty) {
  const n = allNotes[id];
  if (!n) return;
  titleInput.value  = n.title || '';
  $('topbar-title-input').value = n.title || '';
  editorEl.innerHTML = n.content || '';
  folderSelect.value = n.folderId || '';
  renderTagChips(n.tags || []);
  if (resetDirty) { isDirty = false; setSaveStatus('saved'); }
  showEditor(true);
}

function showEditor(on) {
  editorInner.style.display  = on ? 'flex' : 'none';
  noNotePH.style.display     = on ? 'none' : '';
}

// ===== TAGS =====
function renderTagChips(tags) {
  tagChips.innerHTML = '';
  tags.forEach(t => {
    const chip = document.createElement('span');
    chip.className = 'tag-chip';
    chip.innerHTML = `${esc(t)}<button class="tag-chip-remove" data-tag="${esc(t)}" title="タグを外す">×</button>`;
    tagChips.appendChild(chip);
  });
}

tagChips.addEventListener('click', e => {
  const btn = e.target.closest('.tag-chip-remove');
  if (!btn || !currentNoteId) return;
  const tag = btn.dataset.tag;
  const tags = (allNotes[currentNoteId]?.tags || []).filter(t => t !== tag);
  notesRef.child(currentNoteId).update({ tags });
  if (allNotes[currentNoteId]) allNotes[currentNoteId].tags = tags;
  renderTagChips(tags);
});

tagAddInput.onkeydown = e => {
  if ((e.key === 'Enter' || e.key === ',') && currentNoteId) {
    e.preventDefault();
    const tag = tagAddInput.value.trim().replace(/,/g, '');
    if (!tag) return;
    const tags = [...new Set([...(allNotes[currentNoteId]?.tags || []), tag])];
    notesRef.child(currentNoteId).update({ tags });
    if (allNotes[currentNoteId]) allNotes[currentNoteId].tags = tags;
    renderTagChips(tags);
    tagAddInput.value = '';
    renderAllTagsList();
  }
};

// ===== ALL TAGS LIST (sidebar) =====
function getAllTags() {
  const tagMap = {};
  Object.values(allNotes).forEach(n => (n.tags||[]).forEach(t => { tagMap[t] = (tagMap[t]||0)+1; }));
  return tagMap;
}
function renderAllTagsList() {
  const tagMap = getAllTags();
  allTagsList.innerHTML = '';
  if (!Object.keys(tagMap).length) {
    allTagsList.innerHTML = '<div style="padding:16px;color:var(--text3);font-size:.85rem;text-align:center">タグはまだありません</div>';
    return;
  }
  Object.entries(tagMap).sort((a,b) => b[1]-a[1]).forEach(([tag, count]) => {
    const div = document.createElement('div');
    div.className = 'sidebar-item' + (filterTag === tag ? ' active' : '');
    div.innerHTML = `<span class="sidebar-item-label">🏷 ${esc(tag)}</span><span class="sidebar-item-count">${count}</span>`;
    div.onclick = () => {
      filterTag = filterTag === tag ? null : tag;
      renderAllTagsList();
      renderNoteList();
      closeSidebar();
    };
    allTagsList.appendChild(div);
  });
}

// ===== RICH TEXT TOOLBAR =====
document.querySelectorAll('.rt-btn').forEach(btn => {
  btn.onmousedown = e => {
    e.preventDefault();
    const cmd = btn.dataset.cmd;
    if (cmd === 'h1' || cmd === 'h2' || cmd === 'h3') {
      document.execCommand('formatBlock', false, cmd);
    } else if (cmd === 'createLink') {
      const url = prompt('URLを入力:', 'https://');
      if (url) document.execCommand('createLink', false, url);
    } else {
      document.execCommand(cmd, false, null);
    }
    editorEl.focus();
    updateToolbarState();
  };
});

// color picker
$('rt-color-swatch').onclick = () => $('rt-color-input').click();
$('rt-color-input').oninput = e => {
  currentColor = e.target.value;
  $('rt-color-swatch').style.background = currentColor;
  document.execCommand('foreColor', false, currentColor);
  editorEl.focus();
};

function updateToolbarState() {
  ['bold','italic','underline'].forEach(cmd => {
    const btn = document.querySelector(`.rt-btn[data-cmd="${cmd}"]`);
    if (btn) btn.classList.toggle('active', document.queryCommandState(cmd));
  });
}

editorEl.addEventListener('keyup',    updateToolbarState);
editorEl.addEventListener('mouseup',  updateToolbarState);
editorEl.addEventListener('selectionchange', updateToolbarState);

// ===== AUTO SAVE =====
function markDirty() {
  isDirty = true;
  setSaveStatus('編集中…');
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(saveCurrentNote, 2000);
}

editorEl.addEventListener('input', markDirty);
titleInput.addEventListener('input', markDirty);

$('btn-save-manual').onclick = () => { saveCurrentNote(); };

function saveCurrentNote() {
  if (!currentNoteId) return;
  const data = {
    title:     titleInput.value,
    content:   editorEl.innerHTML,
    updatedAt: Date.now()
  };
  notesRef.child(currentNoteId).update(data).then(() => {
    isDirty = false;
    setSaveStatus('保存済み');
    showToast('保存しました');
  }).catch(() => setSaveStatus('保存失敗'));
  // update local cache
  if (allNotes[currentNoteId]) Object.assign(allNotes[currentNoteId], data);
}

function setSaveStatus(msg) {
  saveStatus.textContent = msg;
  $('mobile-save-status').textContent = msg;
}

// ===== SEARCH & REPLACE =====
$('btn-open-search').onclick  = openSearchPanel;
$('btn-close-search').onclick = closeSearchPanel;

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'f') {
    e.preventDefault();
    openSearchPanel();
  }
  if (e.key === 'Escape' && searchPanel.classList.contains('open')) {
    closeSearchPanel();
  }
});

function openSearchPanel() {
  searchPanel.classList.add('open');
  searchInput.focus();
}
function closeSearchPanel() {
  searchPanel.classList.remove('open');
  clearSearchHighlights();
  searchMatches = []; searchIdx = -1;
  searchCount.textContent = '';
}

$('btn-do-search').onclick    = () => doSearch();
$('btn-search-next').onclick  = () => navigateMatch(1);
$('btn-search-prev').onclick  = () => navigateMatch(-1);
searchInput.onkeydown = e => { if (e.key === 'Enter') { e.shiftKey ? navigateMatch(-1) : navigateMatch(1); } };

function getSearchScope() {
  return document.querySelector('input[name="search-scope"]:checked')?.value || 'current';
}

function doSearch() {
  const q = searchInput.value.trim();
  if (!q) { searchCount.textContent = ''; return; }
  const scope = getSearchScope();

  if (scope === 'current') {
    searchInEditor(q);
  } else {
    // search across notes
    const notes = getNotesForScope(scope);
    const results = [];
    notes.forEach(n => {
      const text = (n.title + ' ' + stripHtml(n.content||'')).toLowerCase();
      if (text.includes(q.toLowerCase())) results.push(n);
    });
    searchCount.textContent = `${results.length} 件のメモ`;
    // highlight in note list via filter
    filterNoteListByIds(results.map(n => n.id));
  }
}

function getNotesForScope(scope) {
  let notes = Object.entries(allNotes).map(([id,n]) => ({id,...n}));
  if (scope === 'folder' && currentFolder !== '__all__') {
    if (currentFolder === '__unfiled__') notes = notes.filter(n => !n.folderId);
    else notes = notes.filter(n => n.folderId === currentFolder);
  }
  return notes;
}

function filterNoteListByIds(ids) {
  noteListEl.querySelectorAll('.note-card').forEach(card => {
    // cards are rendered from getFilteredNotes(); re-render with highlight
  });
  // Re-render note list showing only matched notes
  const notes = getNotesForScope(getSearchScope()).filter(n => ids.includes(n.id));
  noteListEl.innerHTML = '';
  if (!notes.length) { noteListEl.innerHTML = '<div class="note-empty">見つかりません</div>'; return; }
  notes.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)).forEach(n => {
    const card = document.createElement('div');
    card.className = 'note-card' + (n.id === currentNoteId ? ' active' : '');
    card.innerHTML = `
      <div class="note-card-title">${esc(n.title||'無題')}</div>
      <div class="note-card-preview">${esc(stripHtml(n.content||'')).slice(0,60)}</div>
      <div class="note-card-meta"><span class="note-card-date">${fmtDate(n.updatedAt)}</span></div>`;
    card.onclick = () => selectNote(n.id);
    noteListEl.appendChild(card);
  });
}

// ---- in-editor search highlight ----
function searchInEditor(q) {
  clearSearchHighlights();
  searchMatches = []; searchIdx = -1;
  if (!q) { searchCount.textContent = ''; return; }

  const walker = document.createTreeWalker(editorEl, NodeFilter.SHOW_TEXT);
  const toReplace = [];
  let node;
  while ((node = walker.nextNode())) {
    const idx = node.nodeValue.toLowerCase().indexOf(q.toLowerCase());
    if (idx !== -1) toReplace.push({ node, q });
  }
  toReplace.forEach(({ node, q }) => {
    const parent = node.parentNode;
    const text   = node.nodeValue;
    const frag   = document.createDocumentFragment();
    let last = 0, lower = text.toLowerCase(), qi = q.toLowerCase();
    let i;
    while ((i = lower.indexOf(qi, last)) !== -1) {
      if (i > last) frag.appendChild(document.createTextNode(text.slice(last, i)));
      const mark = document.createElement('mark');
      mark.className = 'search-highlight';
      mark.style.cssText = 'background:#FFE066;color:#000;border-radius:2px;';
      mark.textContent = text.slice(i, i + q.length);
      frag.appendChild(mark);
      searchMatches.push(mark);
      last = i + q.length;
    }
    if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
    parent.replaceChild(frag, node);
  });
  searchCount.textContent = searchMatches.length ? `${searchMatches.length} 件` : '見つかりません';
  if (searchMatches.length) { searchIdx = 0; highlightCurrent(); }
}

function highlightCurrent() {
  searchMatches.forEach((m,i) => {
    m.style.background = i === searchIdx ? '#FF9900' : '#FFE066';
  });
  if (searchMatches[searchIdx]) {
    searchMatches[searchIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
  }
  searchCount.textContent = searchMatches.length ? `${searchIdx+1} / ${searchMatches.length}` : '見つかりません';
}

function navigateMatch(dir) {
  const q = searchInput.value.trim();
  if (!q) return;
  if (getSearchScope() === 'current') {
    if (!searchMatches.length) { searchInEditor(q); return; }
    searchIdx = (searchIdx + dir + searchMatches.length) % searchMatches.length;
    highlightCurrent();
  }
}

function clearSearchHighlights() {
  editorEl.querySelectorAll('.search-highlight').forEach(m => {
    const parent = m.parentNode;
    parent.replaceChild(document.createTextNode(m.textContent), m);
    parent.normalize();
  });
}

// ---- replace ----
$('btn-replace-one').onclick = () => {
  if (getSearchScope() !== 'current') { showToast('置換はこのメモ内のみ対応'); return; }
  if (searchIdx < 0 || !searchMatches[searchIdx]) return;
  const rep = replaceInput.value;
  const m   = searchMatches[searchIdx];
  const text = document.createTextNode(rep);
  m.parentNode.replaceChild(text, m);
  searchMatches.splice(searchIdx, 1);
  if (searchIdx >= searchMatches.length) searchIdx = 0;
  highlightCurrent();
  markDirty();
};

$('btn-replace-all').onclick = () => {
  if (getSearchScope() !== 'current') { showToast('置換はこのメモ内のみ対応'); return; }
  const rep   = replaceInput.value;
  const count = searchMatches.length;
  [...searchMatches].forEach(m => {
    m.parentNode.replaceChild(document.createTextNode(rep), m);
  });
  searchMatches = []; searchIdx = -1;
  searchCount.textContent = `${count} 件を置換しました`;
  markDirty();
};

// ===== LAYOUT STATE MANAGEMENT =====
// PC: 3状態 → 'full'（両方全開）| 'list'（SBアイコン+リスト全開）| 'edit'（両方縮小）
// Mobile: 3段遷移 → フォルダSB | ノートリスト | 編集画面

const isMobile = () => window.innerWidth <= 680;

function setPcLayout(state) {
  if (isMobile()) return;
  const sb = $('sidebar');
  const nl = $('note-list-panel');
  if (state === 'full') {
    sb.classList.remove('collapsed');
    nl.classList.remove('collapsed');
  } else if (state === 'list') {
    sb.classList.add('collapsed');
    nl.classList.remove('collapsed');
  } else if (state === 'edit') {
    sb.classList.add('collapsed');
    nl.classList.add('collapsed');
  }
}

// PC: サイドバークリックで展開
$('sidebar').addEventListener('click', e => {
  if (isMobile()) return;
  if ($('sidebar').classList.contains('collapsed')) {
    setPcLayout('full');
  }
});

// PC: ノートリスト縮小ラベルクリックで展開
$('note-list-collapsed-label').onclick = () => {
  if (!isMobile()) setPcLayout('list');
};

// PC: ノートリストクリックで list 状態へ
$('note-list-panel').addEventListener('click', e => {
  if (isMobile()) return;
  if (!e.target.closest('#note-list-collapsed-label')) {
    setPcLayout('list');
  }
});

// PC: 編集エリアクリックで edit 状態へ
$('editor-area').addEventListener('click', e => {
  if (isMobile()) return;
  setPcLayout('edit');
});

// ===== MOBILE 3画面遷移 =====
// 画面: 'folder'(1枚目) | 'list'(2枚目) | 'editor'(3枚目)

function setMobileScreen(screen) {
  if (!isMobile()) return;
  const sb  = $('sidebar');
  const nl  = $('note-list-panel');
  const ea  = $('editor-area');
  const fbk  = $('mobile-folder-back');
  const mbkT = $('mobile-back-topbar');
  const ttl  = $('topbar-title');
  const ttlI = $('topbar-title-input');
  const mss  = $('mobile-save-status');
  const mbs  = $('mobile-btn-save');
  const mbd  = $('mobile-btn-delete');
  const srch = $('btn-open-search');
  const avtr = $('user-avatar');

  if (screen === 'folder') {
    sb.classList.remove('mobile-hidden');
    nl.classList.remove('mobile-visible');
    ea.classList.remove('mobile-visible');
    fbk.style.display  = 'none';
    mbkT.style.display = 'none';
    ttl.style.display  = '';
    ttlI.style.display = 'none';
    mss.style.display  = 'none';
    mbs.style.display  = 'none';
    mbd.style.display  = 'none';
    srch.style.display = '';
    avtr.style.display = '';
  } else if (screen === 'list') {
    sb.classList.add('mobile-hidden');
    nl.classList.add('mobile-visible');
    ea.classList.remove('mobile-visible');
    fbk.style.display  = 'flex';
    mbkT.style.display = 'none';
    ttl.style.display  = '';
    ttlI.style.display = 'none';
    mss.style.display  = 'none';
    mbs.style.display  = 'none';
    mbd.style.display  = 'none';
    srch.style.display = '';
    avtr.style.display = '';
  } else if (screen === 'editor') {
    sb.classList.add('mobile-hidden');
    nl.classList.remove('mobile-visible');
    ea.classList.add('mobile-visible');
    fbk.style.display  = 'none';
    mbkT.style.display = 'flex';
    ttl.style.display  = 'none';
    ttlI.style.display = '';
    mss.style.display  = '';
    mbs.style.display  = '';
    mbd.style.display  = '';
    srch.style.display = 'none';
    avtr.style.display = 'none';
    // タイトル同期
    ttlI.value = $('note-title-input').value;
  }
}

// フォルダ画面に戻る
$('mobile-folder-back').onclick = () => setMobileScreen('folder');

// ノートリスト画面に戻る（topbarの‹一覧）
$('mobile-back-topbar').onclick = () => setMobileScreen('list');

// topbarタイトル入力とeditorタイトル入力を同期
$('topbar-title-input').addEventListener('input', () => {
  $('note-title-input').value = $('topbar-title-input').value;
  markDirty();
});

// モバイル削除ボタン
$('mobile-btn-delete').onclick = () => $('btn-delete-note').click();

function closeSidebar() { /* PC互換のため残す（処理不要） */ }

// ===== HELPERS =====
function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function stripHtml(html) {
  const t = document.createElement('div');
  t.innerHTML = html;
  return t.textContent || '';
}
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'たった今';
  if (diff < 3600000) return Math.floor(diff/60000) + '分前';
  if (d.toDateString() === now.toDateString()) return d.getHours() + ':' + String(d.getMinutes()).padStart(2,'0');
  return `${d.getMonth()+1}/${d.getDate()}`;
}
function showToast(msg) {
  const t = $('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// prevent editor losing focus on toolbar click
editorEl.addEventListener('keydown', e => {
  if (e.key === 'Tab') { e.preventDefault(); document.execCommand('insertHTML', false, '&nbsp;&nbsp;&nbsp;&nbsp;'); }
});
