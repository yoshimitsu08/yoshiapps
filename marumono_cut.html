<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>丸材カット計算ツール</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;700&display=swap');

:root {
  --bg:       #f4f2ee;
  --bg2:      #eae7e0;
  --panel:    #ffffff;
  --border:   #d0ccc4;
  --border2:  #b8b2a8;
  --text:     #2a2520;
  --text2:    #6b635a;
  --text3:    #9e9488;
  --accent:   #b07d2e;
  --accent2:  #8a6020;
  --ok:       #2e7d52;
  --ok-bg:    #eaf5ef;
  --ng:       #b03030;
  --ng-bg:    #fdf0f0;
  --blue:     #2563a8;
  --purple:   #6b3fa0;
  --mono: 'Share Tech Mono', monospace;
  --sans: 'Noto Sans JP', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  padding: 24px 16px 48px;
  max-width: 600px;
  margin: 0 auto;
}

/* ヘッダー */
header {
  text-align: center;
  margin-bottom: 28px;
  padding-bottom: 16px;
  border-bottom: 2px solid var(--accent);
}
header h1 {
  font-family: var(--mono);
  font-size: 1rem;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 4px;
}
header p { font-size: 0.75rem; color: var(--text3); letter-spacing: 0.05em; }

/* 入力パネル */
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 18px;
  margin-bottom: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
}
.panel-title {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  color: var(--accent);
  text-transform: uppercase;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.input-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.input-row:last-child { margin-bottom: 0; }
.input-row label { font-size: 0.8rem; color: var(--text2); min-width: 130px; }
.input-row label span { display: block; font-family: var(--mono); font-size: 0.62rem; color: var(--text3); margin-top: 2px; }
.input-wrap { display: flex; align-items: center; gap: 6px; flex: 1; }
input[type="number"] {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 3px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 1rem;
  padding: 7px 10px;
  width: 100px;
  outline: none;
  transition: border-color 0.2s;
}
input[type="number"]:focus { border-color: var(--accent); }
.unit { font-size: 0.72rem; color: var(--text3); font-family: var(--mono); }

/* 計算ボタン */
#calc {
  display: block; width: 100%; padding: 12px;
  background: var(--accent); border: none; border-radius: 3px;
  color: #fff; font-family: var(--mono); font-size: 0.85rem;
  letter-spacing: 0.2em; text-transform: uppercase;
  cursor: pointer; transition: background 0.2s; margin-bottom: 20px;
}
#calc:hover { background: var(--accent2); }

/* 結果 */
#result { display: none; }

.result-badge {
  text-align: center; padding: 14px; border-radius: 4px;
  margin-bottom: 16px; font-family: var(--mono);
  font-size: 1rem; letter-spacing: 0.1em; font-weight: bold;
}
.result-badge.ok { border: 2px solid var(--ok); color: var(--ok); background: var(--ok-bg); }
.result-badge.ng { border: 2px solid var(--ng); color: var(--ng); background: var(--ng-bg); }

/* 切断カード */
.cut-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.cut-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 4px; padding: 12px;
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
}
.cut-card.h-cut { border-left: 3px solid var(--blue); }
.cut-card.w-cut { border-left: 3px solid var(--purple); }
.cut-label { font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 6px; line-height: 1.5; }
.cut-value { font-family: var(--mono); font-size: 1.6rem; color: var(--text); font-weight: bold; }
.cut-value span { font-size: 0.72rem; color: var(--text3); margin-left: 3px; font-weight: normal; }
.cut-sub { font-size: 0.65rem; color: var(--text3); margin-top: 4px; }

/* 仕上がり */
.finish-row {
  display: flex; justify-content: space-around;
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 4px; padding: 12px; margin-bottom: 14px;
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
}
.finish-item { text-align: center; }
.fi-label { font-size: 0.62rem; color: var(--text3); font-family: var(--mono); letter-spacing: 0.1em; margin-bottom: 4px; }
.fi-val { font-family: var(--mono); font-size: 1.1rem; color: var(--ok); font-weight: bold; }
.fi-unit { font-size: 0.65rem; color: var(--text3); }

/* 図解 */
#viz-wrap {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 4px; padding: 16px; text-align: center; margin-bottom: 14px;
  box-shadow: 0 1px 3px rgba(0,0,0,.05);
}
.viz-title { font-family: var(--mono); font-size: 0.62rem; color: var(--text3); letter-spacing: 0.15em; margin-bottom: 10px; }

/* 注記 */
.note { font-size: 0.7rem; color: var(--text3); margin-top: 4px; line-height: 1.8; }
.note li { margin-left: 1.2em; list-style: '・'; }

/* エラー */
.error-detail { font-size: 0.78rem; color: var(--text2); margin-top: 10px; text-align: center; line-height: 1.8; }

/* 印刷ボタン */
#btn-print {
  display: none; width: 100%; margin-top: 16px; padding: 11px;
  background: transparent; border: 1.5px solid var(--blue);
  border-radius: 3px; color: var(--blue); font-family: var(--mono);
  font-size: 0.8rem; letter-spacing: 0.15em; cursor: pointer;
  transition: all .2s;
}
#btn-print:hover { background: var(--blue); color: #fff; }
#btn-print.visible { display: block; }

/* ═══════════════════════════════════
   印刷用スタイル（@media print）
   結果エリアだけA4に最適化
   ═══════════════════════════════════ */
@media print {
  @page { size: A4 portrait; margin: 18mm 18mm 18mm 18mm; }

  body {
    background: #fff !important;
    padding: 0 !important;
    max-width: 100% !important;
    margin: 0 !important;
    font-size: 11pt;
  }

  /* 入力パネル・計算ボタン・印刷ボタン は非表示 */
  header, .panel, #calc, #btn-print { display: none !important; }

  /* 結果エリアだけ表示 */
  #result { display: block !important; }

  /* 印刷ヘッダー */
  #print-header { display: block !important; }

  .result-badge {
    font-size: 13pt !important;
    padding: 10px !important;
    margin-bottom: 14px !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .result-badge.ok { border-color: #2e7d52 !important; color: #2e7d52 !important; background: #eaf5ef !important; }

  .cut-grid { gap: 8px !important; margin-bottom: 12px !important; }
  .cut-card { padding: 10px !important; box-shadow: none !important; break-inside: avoid; }
  .cut-card.h-cut { border-left-color: #2563a8 !important; }
  .cut-card.w-cut { border-left-color: #6b3fa0 !important; }
  .cut-value { font-size: 18pt !important; }

  .finish-row { padding: 10px !important; box-shadow: none !important; }
  .fi-val { color: #2e7d52 !important; }

  #viz-wrap { box-shadow: none !important; break-inside: avoid; }

  .note { font-size: 8.5pt !important; }

  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
}

/* 印刷ヘッダー（通常時は非表示） */
#print-header {
  display: none;
  text-align: center;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1.5px solid #b07d2e;
}
#print-header h2 { font-family: var(--mono); font-size: 0.9rem; letter-spacing: 0.2em; color: var(--accent); }
#print-header .ph-params { font-size: 0.72rem; color: var(--text2); margin-top: 4px; font-family: var(--mono); }
</style>
</head>
<body>

<header>
  <h1>丸材 → 平材　カット計算</h1>
  <p>4カットで円柱端材から平板を切り出す</p>
</header>

<!-- 入力 -->
<div class="panel">
  <div class="panel-title">▌ INPUT</div>
  <div class="input-row">
    <label>円の直径 Φ<span>material diameter</span></label>
    <div class="input-wrap">
      <input type="number" id="phi" value="500" min="1" step="0.1">
      <span class="unit">mm</span>
    </div>
  </div>
  <div class="input-row">
    <label>欲しい幅 W<span>target width</span></label>
    <div class="input-wrap">
      <input type="number" id="tw" value="300" min="1" step="0.1">
      <span class="unit">mm</span>
    </div>
  </div>
  <div class="input-row">
    <label>欲しい高さ H<span>target height</span></label>
    <div class="input-wrap">
      <input type="number" id="th" value="200" min="1" step="0.1">
      <span class="unit">mm</span>
    </div>
  </div>
</div>

<button id="calc">▶ CALCULATE</button>

<!-- 結果 -->
<div id="result">

  <!-- 印刷時だけ表示されるヘッダー -->
  <div id="print-header">
    <h2>丸材 → 平材　カット計算結果</h2>
    <div class="ph-params" id="ph-params"></div>
  </div>

  <div id="badge" class="result-badge"></div>

  <div id="ok-detail">
    <div class="cut-grid">
      <div class="cut-card h-cut">
        <div class="cut-label">■ 1カット目（高さ方向）<br>外周から切り込む距離</div>
        <div class="cut-value" id="cut1">—<span>mm</span></div>
        <div class="cut-sub">2カット目は反対側を同距離</div>
      </div>
      <div class="cut-card w-cut">
        <div class="cut-label">■ 3カット目（幅方向）<br>外周から切り込む距離</div>
        <div class="cut-value" id="cut3">—<span>mm</span></div>
        <div class="cut-sub">4カット目は反対側を同距離</div>
      </div>
    </div>

    <div class="finish-row">
      <div class="finish-item">
        <div class="fi-label">仕上がり幅</div>
        <div class="fi-val" id="fw">—</div>
        <div class="fi-unit">mm</div>
      </div>
      <div class="finish-item">
        <div class="fi-label">仕上がり高さ</div>
        <div class="fi-val" id="fh">—</div>
        <div class="fi-unit">mm</div>
      </div>
      <div class="finish-item">
        <div class="fi-label">最大取れる幅×高さ</div>
        <div class="fi-val" id="maxwh">—</div>
        <div class="fi-unit">mm × mm</div>
      </div>
    </div>

    <div id="viz-wrap">
      <div class="viz-title">CUT DIAGRAM</div>
      <svg id="diagram" viewBox="-10 -10 220 220" width="200" height="200"></svg>
    </div>

    <ul class="note">
      <li>ノコ刃代：1mm／カット（計4mm）</li>
      <li>公差：仕上がりは指定値〜+2mm を合格とします</li>
      <li>1・2カット後、平行面をクランプして3・4カット実施</li>
    </ul>
  </div>

  <div id="ng-detail" style="display:none;">
    <div class="error-detail" id="ng-msg"></div>
  </div>

  <!-- 印刷ボタン（OK時のみ表示） -->
  <button id="btn-print">🖨 この結果をA4で印刷する</button>
</div>

<script>
const SAW = 1, TOL = 2;

document.getElementById('calc').addEventListener('click', calculate);
document.getElementById('btn-print').addEventListener('click', () => window.print());
[...document.querySelectorAll('input')].forEach(el => {
  el.addEventListener('keydown', e => { if(e.key === 'Enter') calculate(); });
});

function calculate() {
  const phi = parseFloat(document.getElementById('phi').value);
  const tw  = parseFloat(document.getElementById('tw').value);
  const th  = parseFloat(document.getElementById('th').value);

  if(isNaN(phi)||isNaN(tw)||isNaN(th)||phi<=0||tw<=0||th<=0) {
    alert('正の数値を入力してください'); return;
  }

  const R = phi / 2;
  const d_h = (phi - th - 2 * SAW) / 2;
  const d_w = (phi - tw - 2 * SAW) / 2;
  const finish_h = phi - 2 * d_h - 2 * SAW;
  const finish_w = phi - 2 * d_w - 2 * SAW;
  const half_h = finish_h / 2, half_w = finish_w / 2;
  const fits = (half_h * half_h + half_w * half_w) <= R * R + 0.001;
  const dPositive = d_h > 0 && d_w > 0;
  const maxSq = Math.floor(R * Math.sqrt(2) * 10) / 10;

  document.getElementById('result').style.display = 'block';
  const badge  = document.getElementById('badge');
  const okDiv  = document.getElementById('ok-detail');
  const ngDiv  = document.getElementById('ng-detail');
  const btnPrt = document.getElementById('btn-print');

  // 印刷ヘッダーにパラメータを埋め込む
  document.getElementById('ph-params').textContent =
    `Φ ${phi} mm  ／  目標幅 W ${tw} mm  ／  目標高さ H ${th} mm`;

  if(fits && dPositive) {
    badge.className = 'result-badge ok';
    badge.textContent = '✔ 取り出せます';
    okDiv.style.display = 'block';
    ngDiv.style.display = 'none';
    btnPrt.classList.add('visible');

    document.getElementById('cut1').innerHTML  = `${d_h.toFixed(1)}<span>mm</span>`;
    document.getElementById('cut3').innerHTML  = `${d_w.toFixed(1)}<span>mm</span>`;
    document.getElementById('fw').textContent  = finish_w.toFixed(1);
    document.getElementById('fh').textContent  = finish_h.toFixed(1);
    document.getElementById('maxwh').textContent = `${maxSq} × ${maxSq}`;

    drawDiagram(R, d_h, d_w, finish_w, finish_h);
  } else {
    badge.className = 'result-badge ng';
    badge.textContent = '✘ 取り出せません';
    okDiv.style.display = 'none';
    ngDiv.style.display = 'block';
    btnPrt.classList.remove('visible');

    let msg = '';
    if(!dPositive) {
      if(d_h <= 0) msg += `高さ H=${th}mm に対して切り代が足りません<br>（Φ${phi} − ノコ刃代 ${2*SAW}mm = ${phi-2*SAW}mm が最大高さ）<br>`;
      if(d_w <= 0) msg += `幅 W=${tw}mm に対して切り代が足りません<br>`;
    } else {
      msg  = `W=${tw}mm × H=${th}mm の組合せは円に収まりません。<br>`;
      msg += `条件：(W/2)² + (H/2)² ≤ R²<br>`;
      msg += `計算値：${half_w.toFixed(1)}² + ${half_h.toFixed(1)}² = ${(half_w**2+half_h**2).toFixed(1)} &gt; R² = ${(R**2).toFixed(1)}<br>`;
    }
    msg += `<br>この直径での最大正方形：${maxSq} × ${maxSq} mm`;
    document.getElementById('ng-msg').innerHTML = msg;
  }

  document.getElementById('result').scrollIntoView({ behavior:'smooth', block:'start' });
}

function drawDiagram(R, d_h, d_w, fw, fh) {
  const svg = document.getElementById('diagram');
  svg.innerHTML = '';
  const S = 90, cx = 100, cy = 100, sc = S / R;
  const hw = (fw/2)*sc, hh = (fh/2)*sc;
  const dh = d_h*sc, dw = d_w*sc;

  // 円（ライトモード用：薄いグレー）
  svg.appendChild(mk('circle', { cx, cy, r:S, fill:'none', stroke:'#c8c0b8', 'stroke-width':1.5 }));

  // 高さ方向カット線（青）
  [cy-S+dh, cy+S-dh].forEach((y,i) => {
    svg.appendChild(mk('line', { x1:cx-S-6,y1:y,x2:cx+S+6,y2:y, stroke:'#2563a8','stroke-width':1.5,'stroke-dasharray':'5,3' }));
    const t = mk('text', { x:cx+S+9,y:y+4, fill:'#2563a8','font-size':'9','font-family':'Share Tech Mono' });
    t.textContent = i===0?'1':'2'; svg.appendChild(t);
  });

  // 幅方向カット線（紫）
  [cx-S+dw, cx+S-dw].forEach((x,i) => {
    svg.appendChild(mk('line', { x1:x,y1:cy-S-6,x2:x,y2:cy+S+6, stroke:'#6b3fa0','stroke-width':1.5,'stroke-dasharray':'5,3' }));
    const t = mk('text', { x:x-4,y:cy-S-9, fill:'#6b3fa0','font-size':'9','font-family':'Share Tech Mono','text-anchor':'middle' });
    t.textContent = i===0?'3':'4'; svg.appendChild(t);
  });

  // 平材（アンバー）
  svg.appendChild(mk('rect', { x:cx-hw,y:cy-hh,width:hw*2,height:hh*2, fill:'rgba(176,125,46,.12)',stroke:'#b07d2e','stroke-width':1.5 }));

  // 中心
  svg.appendChild(mk('circle', { cx,cy,r:2.5, fill:'#b07d2e' }));

  // 寸法ラベル
  const wt = mk('text', { x:cx,y:cy+hh+14, fill:'#b07d2e','font-size':'9','text-anchor':'middle','font-family':'Share Tech Mono' });
  wt.textContent = `W ${fw.toFixed(1)}`; svg.appendChild(wt);
  const ht = mk('text', { x:cx+hw+13,y:cy+4, fill:'#b07d2e','font-size':'9','font-family':'Share Tech Mono' });
  ht.textContent = `H ${fh.toFixed(1)}`; svg.appendChild(ht);
}

function mk(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for(const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}
</script>
</body>
</html>
