<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重量計算</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1814;--bg2:#211f1b;--bg3:#2a2722;
  --surface:#302d27;--surface2:#3a3730;
  --accent:#c8a96e;--text:#e8e0d0;--text2:#a09880;--text3:#706858;
  --border:#3f3b34;--ok:#7ec8a8;--danger:#c06040;
  --font-ui:'Courier New',monospace;--font-body:'Georgia',serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body)}

/* ═══ トップバー ═══ */
.topbar{
  display:flex;align-items:center;
  border-bottom:1px solid var(--border);
  background:var(--bg2);
  height:44px;
  gap:0;
}
.topbar-title{
  font-family:var(--font-ui);font-size:13px;letter-spacing:3px;
  color:var(--accent);padding:0 12px;
  border-right:1px solid var(--border);
  height:100%;display:flex;align-items:center;
  flex-shrink:0;
}

/* トグルボタン */
.toggle-wrap{
  display:flex;align-items:center;height:100%;
  border-right:1px solid var(--border);
  flex:1;
}
.toggle-btn{
  flex:1;height:100%;border:none;background:none;cursor:pointer;
  font-family:var(--font-ui);font-size:11px;letter-spacing:1px;
  color:var(--text3);transition:background .15s,color .15s;
  padding:0 4px;
}
.toggle-btn.active{background:var(--surface);color:var(--accent);}
.toggle-divider{
  width:1px;height:60%;background:var(--border);flex-shrink:0;
}

/* ステッパー（個数） */
.stepper{
  display:flex;align-items:center;height:100%;
  flex-shrink:0;
}
.stepper-btn{
  width:36px;height:100%;border:none;background:none;cursor:pointer;
  font-family:var(--font-ui);font-size:16px;color:var(--text2);
  transition:color .15s,background .15s;
}
.stepper-btn:active{background:var(--surface);color:var(--accent)}
.stepper-val{
  font-family:var(--font-ui);font-size:13px;color:var(--accent);
  min-width:28px;text-align:center;
}

/* ═══ MAIN ═══ */
main{max-width:540px;margin:0 auto;padding:12px 12px 12px}

/* 入力グループ */
.input-group{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}

.input-row{
  display:flex;align-items:stretch;border:1px solid var(--border);
  background:var(--bg2);overflow:hidden;
}
.input-row:focus-within{border-color:var(--accent)}

.input-lbl{
  font-family:var(--font-ui);font-size:10px;letter-spacing:1px;
  color:var(--text3);background:var(--bg3);
  padding:0 10px;display:flex;align-items:center;justify-content:center;
  border-right:1px solid var(--border);min-width:72px;flex-shrink:0;
  white-space:nowrap;
}
.input-lbl span{color:var(--accent);font-size:12px;margin-right:3px}

.input-field{
  flex:1;background:transparent;border:none;outline:none;
  color:var(--text);font-family:var(--font-ui);
  font-size:20px;padding:10px 12px;
  width:100%;-webkit-appearance:none;
}
.input-field::placeholder{color:var(--text3);font-size:14px}
.input-field::-webkit-outer-spin-button,
.input-field::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

.input-unit{
  font-family:var(--font-ui);font-size:11px;color:var(--text3);
  padding:0 10px;display:flex;align-items:center;
  border-left:1px solid var(--border);flex-shrink:0;
}

/* 数式バッジ */
.formula-badge{
  font-family:var(--font-ui);font-size:9px;color:var(--text3);
  letter-spacing:1px;text-align:center;margin-bottom:8px;
  padding:5px 8px;border:1px solid var(--border);background:var(--bg3);
}

/* 計算ボタン */
.calc-btn{
  width:100%;padding:14px;
  background:none;border:1px solid var(--accent);
  color:var(--accent);font-family:var(--font-ui);
  font-size:13px;letter-spacing:4px;cursor:pointer;
  transition:background .15s,color .15s;
  margin-bottom:10px;
}
.calc-btn:hover{background:var(--accent);color:var(--bg)}
.calc-btn:active{opacity:.8}

/* 結果 */
.result-wrap{
  border:1px solid var(--border);background:var(--bg2);
  padding:12px 16px;text-align:center;
  transition:border-color .3s;
}
.result-wrap.has-val{border-color:var(--accent)}
.result-label{font-family:var(--font-ui);font-size:9px;letter-spacing:3px;color:var(--text3);margin-bottom:4px}
.result-val{
  font-family:var(--font-ui);font-size:36px;color:var(--accent);
  letter-spacing:2px;line-height:1;margin-bottom:2px;
  transition:all .2s;
}
.result-unit{font-family:var(--font-ui);font-size:11px;color:var(--text2);letter-spacing:2px;margin-bottom:8px}
.result-detail{
  font-family:var(--font-ui);font-size:10px;color:var(--text3);
  letter-spacing:1px;line-height:1.7;
  border-top:1px solid var(--border);padding-top:8px;margin-top:4px;
}
.result-detail .d-row{display:flex;justify-content:space-between}
.result-detail .d-val{color:var(--text2)}

/* リセット */
.reset-btn{
  width:100%;padding:8px;margin-top:6px;
  background:none;border:1px solid var(--border);
  color:var(--text3);font-family:var(--font-ui);
  font-size:11px;letter-spacing:3px;cursor:pointer;
  transition:all .15s;
}
.reset-btn:hover{border-color:var(--danger);color:var(--danger)}

footer{text-align:center;padding:10px;border-top:1px solid var(--border);font-family:var(--font-ui);font-size:9px;letter-spacing:2px;color:var(--text3)}
</style>
</head>
<body>

<!-- ═══ トップバー：タイトル・形状・材質・個数 ═══ -->
<div class="topbar">

  <div class="topbar-title">WEIGHT</div>

  <!-- 形状トグル -->
  <div class="toggle-wrap" id="shape-toggle">
    <button class="toggle-btn active" data-shape="rect" onclick="setShape('rect')">■ 直方体</button>
    <div class="toggle-divider"></div>
    <button class="toggle-btn" data-shape="cyl" onclick="setShape('cyl')">● 円柱</button>
  </div>

  <!-- 材質トグル -->
  <div class="toggle-wrap" id="mat-toggle" style="flex:0.7">
    <button class="toggle-btn active" data-mat="iron" onclick="setMat('iron')">鉄</button>
    <div class="toggle-divider"></div>
    <button class="toggle-btn" data-mat="copper" onclick="setMat('copper')">銅</button>
  </div>

  <!-- 個数ステッパー -->
  <div class="stepper">
    <button class="stepper-btn" onclick="stepQty(-1)">－</button>
    <div class="stepper-val" id="qty-val">1</div>
    <button class="stepper-btn" onclick="stepQty(1)">＋</button>
  </div>

</div>

<main>

  <!-- 直方体入力 -->
  <div class="input-group" id="input-rect">
    <div class="input-row">
      <div class="input-lbl"><span>T</span>厚み</div>
      <input class="input-field" id="rect-t" type="number" inputmode="decimal" placeholder="0" min="0" step="any">
      <div class="input-unit">mm</div>
    </div>
    <div class="input-row">
      <div class="input-lbl"><span>W</span>幅</div>
      <input class="input-field" id="rect-w" type="number" inputmode="decimal" placeholder="0" min="0" step="any">
      <div class="input-unit">mm</div>
    </div>
    <div class="input-row">
      <div class="input-lbl"><span>L</span>長さ</div>
      <input class="input-field" id="rect-l" type="number" inputmode="decimal" placeholder="0" min="0" step="any">
      <div class="input-unit">mm</div>
    </div>
  </div>

  <!-- 円柱／円筒入力 -->
  <div class="input-group" id="input-cyl" style="display:none">
    <div class="input-row">
      <div class="input-lbl"><span>φ</span>外径</div>
      <input class="input-field" id="cyl-od" type="number" inputmode="decimal" placeholder="0" min="0" step="any">
      <div class="input-unit">mm</div>
    </div>
    <div class="input-row">
      <div class="input-lbl"><span>φ</span>内径</div>
      <input class="input-field" id="cyl-id" type="number" inputmode="decimal" placeholder="0 (中実)" min="0" step="any">
      <div class="input-unit">mm</div>
    </div>
    <div class="input-row">
      <div class="input-lbl"><span>L</span>長さ</div>
      <input class="input-field" id="cyl-l" type="number" inputmode="decimal" placeholder="0" min="0" step="any">
      <div class="input-unit">mm</div>
    </div>
  </div>

  <!-- 数式バッジ -->
  <div class="formula-badge" id="formula-badge">T × W × L × 比重 × 員数 ÷ 1,000³</div>

  <!-- 計算ボタン -->
  <button class="calc-btn" onclick="calc()">CALCULATE →</button>

  <!-- 結果 -->
  <div class="result-wrap" id="result-wrap">
    <div class="result-label">WEIGHT</div>
    <div class="result-val" id="result-val">—</div>
    <div class="result-unit" id="result-unit">kg</div>
    <div class="result-detail" id="result-detail" style="display:none">
      <div class="d-row"><span>単重</span><span class="d-val" id="d-unit-wt">—</span></div>
      <div class="d-row"><span>員数</span><span class="d-val" id="d-qty">—</span></div>
      <div class="d-row"><span>合計</span><span class="d-val" id="d-total">—</span></div>
    </div>
  </div>

  <button class="reset-btn" onclick="resetAll()">✕ リセット</button>

</main>

<footer>— weight calc —</footer>

<script>
let shape = 'rect';
let mat = 'iron';
let qty = 1;
const density = { iron: 7.85, copper: 8.96 };

function setShape(s) {
  shape = s;
  document.querySelectorAll('#shape-toggle .toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.shape === s));
  document.getElementById('input-rect').style.display = s === 'rect' ? 'flex' : 'none';
  document.getElementById('input-cyl').style.display  = s === 'cyl'  ? 'flex' : 'none';
  updateFormula();
  clearResult();
}

function setMat(m) {
  mat = m;
  document.querySelectorAll('#mat-toggle .toggle-btn').forEach(b => b.classList.toggle('active', b.dataset.mat === m));
  clearResult();
}

function stepQty(d) {
  qty = Math.max(1, qty + d);
  document.getElementById('qty-val').textContent = qty;
  clearResult();
}

function updateFormula() {
  const el = document.getElementById('formula-badge');
  el.textContent = shape === 'rect'
    ? 'T × W × L × 比重 × 員数 ÷ 1,000³'
    : 'π/4 × (φ外² − φ内²) × L × 比重 × 員数 ÷ 1,000³';
}

function clearResult() {
  document.getElementById('result-val').textContent = '—';
  document.getElementById('result-detail').style.display = 'none';
  document.getElementById('result-wrap').classList.remove('has-val');
}

function fmt(v) {
  return parseFloat(v.toFixed(4)).toLocaleString('ja-JP', { maximumFractionDigits: 4 });
}

function calc() {
  const rho = density[mat];
  let vol_mm3 = 0;

  if (shape === 'rect') {
    const T = parseFloat(document.getElementById('rect-t').value) || 0;
    const W = parseFloat(document.getElementById('rect-w').value) || 0;
    const L = parseFloat(document.getElementById('rect-l').value) || 0;
    if (!T || !W || !L) { alert('T・W・Lを入力してください'); return; }
    vol_mm3 = T * W * L;
  } else {
    const OD = parseFloat(document.getElementById('cyl-od').value) || 0;
    const ID = parseFloat(document.getElementById('cyl-id').value) || 0;
    const L  = parseFloat(document.getElementById('cyl-l').value)  || 0;
    if (!OD || !L) { alert('外径φ・長さLを入力してください'); return; }
    if (ID >= OD) { alert('内径は外径より小さい値を入力してください'); return; }
    vol_mm3 = (Math.PI / 4) * (OD * OD - ID * ID) * L;
  }

  const unit_kg = vol_mm3 / 1000 * rho / 1000;
  const total_kg = unit_kg * qty;

  document.getElementById('result-val').textContent = fmt(total_kg);
  document.getElementById('result-unit').textContent = 'kg';
  document.getElementById('d-unit-wt').textContent = fmt(unit_kg) + ' kg';
  document.getElementById('d-qty').textContent = qty + ' 個';
  document.getElementById('d-total').textContent = fmt(total_kg) + ' kg';
  document.getElementById('result-detail').style.display = 'block';
  document.getElementById('result-wrap').classList.add('has-val');
}

function resetAll() {
  ['rect-t','rect-w','rect-l','cyl-od','cyl-id','cyl-l'].forEach(id => {
    document.getElementById(id).value = '';
  });
  qty = 1;
  document.getElementById('qty-val').textContent = '1';
  clearResult();
}

// Enterキーで計算
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && e.isComposing === false) calc();
});

updateFormula();
</script>
</body>
</html>
