<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PDF Viewer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1814;--bg2:#211f1b;--bg3:#2a2722;--surface:#302d27;
  --accent:#c8a96e;--text:#e8e0d0;--text2:#a09880;--text3:#706858;
  --border:#3f3b34;--ok:#7ec8a8;--danger:#c06040;
  --font-ui:'Courier New',monospace;--font-body:'Georgia',serif;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-body)}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:none;flex-direction:column}
.screen.active{display:flex}

/* ── OPEN SCREEN ── */
#screen-open{align-items:center;justify-content:center;background:var(--bg)}
#screen-open::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 60% at 50% 40%,rgba(200,169,110,.06) 0%,transparent 70%);
  pointer-events:none;
}
.open-label{font-family:var(--font-ui);font-size:10px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-bottom:12px}
.open-title{font-family:var(--font-ui);font-size:26px;letter-spacing:5px;color:var(--accent);font-weight:normal;margin-bottom:6px}
.open-sub{font-family:var(--font-ui);font-size:10px;letter-spacing:2px;color:var(--text3);margin-bottom:48px}
.open-btn{
  position:relative;border:1px solid var(--accent);padding:18px 48px;
  font-family:var(--font-ui);font-size:12px;letter-spacing:4px;color:var(--accent);
  background:none;cursor:pointer;transition:background .15s,color .15s;
}
.open-btn:hover{background:var(--accent);color:var(--bg)}
.open-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}

/* ── VIEWER SCREEN ── */
#screen-viewer{background:#000;position:relative;overflow:hidden}

/* CANVAS WRAP */
#canvas-wrap{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#pdf-canvas{
  display:block;
  /* overflow制御はJS側でtranslateX */
}

/* PAGE TURN ANIMATION */
#canvas-wrap.anim-next{animation:slideNext .18s ease-out}
#canvas-wrap.anim-prev{animation:slidePrev .18s ease-out}
@keyframes slideNext{from{opacity:.4;transform:translateX(-3%)}to{opacity:1;transform:translateX(0)}}
@keyframes slidePrev{from{opacity:.4;transform:translateX(3%)}to{opacity:1;transform:translateX(0)}}

/* REEL MODE */
#canvas-wrap.reel-anim-next{animation:reelNext .18s ease-out}
#canvas-wrap.reel-anim-prev{animation:reelPrev .18s ease-out}
@keyframes reelNext{from{opacity:.4;transform:translateY(-2%)}to{opacity:1;transform:translateY(0)}}
@keyframes reelPrev{from{opacity:.4;transform:translateY(2%)}to{opacity:1;transform:translateY(0)}}

/* HUD — top bar */
#hud-top{
  position:absolute;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px;
  background:linear-gradient(to bottom,rgba(0,0,0,.7) 0%,transparent 100%);
  pointer-events:none;transition:opacity .3s;
  z-index:10;
}
#hud-top.hidden{opacity:0}
.hud-filename{font-family:var(--font-ui);font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%}
.hud-page{font-family:var(--font-ui);font-size:12px;letter-spacing:2px;color:var(--accent)}

/* HUD — bottom bar */
#hud-bot{
  position:absolute;bottom:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:10px 14px;
  background:linear-gradient(to top,rgba(0,0,0,.7) 0%,transparent 100%);
  z-index:10;transition:opacity .3s;
}
#hud-bot.hidden{opacity:0;pointer-events:none}
.hud-btn{
  background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);
  font-family:var(--font-ui);font-size:11px;letter-spacing:1px;padding:6px 12px;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.hud-btn:hover{border-color:var(--accent);color:var(--accent)}
.hud-spacer{flex:1}

/* LOADING */
#loading{
  position:absolute;inset:0;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.7);z-index:20;flex-direction:column;gap:12px;
}
#loading.show{display:flex}
.loading-text{font-family:var(--font-ui);font-size:11px;letter-spacing:3px;color:var(--text2)}
.loading-bar-bg{width:160px;height:2px;background:var(--border)}
.loading-bar{height:2px;background:var(--accent);width:0%;transition:width .2s}

/* SETTINGS PANEL */
#settings{
  position:absolute;inset:0;background:rgba(0,0,0,.85);z-index:30;
  display:none;align-items:center;justify-content:center;padding:20px;
}
#settings.open{display:flex}
.settings-box{
  background:var(--bg2);border:1px solid var(--border);
  padding:24px;width:100%;max-width:360px;
  max-height:90vh;overflow-y:auto;
}
.settings-title{font-family:var(--font-ui);font-size:12px;letter-spacing:3px;color:var(--accent);margin-bottom:20px}
.s-row{margin-bottom:16px}
.s-label{font-family:var(--font-ui);font-size:10px;letter-spacing:2px;color:var(--text3);margin-bottom:8px}
.s-input{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-size:14px;padding:10px 12px;outline:none;}
.s-input:focus{border-color:var(--accent)}
.s-seg{display:flex;border:1px solid var(--border)}
.s-seg-btn{flex:1;padding:10px 6px;text-align:center;font-family:var(--font-ui);font-size:11px;letter-spacing:1px;color:var(--text3);background:var(--bg2);border:none;cursor:pointer;border-right:1px solid var(--border);transition:all .15s}
.s-seg-btn:last-child{border-right:none}
.s-seg-btn.active{background:var(--surface);color:var(--accent)}
.s-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.s-close{width:100%;padding:12px;background:none;border:1px solid var(--accent);color:var(--accent);font-family:var(--font-ui);font-size:12px;letter-spacing:3px;cursor:pointer;transition:all .15s;margin-top:4px}
.s-close:hover{background:var(--accent);color:var(--bg)}

/* TOAST */
#toast{
  position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(10px);
  font-family:var(--font-ui);font-size:11px;letter-spacing:2px;
  padding:8px 20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:50;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- ── OPEN SCREEN ── -->
<div class="screen active" id="screen-open">
  <div class="open-label">tools</div>
  <div class="open-title">PDF VIEWER</div>
  <div class="open-sub">ローカルPDFを開く</div>
  <button class="open-btn">
    <input type="file" accept="application/pdf" id="file-input">
    OPEN PDF →
  </button>
</div>

<!-- ── VIEWER SCREEN ── -->
<div class="screen" id="screen-viewer">

  <div id="canvas-wrap">
    <canvas id="pdf-canvas"></canvas>
  </div>

  <!-- Loading -->
  <div id="loading">
    <div class="loading-text">LOADING...</div>
    <div class="loading-bar-bg"><div class="loading-bar" id="loading-bar"></div></div>
  </div>

  <!-- HUD top -->
  <div id="hud-top">
    <div class="hud-filename" id="hud-filename">—</div>
    <div class="hud-page" id="hud-page">— / —</div>
  </div>

  <!-- HUD bottom -->
  <div id="hud-bot">
    <button class="hud-btn" onclick="openNew()">⊞ 開く</button>
    <div class="hud-spacer"></div>
    <button class="hud-btn" onclick="prevPage()">← 前</button>
    <button class="hud-btn" onclick="nextPage()">次 →</button>
    <div class="hud-spacer"></div>
    <button class="hud-btn" onclick="openSettings()">⚙</button>
  </div>

  <!-- Settings -->
  <div id="settings">
    <div class="settings-box">
      <div class="settings-title">SETTINGS</div>

      <div class="s-row">
        <div class="s-label">スワイプ方向モード</div>
        <div class="s-seg" id="seg-swipe-dir">
          <button class="s-seg-btn active" data-val="horizontal" onclick="setSetting('swipeDir','horizontal',this)">横スワイプ</button>
          <button class="s-seg-btn" data-val="vertical" onclick="setSetting('swipeDir','vertical',this)">縦（リール）</button>
        </div>
      </div>

      <div class="s-row" id="row-swipe-reverse">
        <div class="s-label">横スワイプ：右→次ページ</div>
        <div class="s-seg" id="seg-swipe-rev">
          <button class="s-seg-btn active" data-val="false" onclick="setSetting('swipeReverse','false',this)">右スワイプ→次</button>
          <button class="s-seg-btn" data-val="true" onclick="setSetting('swipeReverse','true',this)">左スワイプ→次</button>
        </div>
      </div>

      <hr class="s-divider">

      <div class="s-row">
        <div class="s-label">左右のはみ出し量（%）</div>
        <input class="s-input" type="number" id="s-overflow" min="0" max="30" value="3" inputmode="numeric"
          oninput="setSetting('overflow', this.value)">
      </div>

      <hr class="s-divider">

      <div class="s-row">
        <div class="s-label">HUD自動非表示</div>
        <div class="s-seg" id="seg-hud-auto">
          <button class="s-seg-btn active" data-val="true" onclick="setSetting('hudAuto','true',this)">ON</button>
          <button class="s-seg-btn" data-val="false" onclick="setSetting('hudAuto','false',this)">OFF</button>
        </div>
      </div>

      <button class="s-close" onclick="closeSettings()">CLOSE</button>
    </div>
  </div>

  <input type="file" accept="application/pdf" id="file-input-new" style="display:none">
</div>

<div id="toast"></div>

<script>
// PDF.js worker
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── STATE ──
let pdfDoc = null;
let currentPage = 1;
let totalPages = 0;
let rendering = false;
let filename = '';

// ── SETTINGS ──
const defaults = {
  swipeDir: 'horizontal',   // horizontal | vertical
  swipeReverse: 'false',    // false=右→次, true=左→次
  overflow: '3',            // %
  hudAuto: 'true',
};
let cfg = {...defaults};

function loadCfg(){
  try{
    const saved = JSON.parse(localStorage.getItem('pdfviewer_cfg')||'{}');
    cfg = {...defaults, ...saved};
  }catch{}
  applySegUI();
  document.getElementById('s-overflow').value = cfg.overflow;
}
function saveCfg(){ localStorage.setItem('pdfviewer_cfg', JSON.stringify(cfg)); }

function setSetting(key, val, btn){
  cfg[key] = val;
  saveCfg();
  if(btn){
    const seg = btn.closest('.s-seg');
    if(seg) seg.querySelectorAll('.s-seg-btn').forEach(b=>b.classList.toggle('active', b===btn));
  }
  if(key==='overflow') renderPage(currentPage);
  if(key==='swipeDir'){
    document.getElementById('row-swipe-reverse').style.display = val==='horizontal' ? '' : 'none';
  }
}

function applySegUI(){
  const setActive = (segId, val) => {
    const seg = document.getElementById(segId);
    if(!seg) return;
    seg.querySelectorAll('.s-seg-btn').forEach(b=>b.classList.toggle('active', b.dataset.val===val));
  };
  setActive('seg-swipe-dir', cfg.swipeDir);
  setActive('seg-swipe-rev', cfg.swipeReverse);
  setActive('seg-hud-auto', cfg.hudAuto);
  document.getElementById('row-swipe-reverse').style.display = cfg.swipeDir==='horizontal' ? '' : 'none';
}

// ── FILE OPEN ──
document.getElementById('file-input').onchange = e => loadFile(e.target.files[0]);
document.getElementById('file-input-new').onchange = e => { loadFile(e.target.files[0]); e.target.value=''; };

function openNew(){ document.getElementById('file-input-new').click(); }

async function loadFile(file){
  if(!file || file.type !== 'application/pdf'){ toast('PDFファイルを選択してください'); return; }
  filename = file.name;
  document.getElementById('hud-filename').textContent = filename;

  showLoading(true);
  switchScreen('viewer');

  const arrayBuffer = await file.arrayBuffer();
  const loadingTask = pdfjsLib.getDocument({data: arrayBuffer});

  loadingTask.onProgress = p => {
    if(p.total) setLoadingBar(p.loaded/p.total*80);
  };

  pdfDoc = await loadingTask.promise;
  totalPages = pdfDoc.numPages;
  currentPage = 1;
  setLoadingBar(100);

  await renderPage(currentPage);
  showLoading(false);
  updateHUD();
  scheduleHudHide();
}

// ── RENDER ──
async function renderPage(num, animClass=''){
  if(!pdfDoc || rendering) return;
  rendering = true;

  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({scale:1});

  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const overflow = parseFloat(cfg.overflow)||0;

  // はみ出し量を考慮したスケール計算
  // 幅方向：画面幅 / (viewport.width * (1 - overflow*2/100))
  const scaleW = vw / (viewport.width * (1 - overflow*2/100));
  const scaleH = vh / viewport.height;
  const scale = Math.max(scaleW, scaleH); // 両方向フィット（はみ出し優先）

  const scaledVp = page.getViewport({scale});
  const canvas = document.getElementById('pdf-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = scaledVp.width;
  canvas.height = scaledVp.height;

  // はみ出し：translateXで中央揃え（自動的に両端がはみ出る）
  canvas.style.position = 'absolute';
  canvas.style.left = '50%';
  canvas.style.top = '50%';
  canvas.style.transform = 'translate(-50%, -50%)';

  await page.render({canvasContext: ctx, viewport: scaledVp}).promise;

  // アニメーション
  const wrap = document.getElementById('canvas-wrap');
  if(animClass){
    wrap.classList.remove('anim-next','anim-prev','reel-anim-next','reel-anim-prev');
    void wrap.offsetWidth;
    wrap.classList.add(animClass);
    setTimeout(()=>wrap.classList.remove(animClass), 250);
  }

  rendering = false;
  updateHUD();
}

// ── NAVIGATION ──
async function nextPage(){
  if(!pdfDoc || currentPage >= totalPages) return;
  currentPage++;
  const anim = cfg.swipeDir==='vertical' ? 'reel-anim-next' : 'anim-next';
  await renderPage(currentPage, anim);
  scheduleHudHide();
}

async function prevPage(){
  if(!pdfDoc || currentPage <= 1) return;
  currentPage--;
  const anim = cfg.swipeDir==='vertical' ? 'reel-anim-prev' : 'anim-prev';
  await renderPage(currentPage, anim);
  scheduleHudHide();
}

// ── SWIPE ──
let touchStartX = 0, touchStartY = 0;
const SWIPE_THRESHOLD = 40;

document.getElementById('canvas-wrap').addEventListener('touchstart', e=>{
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive:true});

document.getElementById('canvas-wrap').addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;

  if(cfg.swipeDir === 'horizontal'){
    if(Math.abs(dx) < SWIPE_THRESHOLD) return;
    if(Math.abs(dx) < Math.abs(dy)*0.8) return; // 縦方向が強ければ無視
    const goNext = cfg.swipeReverse==='true' ? dx < 0 : dx > 0;
    goNext ? nextPage() : prevPage();
  } else {
    // vertical (reel)
    if(Math.abs(dy) < SWIPE_THRESHOLD) return;
    if(Math.abs(dy) < Math.abs(dx)*0.8) return;
    dy < 0 ? nextPage() : prevPage();
  }
}, {passive:true});

// ── PC CLICK ──
document.getElementById('canvas-wrap').addEventListener('click', e=>{
  if(!pdfDoc) return;
  // ボタン類は除外
  if(e.target.closest('button, input')) return;
  const x = e.clientX;
  x < window.innerWidth/2 ? nextPage() : prevPage();
  showHud();
  scheduleHudHide();
});

// ── KEYBOARD ──
document.addEventListener('keydown', e=>{
  if(!pdfDoc) return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown') nextPage();
  if(e.key==='ArrowLeft'||e.key==='ArrowUp') prevPage();
});

// ── HUD ──
let hudTimer = null;

function showHud(){
  document.getElementById('hud-top').classList.remove('hidden');
  document.getElementById('hud-bot').classList.remove('hidden');
}
function hideHud(){
  document.getElementById('hud-top').classList.add('hidden');
  document.getElementById('hud-bot').classList.add('hidden');
}
function scheduleHudHide(){
  if(cfg.hudAuto !== 'true') return;
  clearTimeout(hudTimer);
  showHud();
  hudTimer = setTimeout(hideHud, 3000);
}

// タップでHUD表示切り替え（スワイプと区別）
let tapStartX=0, tapStartY=0;
document.getElementById('canvas-wrap').addEventListener('touchstart',e=>{
  tapStartX=e.touches[0].clientX; tapStartY=e.touches[0].clientY;
},{passive:true});
document.getElementById('canvas-wrap').addEventListener('touchend',e=>{
  const dx=Math.abs(e.changedTouches[0].clientX-tapStartX);
  const dy=Math.abs(e.changedTouches[0].clientY-tapStartY);
  if(dx<10&&dy<10){
    // タップ
    const top=document.getElementById('hud-top');
    if(top.classList.contains('hidden')){ showHud(); scheduleHudHide(); }
    else{ hideHud(); clearTimeout(hudTimer); }
  }
},{passive:true});

function updateHUD(){
  document.getElementById('hud-page').textContent = `${currentPage} / ${totalPages}`;
}

// ── SETTINGS UI ──
function openSettings(){ document.getElementById('settings').classList.add('open'); }
function closeSettings(){ document.getElementById('settings').classList.remove('open'); }
document.getElementById('settings').addEventListener('click', e=>{
  if(e.target===document.getElementById('settings')) closeSettings();
});

// ── LOADING ──
function showLoading(v){
  const el=document.getElementById('loading');
  if(v){ el.classList.add('show'); setLoadingBar(0); }
  else el.classList.remove('show');
}
function setLoadingBar(pct){ document.getElementById('loading-bar').style.width=pct+'%'; }

// ── SCREEN SWITCH ──
function switchScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

// ── RESIZE ──
let resizeTimer;
window.addEventListener('resize',()=>{
  clearTimeout(resizeTimer);
  resizeTimer=setTimeout(()=>{ if(pdfDoc) renderPage(currentPage); },200);
});

// ── TOAST ──
let toastTimer;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2200);
}

loadCfg();
</script>
</body>
</html>
