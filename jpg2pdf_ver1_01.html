<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JPG → PDF</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1814;--bg2:#211f1b;--bg3:#2a2722;
  --surface:#302d27;--surface2:#3a3730;
  --accent:#c8a96e;--text:#e8e0d0;--text2:#a09880;--text3:#706858;
  --border:#3f3b34;--danger:#c06040;--ok:#7ec8a8;
  --font-ui:'Courier New',monospace;--font-body:'Georgia',serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body)}

/* HEADER */
header{
  padding:36px 0 24px;text-align:center;border-bottom:1px solid var(--border);position:relative;
}
header::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse 60% 100% at 50% 0%,rgba(200,169,110,.07) 0%,transparent 70%);
  pointer-events:none;
}
.h-label{font-family:var(--font-ui);font-size:10px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.h-title{font-family:var(--font-ui);font-size:24px;letter-spacing:5px;color:var(--accent);font-weight:normal;margin-bottom:4px}
.h-sub{font-family:var(--font-ui);font-size:10px;letter-spacing:2px;color:var(--text3)}

/* MAIN */
main{max-width:720px;margin:0 auto;padding:36px 20px 80px}

/* DROP ZONE */
#dropzone{
  border:1px dashed var(--border);padding:48px 24px;text-align:center;
  cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:24px;
  position:relative;
}
#dropzone:hover,#dropzone.drag{border-color:var(--accent);background:rgba(200,169,110,.04)}
#dropzone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.dz-icon{font-size:32px;margin-bottom:12px;opacity:.3}
.dz-text{font-family:var(--font-ui);font-size:12px;letter-spacing:2px;color:var(--text3)}
.dz-sub{font-family:var(--font-ui);font-size:10px;color:var(--text3);margin-top:6px;letter-spacing:1px}

/* TOOLBAR */
#toolbar{
  display:none;align-items:center;justify-content:space-between;gap:10px;
  padding:10px 14px;background:var(--bg2);border:1px solid var(--border);
  margin-bottom:16px;flex-wrap:wrap;
}
.tb-info{font-family:var(--font-ui);font-size:11px;color:var(--text2)}
.tb-info span{color:var(--accent)}
.tb-btns{display:flex;gap:8px}
.tb-btn{background:none;border:1px solid var(--border);color:var(--text2);font-family:var(--font-ui);font-size:11px;padding:5px 12px;cursor:pointer;letter-spacing:1px;transition:all .15s;white-space:nowrap}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}
.tb-btn.primary{border-color:var(--accent);color:var(--accent)}
.tb-btn.primary:hover{background:var(--accent);color:var(--bg)}
.tb-btn.danger{border-color:var(--danger);color:var(--danger)}
.tb-btn.danger:hover{background:var(--danger);color:var(--bg)}

/* IMAGE LIST */
#img-list{display:flex;flex-direction:column;gap:8px;margin-bottom:24px}

.img-card{
  display:flex;align-items:center;gap:12px;
  background:var(--bg2);border:1px solid var(--border);padding:10px 12px;
  cursor:grab;transition:border-color .15s,background .15s;
  user-select:none;
}
.img-card:active{cursor:grabbing}
.img-card.drag-over{border-color:var(--accent);background:var(--surface)}
.img-card.dragging{opacity:.4}

.card-num{
  font-family:var(--font-ui);font-size:11px;color:var(--text3);
  width:24px;text-align:center;flex-shrink:0;
}
.card-thumb{
  width:56px;height:44px;object-fit:cover;
  border:1px solid var(--border);flex-shrink:0;background:var(--bg3);
}
.card-thumb.rotated{transform:rotate(90deg);width:44px;height:56px;}
.card-info{flex:1;min-width:0}
.card-name{font-family:var(--font-ui);font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:3px}
.card-meta{font-family:var(--font-ui);font-size:10px;color:var(--text3)}
.card-badge{
  font-family:var(--font-ui);font-size:9px;letter-spacing:1px;
  padding:2px 7px;border:1px solid var(--border);color:var(--text3);
  flex-shrink:0;
}
.card-badge.rotated{color:var(--accent);border-color:var(--accent)}
.card-actions{display:flex;gap:6px;flex-shrink:0}
.c-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-family:var(--font-ui);font-size:12px;padding:3px 5px;transition:color .15s;line-height:1}
.c-btn:hover{color:var(--accent)}
.c-btn.del:hover{color:var(--danger)}

/* DRAG HANDLE */
.drag-handle{color:var(--text3);font-size:14px;cursor:grab;padding:0 4px;flex-shrink:0}

/* PROGRESS */
#progress-wrap{display:none;margin-bottom:20px}
.progress-label{font-family:var(--font-ui);font-size:11px;color:var(--text2);margin-bottom:8px;letter-spacing:1px}
.progress-bar-bg{height:3px;background:var(--border)}
.progress-bar{height:3px;background:var(--accent);width:0%;transition:width .2s}

/* DONE */
#done-msg{
  display:none;text-align:center;padding:24px;
  border:1px solid var(--ok);background:rgba(126,200,168,.05);
  margin-bottom:20px;
}
.done-icon{font-size:28px;margin-bottom:8px}
.done-text{font-family:var(--font-ui);font-size:12px;color:var(--ok);letter-spacing:2px}

/* FOOTER */
footer{text-align:center;padding:20px;border-top:1px solid var(--border);font-family:var(--font-ui);font-size:10px;letter-spacing:2px;color:var(--text3)}
</style>
</head>
<body>

<header>
  <div class="h-label">tools</div>
  <div class="h-title">JPG → PDF</div>
  <div class="h-sub">複数画像をA4縦PDFに変換</div>
</header>

<main>
  <!-- DROP ZONE -->
  <div id="dropzone">
    <input type="file" accept="image/jpeg,image/png,image/webp" multiple id="file-input">
    <div class="dz-icon">⊞</div>
    <div class="dz-text">クリックまたはドラッグ＆ドロップ</div>
    <div class="dz-sub">JPG / PNG / WEBP 対応 · 複数選択可</div>
  </div>

  <!-- TOOLBAR -->
  <div id="toolbar">
    <div class="tb-info">画像 <span id="img-count">0</span> 枚</div>
    <div class="tb-btns">
      <button class="tb-btn" onclick="addMore()">＋ 追加</button>
      <input type="file" accept="image/jpeg,image/png,image/webp" multiple id="add-input" style="display:none" onchange="onAddFiles(event)">
      <button class="tb-btn danger" onclick="clearAll()">✕ クリア</button>
      <button class="tb-btn primary" onclick="generatePDF()">↓ PDF生成</button>
    </div>
  </div>

  <!-- PROGRESS -->
  <div id="progress-wrap">
    <div class="progress-label" id="progress-label">処理中...</div>
    <div class="progress-bar-bg"><div class="progress-bar" id="progress-bar"></div></div>
  </div>

  <!-- DONE -->
  <div id="done-msg">
    <div class="done-icon">✦</div>
    <div class="done-text">PDF生成完了</div>
  </div>

  <!-- IMAGE LIST -->
  <div id="img-list"></div>
</main>

<footer>— jpg2pdf ver 1.01 —</footer>

<script>
const {jsPDF}=window.jspdf;
let images=[]; // {id, file, name, dataURL, w, h, rotate}
let dragSrcId=null;

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5)}

// ─── DROP ZONE ───
const dz=document.getElementById('dropzone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag');});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag'));
dz.addEventListener('drop',e=>{
  e.preventDefault();dz.classList.remove('drag');
  handleFiles(Array.from(e.dataTransfer.files));
});
document.getElementById('file-input').onchange=e=>handleFiles(Array.from(e.target.files));

function addMore(){document.getElementById('add-input').click();}
function onAddFiles(e){handleFiles(Array.from(e.target.files));e.target.value='';}

function handleFiles(files){
  const valid=files.filter(f=>f.type.startsWith('image/'));
  if(!valid.length)return;
  valid.forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        const rotate=img.width>img.height; // 横長なら自動回転
        images.push({id:uid(),file,name:file.name,dataURL:ev.target.result,w:img.width,h:img.height,rotate});
        images.sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true,sensitivity:'base'}));
        renderList();
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('dropzone').style.display='none';
  document.getElementById('toolbar').style.display='flex';
  document.getElementById('done-msg').style.display='none';
}

function clearAll(){
  images=[];
  document.getElementById('img-list').innerHTML='';
  document.getElementById('dropzone').style.display='block';
  document.getElementById('toolbar').style.display='none';
  document.getElementById('done-msg').style.display='none';
  document.getElementById('file-input').value='';
}

// ─── RENDER LIST ───
function renderList(){
  const list=document.getElementById('img-list');
  list.innerHTML='';
  document.getElementById('img-count').textContent=images.length;

  images.forEach((img,i)=>{
    const card=document.createElement('div');
    card.className='img-card';card.dataset.id=img.id;
    card.draggable=true;

    // drag events
    card.addEventListener('dragstart',e=>{dragSrcId=img.id;card.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    card.addEventListener('dragend',()=>{card.classList.remove('dragging');document.querySelectorAll('.img-card').forEach(c=>c.classList.remove('drag-over'));});
    card.addEventListener('dragover',e=>{e.preventDefault();card.classList.add('drag-over');});
    card.addEventListener('dragleave',()=>card.classList.remove('drag-over'));
    card.addEventListener('drop',e=>{
      e.preventDefault();card.classList.remove('drag-over');
      if(dragSrcId===img.id)return;
      const fromIdx=images.findIndex(x=>x.id===dragSrcId);
      const toIdx=i;
      const [moved]=images.splice(fromIdx,1);
      images.splice(toIdx,0,moved);
      renderList();
    });

    // handle
    const handle=document.createElement('span');handle.className='drag-handle';handle.textContent='⠿';handle.title='ドラッグして並び替え';

    // num
    const num=document.createElement('div');num.className='card-num';num.textContent=i+1;

    // thumb
    const thumb=document.createElement('img');
    thumb.className='card-thumb'+(img.rotate?' rotated':'');
    thumb.src=img.dataURL;thumb.alt='';

    // info
    const info=document.createElement('div');info.className='card-info';
    const name=document.createElement('div');name.className='card-name';name.textContent=img.name;
    const meta=document.createElement('div');meta.className='card-meta';
    meta.textContent=img.w+'×'+img.h+'px';
    info.append(name,meta);

    // badge
    const badge=document.createElement('div');
    badge.className='card-badge'+(img.rotate?' rotated':'');
    badge.textContent=img.rotate?'自動回転':'縦長';

    // actions
    const actions=document.createElement('div');actions.className='card-actions';
    const rotBtn=document.createElement('button');
    rotBtn.className='c-btn';rotBtn.title='回転切り替え';
    rotBtn.textContent='↻';
    rotBtn.onclick=e=>{e.stopPropagation();img.rotate=!img.rotate;renderList();};
    const delBtn=document.createElement('button');
    delBtn.className='c-btn del';delBtn.title='削除';delBtn.textContent='✕';
    delBtn.onclick=e=>{e.stopPropagation();images=images.filter(x=>x.id!==img.id);if(!images.length)clearAll();else renderList();};
    actions.append(rotBtn,delBtn);

    card.append(handle,num,thumb,info,badge,actions);
    list.appendChild(card);
  });
}

// ─── GENERATE PDF ───
async function generatePDF(){
  if(!images.length)return;

  document.getElementById('progress-wrap').style.display='block';
  document.getElementById('done-msg').style.display='none';
  const bar=document.getElementById('progress-bar');
  const lbl=document.getElementById('progress-label');

  // A4サイズ（mm）
  const A4W=210,A4H=297;
  const margin=8; // mm余白

  const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const areaW=A4W-margin*2;
  const areaH=A4H-margin*2;

  for(let i=0;i<images.length;i++){
    const img=images[i];
    lbl.textContent=`処理中 ${i+1} / ${images.length}  —  ${img.name}`;
    bar.style.width=((i/images.length)*100)+'%';

    if(i>0)pdf.addPage();

    // 回転が必要な場合はCanvasで回転処理
    let dataURL=img.dataURL;
    let srcW=img.w,srcH=img.h;

    if(img.rotate){
      const canvas=document.createElement('canvas');
      canvas.width=img.h;canvas.height=img.w;
      const ctx=canvas.getContext('2d');
      const im=new Image();
      await new Promise(res=>{im.onload=res;im.src=img.dataURL;});
      ctx.translate(img.h/2,img.w/2);
      ctx.rotate(Math.PI/2);
      ctx.drawImage(im,-img.w/2,-img.h/2);
      dataURL=canvas.toDataURL('image/jpeg',0.92);
      srcW=img.h;srcH=img.w;
    }

    // A4エリアに収まるようアスペクト比を保って縮小
    const scaleW=areaW/srcW;
    const scaleH=areaH/srcH;
    const scale=Math.min(scaleW,scaleH,1);
    const dstW=srcW*scale;
    const dstH=srcH*scale;
    const x=margin+(areaW-dstW)/2;
    const y=margin+(areaH-dstH)/2;

    const fmt=img.file.type==='image/png'?'PNG':'JPEG';
    pdf.addImage(dataURL,fmt,x,y,dstW,dstH);

    // 非同期でUIをブロックしないよう少し待つ
    await new Promise(res=>setTimeout(res,10));
  }

  bar.style.width='100%';
  lbl.textContent='完了';

  setTimeout(()=>{
    document.getElementById('progress-wrap').style.display='none';
    document.getElementById('done-msg').style.display='block';
    pdf.save('output_'+new Date().toISOString().slice(0,10)+'.pdf');
  },400);
}
</script>
</body>
</html>
