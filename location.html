<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>材料位置照会</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1814;--bg2:#211f1b;--bg3:#2a2722;
  --surface:#302d27;--surface2:#3a3730;
  --accent:#c8a96e;--text:#e8e0d0;--text2:#a09880;--text3:#706858;
  --border:#3f3b34;--ok:#7ec8a8;--danger:#c06040;--warn:#c8a040;
  --font-ui:'Courier New',monospace;--font-body:'Georgia',serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body)}

/* HEADER */
header{padding:36px 0 24px;text-align:center;border-bottom:1px solid var(--border);position:relative;}
header::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 100% at 50% 0%,rgba(200,169,110,.07) 0%,transparent 70%);pointer-events:none;}
.h-label{font-family:var(--font-ui);font-size:10px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-bottom:8px}
.h-title{font-family:var(--font-ui);font-size:22px;letter-spacing:4px;color:var(--accent);font-weight:normal;margin-bottom:4px}
.h-sub{font-family:var(--font-ui);font-size:10px;letter-spacing:2px;color:var(--text3)}

/* MAIN */
main{max-width:600px;margin:0 auto;padding:28px 16px 80px}

/* TAB */
.tab-wrap{display:flex;border:1px solid var(--border);margin-bottom:24px}
.tab-btn{
  flex:1;padding:13px 6px;text-align:center;cursor:pointer;
  font-family:var(--font-ui);font-size:11px;letter-spacing:2px;
  color:var(--text3);background:var(--bg2);border:none;border-right:1px solid var(--border);
  transition:background .15s,color .15s;
}
.tab-btn:last-child{border-right:none}
.tab-btn.active{background:var(--surface);color:var(--accent)}

/* PANEL */
.panel{display:none}
.panel.active{display:block}

/* SEC LABEL */
.sec-label{font-family:var(--font-ui);font-size:10px;letter-spacing:3px;color:var(--text3);text-transform:uppercase;margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);}

/* INPUT ROW */
.input-row{display:flex;align-items:stretch;border:1px solid var(--border);background:var(--bg2);overflow:hidden;margin-bottom:10px;}
.input-row:focus-within{border-color:var(--accent)}
.input-lbl{font-family:var(--font-ui);font-size:11px;color:var(--text3);background:var(--bg3);padding:0 14px;display:flex;align-items:center;border-right:1px solid var(--border);min-width:88px;flex-shrink:0;white-space:nowrap;letter-spacing:1px}
.input-lbl span{color:var(--accent);margin-right:4px}
.input-field{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font-ui);font-size:20px;padding:16px 14px;width:100%;-webkit-appearance:none;}
.input-field::placeholder{color:var(--text3);font-size:14px}
.input-field::-webkit-outer-spin-button,.input-field::-webkit-inner-spin-button{-webkit-appearance:none}

/* SELECT */
.sel-wrap{display:flex;align-items:stretch;border:1px solid var(--border);background:var(--bg2);overflow:hidden;margin-bottom:10px;}
.sel-wrap:focus-within{border-color:var(--accent)}
.sel-field{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:var(--font-ui);font-size:16px;padding:16px 14px;cursor:pointer;-webkit-appearance:none;appearance:none;}
.sel-field option{background:var(--bg2);color:var(--text)}
.sel-arrow{padding:0 14px;display:flex;align-items:center;color:var(--text3);font-size:12px;pointer-events:none;border-left:1px solid var(--border)}

/* ACTION BUTTON */
.act-btn{
  width:100%;padding:16px;background:none;border:1px solid var(--accent);
  color:var(--accent);font-family:var(--font-ui);font-size:13px;letter-spacing:4px;
  cursor:pointer;transition:background .15s,color .15s;margin-bottom:16px;
}
.act-btn:hover{background:var(--accent);color:var(--bg)}
.act-btn.danger{border-color:var(--danger);color:var(--danger)}
.act-btn.danger:hover{background:var(--danger);color:var(--bg)}

/* RESULT CARD */
.result-card{border:1px solid var(--border);background:var(--bg2);padding:18px;margin-bottom:10px;}
.result-card.ok{border-color:var(--ok)}
.result-card.warn{border-color:var(--warn)}
.result-card.err{border-color:var(--danger)}
.rc-head{font-family:var(--font-ui);font-size:10px;letter-spacing:3px;color:var(--text3);margin-bottom:10px}
.rc-main{font-family:var(--font-ui);font-size:22px;color:var(--accent);margin-bottom:6px;word-break:break-all}
.rc-sub{font-family:var(--font-ui);font-size:11px;color:var(--text2);line-height:1.8}
.rc-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.rc-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border)}
.rc-item .tag{font-family:var(--font-ui);font-size:11px;color:var(--accent);min-width:100px;flex-shrink:0;word-break:break-all}
.rc-item .val{font-family:var(--font-ui);font-size:12px;color:var(--text2);flex:1;word-break:break-all}
.rc-item .out-btn{background:none;border:1px solid var(--border);color:var(--text3);font-family:var(--font-ui);font-size:10px;padding:4px 10px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.rc-item .out-btn:hover{border-color:var(--danger);color:var(--danger)}

/* TOAST */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);
  font-family:var(--font-ui);font-size:11px;letter-spacing:2px;
  padding:10px 24px;border:1px solid var(--border);background:var(--surface);color:var(--text2);
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:999;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.ok{border-color:var(--ok);color:var(--ok)}
#toast.err{border-color:var(--danger);color:var(--danger)}

/* 番地管理 */
.loc-list{display:flex;flex-direction:column;gap:4px;margin-bottom:16px}
.loc-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--bg2);border:1px solid var(--border)}
.loc-item .loc-name{font-family:var(--font-ui);font-size:13px;color:var(--text);flex:1;word-break:break-all}
.loc-item .loc-cnt{font-family:var(--font-ui);font-size:10px;color:var(--text3);min-width:56px;text-align:right}
.loc-item .edit-btn,.loc-item .del-btn{background:none;border:1px solid var(--border);color:var(--text3);font-family:var(--font-ui);font-size:10px;padding:4px 8px;cursor:pointer;transition:all .15s;white-space:nowrap}
.loc-item .edit-btn:hover{border-color:var(--accent);color:var(--accent)}
.loc-item .del-btn:hover{border-color:var(--danger);color:var(--danger)}

/* モーダル */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center;padding:16px}
#modal-overlay.open{display:flex}
#modal{background:var(--bg2);border:1px solid var(--border);padding:24px;width:100%;max-width:400px}
.modal-title{font-family:var(--font-ui);font-size:12px;letter-spacing:3px;color:var(--accent);margin-bottom:16px}
.modal-btns{display:flex;gap:8px;margin-top:16px}
.modal-btn{flex:1;padding:12px;background:none;border:1px solid var(--border);color:var(--text2);font-family:var(--font-ui);font-size:11px;letter-spacing:2px;cursor:pointer;transition:all .15s}
.modal-btn.primary{border-color:var(--accent);color:var(--accent)}
.modal-btn.primary:hover{background:var(--accent);color:var(--bg)}
.modal-btn:hover{border-color:var(--text2);color:var(--text)}

/* 重複確認バナー */
#dup-banner{display:none;border:1px solid var(--warn);background:rgba(200,160,64,.06);padding:14px 16px;margin-bottom:10px}
.dup-msg{font-family:var(--font-ui);font-size:11px;color:var(--warn);letter-spacing:1px;margin-bottom:10px}
.dup-list{font-family:var(--font-ui);font-size:11px;color:var(--text2);margin-bottom:12px;line-height:1.8}
.dup-btns{display:flex;gap:8px}
.dup-btn{flex:1;padding:10px;background:none;border:1px solid var(--border);color:var(--text2);font-family:var(--font-ui);font-size:11px;letter-spacing:1px;cursor:pointer;transition:all .15s}
.dup-btn.ok{border-color:var(--accent);color:var(--accent)}
.dup-btn.ok:hover{background:var(--accent);color:var(--bg)}
.dup-btn:hover{border-color:var(--text2)}

footer{text-align:center;padding:20px;border-top:1px solid var(--border);font-family:var(--font-ui);font-size:10px;letter-spacing:2px;color:var(--text3)}

@media(max-width:480px){
  .h-title{font-size:18px;letter-spacing:3px}
  main{padding:20px 12px 60px}
  .tab-btn{font-size:10px;letter-spacing:1px;padding:12px 4px}
  .rc-main{font-size:18px}
  .input-lbl{min-width:72px;font-size:10px}
}
</style>
</head>
<body>

<header>
  <div class="h-label">tools</div>
  <div class="h-title">LOCATION</div>
  <div class="h-sub">材料位置照会システム</div>
</header>

<main>
  <!-- TABS -->
  <div class="tab-wrap">
    <button class="tab-btn active" onclick="switchTab('tab-in')">入庫</button>
    <button class="tab-btn" onclick="switchTab('tab-out')">出庫</button>
    <button class="tab-btn" onclick="switchTab('tab-search')">照会</button>
    <button class="tab-btn" onclick="switchTab('tab-loc')">番地管理</button>
  </div>

  <!-- ===== 入庫 ===== -->
  <div class="panel active" id="tab-in">
    <div class="sec-label">入庫 — 倉番を番地に格納</div>

    <div class="sel-wrap">
      <div class="input-lbl"><span>▣</span>番地</div>
      <select class="sel-field" id="in-loc"></select>
      <div class="sel-arrow">▾</div>
    </div>

    <div class="input-row">
      <div class="input-lbl"><span>#</span>倉番</div>
      <input class="input-field" id="in-num" type="text" inputmode="numeric" maxlength="8" placeholder="7桁の番号">
    </div>

    <!-- 重複バナー -->
    <div id="dup-banner">
      <div class="dup-msg">⚠ この倉番はすでに登録されています</div>
      <div class="dup-list" id="dup-detail"></div>
      <div class="dup-btns">
        <button class="dup-btn" onclick="cancelDup()">キャンセル</button>
        <button class="dup-btn ok" onclick="confirmDup()">別個体として入庫 →</button>
      </div>
    </div>

    <button class="act-btn" onclick="doIn()">入庫 →</button>
    <div id="in-result"></div>
  </div>

  <!-- ===== 出庫 ===== -->
  <div class="panel" id="tab-out">
    <div class="sec-label">出庫 — 倉番の紐づけを解除</div>

    <div class="input-row">
      <div class="input-lbl"><span>#</span>倉番</div>
      <input class="input-field" id="out-num" type="text" inputmode="numeric" maxlength="9" placeholder="7桁（枝番あれば -1 等）">
    </div>

    <button class="act-btn danger" onclick="doOut()">出庫 →</button>
    <div id="out-result"></div>
  </div>

  <!-- ===== 照会 ===== -->
  <div class="panel" id="tab-search">
    <div class="sec-label">照会</div>

    <!-- 番地→倉番 -->
    <div style="margin-bottom:20px">
      <div style="font-family:var(--font-ui);font-size:10px;letter-spacing:2px;color:var(--text3);margin-bottom:8px">番地から検索</div>
      <div class="sel-wrap">
        <div class="input-lbl"><span>▣</span>番地</div>
        <select class="sel-field" id="search-loc"></select>
        <div class="sel-arrow">▾</div>
      </div>
      <button class="act-btn" style="margin-top:2px" onclick="searchByLoc()">この番地を照会 →</button>
      <div id="search-loc-result"></div>
    </div>

    <!-- 倉番→番地 -->
    <div>
      <div style="font-family:var(--font-ui);font-size:10px;letter-spacing:2px;color:var(--text3);margin-bottom:8px">倉番から検索</div>
      <div class="input-row">
        <div class="input-lbl"><span>#</span>倉番</div>
        <input class="input-field" id="search-num" type="text" inputmode="numeric" maxlength="7" placeholder="7桁の番号">
      </div>
      <button class="act-btn" onclick="searchByNum()">この倉番を照会 →</button>
      <div id="search-num-result"></div>
    </div>
  </div>

  <!-- ===== 番地管理 ===== -->
  <div class="panel" id="tab-loc">
    <div class="sec-label">番地管理</div>

    <div class="input-row" style="margin-bottom:10px">
      <div class="input-lbl"><span>＋</span>新規</div>
      <input class="input-field" id="new-loc-name" type="text" placeholder="番地名称を入力" style="font-size:16px">
    </div>
    <button class="act-btn" onclick="addLoc()">番地を新設 →</button>

    <div class="sec-label" style="margin-top:4px">登録済み番地</div>
    <div class="loc-list" id="loc-list"></div>
  </div>

</main>

<footer>— location ver 1.00 —</footer>

<!-- MODAL（番地名称編集） -->
<div id="modal-overlay">
  <div id="modal">
    <div class="modal-title">番地名称を編集</div>
    <div class="input-row" style="margin-bottom:0">
      <input class="input-field" id="modal-input" type="text" style="font-size:16px">
    </div>
    <div class="modal-btns">
      <button class="modal-btn" onclick="closeModal()">キャンセル</button>
      <button class="modal-btn primary" onclick="saveModal()">保存</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ─── STORAGE ───
const LS = {
  key_loc: 'loc_locations',   // [{id, name}]
  key_items: 'loc_items',     // [{id, num, locId, branch}]  branch=0なら枝番なし

  getLocs() { try{return JSON.parse(localStorage.getItem(this.key_loc)||'[]')}catch{return[]} },
  saveLocs(v){ localStorage.setItem(this.key_loc, JSON.stringify(v)) },

  getItems() { try{return JSON.parse(localStorage.getItem(this.key_items)||'[]')}catch{return[]} },
  saveItems(v){ localStorage.setItem(this.key_items, JSON.stringify(v)) },

  uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,5) }
};

// ─── INIT ───
let editLocId = null;

function init(){
  refreshLocSelects();
  renderLocList();
}

function refreshLocSelects(){
  const locs = LS.getLocs();
  const opt = l => locs.map(x=>`<option value="${x.id}">${esc(x.name)}</option>`).join('');
  ['in-loc','search-loc'].forEach(id=>{
    const el = document.getElementById(id);
    const cur = el.value;
    el.innerHTML = locs.length ? opt() : '<option value="">— 番地未登録 —</option>';
    if(cur && locs.find(x=>x.id===cur)) el.value = cur;
  });
}

// ─── TAB ───
function switchTab(id){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  event.currentTarget.classList.add('active');
  hideDupBanner();
}

// ─── 番地管理 ───
function addLoc(){
  const name = document.getElementById('new-loc-name').value.trim();
  if(!name){ toast('名称を入力してください','err'); return; }
  const locs = LS.getLocs();
  if(locs.find(x=>x.name===name)){ toast('同名の番地が既に存在します','err'); return; }
  locs.push({id:LS.uid(), name});
  LS.saveLocs(locs);
  document.getElementById('new-loc-name').value='';
  refreshLocSelects();
  renderLocList();
  toast('番地「'+name+'」を新設しました','ok');
}

function renderLocList(){
  const locs = LS.getLocs();
  const items = LS.getItems();
  const el = document.getElementById('loc-list');
  if(!locs.length){ el.innerHTML='<div style="font-family:var(--font-ui);font-size:11px;color:var(--text3);padding:12px">番地が登録されていません</div>'; return; }
  el.innerHTML = locs.map(l=>{
    const cnt = items.filter(x=>x.locId===l.id).length;
    return `<div class="loc-item">
      <div class="loc-name">${esc(l.name)}</div>
      <div class="loc-cnt">${cnt}件</div>
      <button class="edit-btn" onclick="openEditModal('${l.id}')">編集</button>
      <button class="del-btn" onclick="deleteLoc('${l.id}')">削除</button>
    </div>`;
  }).join('');
}

function deleteLoc(id){
  const items = LS.getItems();
  if(items.find(x=>x.locId===id)){
    toast('材料が格納されています。先に出庫してください','err'); return;
  }
  const locs = LS.getLocs().filter(x=>x.id!==id);
  LS.saveLocs(locs);
  refreshLocSelects();
  renderLocList();
  toast('番地を削除しました');
}

function openEditModal(id){
  editLocId = id;
  const loc = LS.getLocs().find(x=>x.id===id);
  document.getElementById('modal-input').value = loc ? loc.name : '';
  document.getElementById('modal-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('modal-input').focus(),100);
}

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); editLocId=null; }

function saveModal(){
  const name = document.getElementById('modal-input').value.trim();
  if(!name){ toast('名称を入力してください','err'); return; }
  const locs = LS.getLocs();
  const dup = locs.find(x=>x.name===name && x.id!==editLocId);
  if(dup){ toast('同名の番地が既に存在します','err'); return; }
  const idx = locs.findIndex(x=>x.id===editLocId);
  if(idx>=0){ locs[idx].name=name; LS.saveLocs(locs); }
  closeModal();
  refreshLocSelects();
  renderLocList();
  toast('番地名称を変更しました','ok');
}

// ─── 入庫 ───
let pendingIn = null; // {locId, baseNum, newBranch}

function doIn(){
  hideDupBanner();
  document.getElementById('in-result').innerHTML='';

  const locId = document.getElementById('in-loc').value;
  const raw = document.getElementById('in-num').value.trim().replace(/\s/g,'');

  if(!locId){ toast('番地を選択してください','err'); return; }
  if(!/^\d{7}$/.test(raw)){ toast('倉番は7桁の数字で入力してください','err'); return; }

  const items = LS.getItems();
  const existing = items.filter(x=>x.num===raw);

  if(existing.length){
    // 重複あり → バナー表示
    const locs = LS.getLocs();
    const detail = existing.map(x=>{
      const loc = locs.find(l=>l.id===x.locId);
      const branch = x.branch ? `-${x.branch}` : '';
      return `${raw}${branch} → ${loc ? loc.name : '不明'}`;
    }).join('<br>');
    document.getElementById('dup-detail').innerHTML = detail;
    document.getElementById('dup-banner').style.display='block';
    const newBranch = Math.max(...existing.map(x=>x.branch||0)) + 1;
    pendingIn = {locId, baseNum:raw, newBranch};
    return;
  }

  // 重複なし → そのまま入庫
  commitIn(locId, raw, 0);
}

function cancelDup(){
  hideDupBanner();
  pendingIn=null;
}

function confirmDup(){
  if(!pendingIn) return;
  commitIn(pendingIn.locId, pendingIn.baseNum, pendingIn.newBranch);
  pendingIn=null;
  hideDupBanner();
}

function commitIn(locId, num, branch){
  const items = LS.getItems();
  items.push({id:LS.uid(), num, locId, branch});
  LS.saveItems(items);

  const locs = LS.getLocs();
  const locName = locs.find(x=>x.id===locId)?.name || '';
  const branchStr = branch ? `-${branch}（枝番）` : '';
  const display = num + branchStr;

  document.getElementById('in-result').innerHTML =
    `<div class="result-card ok">
      <div class="rc-head">入庫完了</div>
      <div class="rc-main">${esc(locName)}</div>
      <div class="rc-sub">倉番 ${esc(display)} を格納しました</div>
    </div>`;

  document.getElementById('in-num').value='';
  renderLocList();
  toast('入庫しました','ok');
}

function hideDupBanner(){
  document.getElementById('dup-banner').style.display='none';
}

// ─── 出庫 ───
function doOut(){
  document.getElementById('out-result').innerHTML='';
  const raw = document.getElementById('out-num').value.trim().replace(/\s/g,'');
  if(!raw){ toast('倉番を入力してください','err'); return; }

  const items = LS.getItems();

  // "1234567" → branch=0のみ, "1234567-2" → branch=2 のみ
  let targets;
  const m = raw.match(/^(\d{7})-(\d+)$/);
  if(m){
    const num=m[1], branch=parseInt(m[2]);
    targets = items.filter(x=>x.num===num && x.branch===branch);
  } else if(/^\d{7}$/.test(raw)){
    targets = items.filter(x=>x.num===raw && x.branch===0);
  } else {
    toast('倉番の形式が正しくありません（7桁、または7桁-枝番）','err'); return;
  }

  if(!targets.length){
    document.getElementById('out-result').innerHTML =
      `<div class="result-card err"><div class="rc-head">エラー</div><div class="rc-sub">「${esc(raw)}」は登録されていません</div></div>`;
    return;
  }

  const locs = LS.getLocs();
  const removed = targets.map(t=>{
    const loc = locs.find(l=>l.id===t.locId);
    return { label: raw + (t.branch ? `-${t.branch}` : ''), loc: loc?.name||'不明' };
  });

  const newItems = items.filter(x=>!targets.find(t=>t.id===x.id));
  LS.saveItems(newItems);

  document.getElementById('out-result').innerHTML =
    `<div class="result-card ok">
      <div class="rc-head">出庫完了</div>
      <div class="rc-list">${removed.map(r=>`<div class="rc-item"><span class="tag">${esc(r.label)}</span><span class="val">${esc(r.loc)} から出庫</span></div>`).join('')}</div>
    </div>`;

  document.getElementById('out-num').value='';
  renderLocList();
  toast('出庫しました','ok');
}

// ─── 照会 ───
function searchByLoc(){
  const locId = document.getElementById('search-loc').value;
  const el = document.getElementById('search-loc-result');
  if(!locId){ toast('番地を選択してください','err'); return; }

  const items = LS.getItems().filter(x=>x.locId===locId);
  const locs = LS.getLocs();
  const locName = locs.find(x=>x.id===locId)?.name || '';

  if(!items.length){
    el.innerHTML=`<div class="result-card"><div class="rc-head">照会結果</div><div class="rc-sub">「${esc(locName)}」には何も格納されていません</div></div>`;
    return;
  }

  const rows = items.map(x=>{
    const br = x.branch ? `-${x.branch}` : '';
    return `<div class="rc-item"><span class="tag">${x.num}${br}</span></div>`;
  }).join('');

  el.innerHTML=`<div class="result-card ok">
    <div class="rc-head">照会結果 — ${esc(locName)}</div>
    <div class="rc-sub">${items.length}件格納中</div>
    <div class="rc-list">${rows}</div>
  </div>`;
}

function searchByNum(){
  const raw = document.getElementById('search-num').value.trim().replace(/\s/g,'');
  const el = document.getElementById('search-num-result');

  if(!/^\d{7}$/.test(raw)){ toast('倉番は7桁で入力してください','err'); return; }

  const items = LS.getItems().filter(x=>x.num===raw);
  const locs = LS.getLocs();

  if(!items.length){
    el.innerHTML=`<div class="result-card"><div class="rc-head">照会結果</div><div class="rc-sub">「${raw}」は登録されていません</div></div>`;
    return;
  }

  const rows = items.map(x=>{
    const loc = locs.find(l=>l.id===x.locId);
    const br = x.branch ? `-${x.branch}（枝番）` : '';
    const outBtn = `<button class="out-btn" onclick="quickOut('${x.id}')">出庫</button>`;
    return `<div class="rc-item"><span class="tag">${raw}${br}</span><span class="val">${loc ? esc(loc.name) : '不明'}</span>${outBtn}</div>`;
  }).join('');

  const card = items.length > 1
    ? `<div class="result-card warn">`
    : `<div class="result-card ok">`;

  el.innerHTML=`${card}
    <div class="rc-head">照会結果</div>
    <div class="rc-main">${items.length>1 ? items.length+'件ヒット（別個体あり）' : locs.find(l=>l.id===items[0].locId)?.name||'不明'}</div>
    <div class="rc-list">${rows}</div>
  </div>`;
}

// 照会画面から直接出庫
function quickOut(itemId){
  const items = LS.getItems();
  const t = items.find(x=>x.id===itemId);
  if(!t) return;
  const locs = LS.getLocs();
  const locName = locs.find(l=>l.id===t.locId)?.name||'不明';
  const br = t.branch ? `-${t.branch}` : '';
  LS.saveItems(items.filter(x=>x.id!==itemId));
  renderLocList();
  // 再検索
  searchByNum();
  toast(`${t.num}${br} を ${locName} から出庫しました`,'ok');
}

// ─── UTILS ───
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }

let toastTimer;
function toast(msg, type=''){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.className='show'+(type?' '+type:'');
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.className='',2400);
}

// Enter で実行
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter') return;
  const active = document.querySelector('.panel.active');
  if(!active) return;
  const id = active.id;
  if(id==='tab-in') doIn();
  else if(id==='tab-out') doOut();
  else if(id==='tab-search'){
    const focused = document.activeElement;
    if(focused && focused.id==='search-num') searchByNum();
    else searchByLoc();
  } else if(id==='tab-loc') addLoc();
});

document.getElementById('modal-input').addEventListener('keydown',e=>{ if(e.key==='Enter') saveModal(); });
document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('modal-overlay')) closeModal(); });

init();
</script>
</body>
</html>
