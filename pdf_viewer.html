<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>PDF Viewer</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1814;--bg2:#211f1b;--bg3:#2a2722;--surface:#302d27;
  --accent:#c8a96e;--text:#e8e0d0;--text2:#a09880;--text3:#706858;
  --border:#3f3b34;
  --font-ui:'Courier New',monospace;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font-ui)}

.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}

/* OPEN */
#screen-open{background:var(--bg)}
#screen-open::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 60% at 50% 40%,rgba(200,169,110,.06) 0%,transparent 70%);pointer-events:none;}
.open-label{font-size:10px;letter-spacing:4px;color:var(--text3);text-transform:uppercase;margin-bottom:12px}
.open-title{font-size:26px;letter-spacing:5px;color:var(--accent);font-weight:normal;margin-bottom:6px}
.open-sub{font-size:10px;letter-spacing:2px;color:var(--text3);margin-bottom:48px}
.open-btn{position:relative;border:1px solid var(--accent);padding:18px 48px;font-size:12px;letter-spacing:4px;color:var(--accent);background:none;cursor:pointer;transition:background .15s,color .15s;z-index:1;display:block;width:220px;text-align:center;margin-bottom:16px}
.open-btn:hover{background:var(--accent);color:var(--bg)}
.open-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.open-btn-drive{border:1px solid var(--text3);padding:18px 48px;font-size:12px;letter-spacing:4px;color:var(--text2);background:none;cursor:pointer;transition:background .15s,color .15s;z-index:1;width:220px;text-align:center}
.open-btn-drive:hover{border-color:var(--accent);color:var(--accent)}

/* VIEWER */
#screen-viewer{background:#111;justify-content:center;align-items:center}

#canvas-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
#pdf-canvas{display:block;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}

/* HUD */
#hud-top{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:linear-gradient(to bottom,rgba(0,0,0,.75),transparent);z-index:10;transition:opacity .3s}
#hud-top.hidden{opacity:0;pointer-events:none}
.hud-filename{font-size:10px;letter-spacing:1px;color:rgba(255,255,255,.45);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:65%}
.hud-page{font-size:13px;letter-spacing:2px;color:var(--accent)}

#hud-bot{position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;gap:8px;padding:12px 14px;background:linear-gradient(to top,rgba(0,0,0,.75),transparent);z-index:10;transition:opacity .3s}
#hud-bot.hidden{opacity:0;pointer-events:none}
.hud-btn{background:none;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.6);font-family:var(--font-ui);font-size:11px;letter-spacing:1px;padding:7px 13px;cursor:pointer;transition:all .15s;white-space:nowrap}
.hud-btn:hover,.hud-btn:active{border-color:var(--accent);color:var(--accent)}
.hud-spacer{flex:1}

/* LOADING */
#loading{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,.8);z-index:20}
#loading.show{display:flex}
.loading-text{font-size:11px;letter-spacing:3px;color:var(--text2)}
.loading-bar-bg{width:160px;height:2px;background:var(--border)}
.loading-bar{height:2px;background:var(--accent);width:0%;transition:width .3s}

/* SETTINGS */
#settings{position:absolute;inset:0;background:rgba(0,0,0,.88);z-index:30;display:none;align-items:center;justify-content:center;padding:20px}
#settings.open{display:flex}
.s-box{background:var(--bg2);border:1px solid var(--border);padding:24px;width:100%;max-width:340px;max-height:88vh;overflow-y:auto}
.s-title{font-size:12px;letter-spacing:3px;color:var(--accent);margin-bottom:20px}
.s-row{margin-bottom:16px}
.s-lbl{font-size:10px;letter-spacing:2px;color:var(--text3);margin-bottom:8px}
.s-seg{display:flex;border:1px solid var(--border)}
.s-seg-btn{flex:1;padding:10px 4px;text-align:center;font-size:11px;letter-spacing:1px;color:var(--text3);background:var(--bg2);border:none;cursor:pointer;border-right:1px solid var(--border);transition:all .15s;font-family:var(--font-ui)}
.s-seg-btn:last-child{border-right:none}
.s-seg-btn.on{background:var(--surface);color:var(--accent)}
.s-num{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-size:16px;padding:10px 12px;outline:none}
.s-num:focus{border-color:var(--accent)}
.s-hr{border:none;border-top:1px solid var(--border);margin:16px 0}
.s-close{width:100%;padding:12px;background:none;border:1px solid var(--accent);color:var(--accent);font-family:var(--font-ui);font-size:12px;letter-spacing:3px;cursor:pointer;transition:all .15s;margin-top:4px}
.s-close:hover{background:var(--accent);color:var(--bg)}

/* TOAST */
#toast{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(8px);font-size:11px;letter-spacing:2px;padding:8px 20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap;z-index:99}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* PAGE ANIM */
.slide-next{animation:sln .16s ease-out}
.slide-prev{animation:slp .16s ease-out}
.reel-next{animation:rln .16s ease-out}
.reel-prev{animation:rlp .16s ease-out}
@keyframes sln{from{opacity:.3;transform:translateX(-4%)}to{opacity:1;transform:translateX(0)}}
@keyframes slp{from{opacity:.3;transform:translateX(4%)}to{opacity:1;transform:translateX(0)}}
@keyframes rln{from{opacity:.3;transform:translateY(-3%)}to{opacity:1;transform:translateY(0)}}
@keyframes rlp{from{opacity:.3;transform:translateY(3%)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<!-- OPEN -->
<div class="screen active" id="screen-open">
  <div class="open-label">tools</div>
  <div class="open-title">PDF VIEWER</div>
  <div class="open-sub">PDFを開く</div>
  <button class="open-btn">
    <input type="file" id="file-input" accept=".pdf,application/pdf">
    OPEN LOCAL →
  </button>
  <button class="open-btn-drive" id="btn-drive-open">
    ▲ GOOGLE DRIVE
  </button>
</div>

<!-- VIEWER -->
<div class="screen" id="screen-viewer">
  <div id="canvas-wrap">
    <canvas id="pdf-canvas"></canvas>
  </div>

  <div id="loading">
    <div class="loading-text">LOADING...</div>
    <div class="loading-bar-bg"><div class="loading-bar" id="lbar"></div></div>
  </div>

  <div id="hud-top">
    <div class="hud-filename" id="hud-fname">—</div>
    <div class="hud-page" id="hud-page">— / —</div>
  </div>

  <div id="hud-bot">
    <button class="hud-btn" id="btn-open2">⊞ ローカル</button>
    <input type="file" id="file-input2" accept=".pdf,application/pdf" style="display:none">
    <button class="hud-btn" id="btn-drive2">▲ Drive</button>
    <div class="hud-spacer"></div>
    <button class="hud-btn" id="btn-prev">← 前</button>
    <button class="hud-btn" id="btn-next">次 →</button>
    <div class="hud-spacer"></div>
    <button class="hud-btn" id="btn-cfg">⚙</button>
  </div>

  <!-- SETTINGS -->
  <div id="settings">
    <div class="s-box">
      <div class="s-title">SETTINGS</div>

      <div class="s-row">
        <div class="s-lbl">スワイプ方向</div>
        <div class="s-seg" id="seg-dir">
          <button class="s-seg-btn on" data-v="h">横スワイプ</button>
          <button class="s-seg-btn" data-v="v">縦（リール）</button>
        </div>
      </div>

      <div class="s-row" id="row-rev">
        <div class="s-lbl">横スワイプの向き</div>
        <div class="s-seg" id="seg-rev">
          <button class="s-seg-btn on" data-v="0">右→次ページ</button>
          <button class="s-seg-btn" data-v="1">左→次ページ</button>
        </div>
      </div>

      <hr class="s-hr">

      <div class="s-row">
        <div class="s-lbl">左右はみ出し量（%）</div>
        <input class="s-num" type="number" id="s-ov" min="-20" max="30" value="3" inputmode="decimal">
      </div>

      <hr class="s-hr">

      <div class="s-row">
        <div class="s-lbl">HUD自動非表示</div>
        <div class="s-seg" id="seg-hud">
          <button class="s-seg-btn on" data-v="1">ON</button>
          <button class="s-seg-btn" data-v="0">OFF</button>
        </div>
      </div>

      <button class="s-close" id="btn-cfg-close">CLOSE</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── PDF.js CDN ──
(function(){
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js';
  s.onload=function(){
    pdfjsLib.GlobalWorkerOptions.workerSrc=
      'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
    init();
  };
  s.onerror=function(){
    const s2=document.createElement('script');
    s2.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js';
    s2.onload=function(){
      pdfjsLib.GlobalWorkerOptions.workerSrc=
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';
      init();
    };
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
})();

// ── Google API ──
const GAPI_CLIENT_ID='320242001573-c0rcqjq8p5ur0tuivcvgd40mcqkbldcd.apps.googleusercontent.com';
const GAPI_KEY='AIzaSyCPx0UFfXf2yWgvRz9L0oU5FDVTyk9dWM0';
let gapiReady=false, pickerReady=false, gapiInited=false, gisInited=false;
let tokenClient=null, accessToken=null;

function loadGoogleAPIs(){
  // gapi
  const s1=document.createElement('script');
  s1.src='https://apis.google.com/js/api.js';
  s1.onload=()=>{
    gapi.load('client:picker',()=>{
      gapi.client.init({}).then(()=>{
        gapiReady=true; pickerReady=true;
      });
    });
  };
  document.head.appendChild(s1);
  // gis
  const s2=document.createElement('script');
  s2.src='https://accounts.google.com/gsi/client';
  s2.onload=()=>{
    tokenClient=google.accounts.oauth2.initTokenClient({
      client_id:GAPI_CLIENT_ID,
      scope:'https://www.googleapis.com/auth/drive.readonly',
      callback:''// 後でセット
    });
    gisInited=true;
  };
  document.head.appendChild(s2);
}

function openDrivePicker(){
  if(!gisInited||!gapiReady){
    toast('Google APIを読み込み中です。しばらくお待ちください');return;
  }
  const showPicker=()=>{
    const picker=new google.picker.PickerBuilder()
      .addView(new google.picker.DocsView()
        .setIncludeFolders(false)
        .setMimeTypes('application/pdf'))
      .setOAuthToken(accessToken)
      .setDeveloperKey(GAPI_KEY)
      .setCallback(pickerCallback)
      .build();
    picker.setVisible(true);
  };

  if(accessToken){
    showPicker();
  } else {
    tokenClient.callback=(resp)=>{
      if(resp.error){toast('Googleログインに失敗しました');return;}
      accessToken=resp.access_token;
      showPicker();
    };
    tokenClient.requestAccessToken({prompt:'consent'});
  }
}

async function pickerCallback(data){
  if(data.action!==google.picker.Action.PICKED)return;
  const file=data.docs[0];
  const fname=file.name;
  const fileId=file.id;
  toast('ダウンロード中...');
  showLoading(true);
  switchTo('viewer');
  document.getElementById('hud-fname').textContent=fname;
  try{
    const resp=await fetch(
      `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`,
      {headers:{Authorization:`Bearer ${accessToken}`}}
    );
    if(!resp.ok)throw new Error('Drive APIエラー: '+resp.status);
    const ab=await resp.arrayBuffer();
    const task=pdfjsLib.getDocument({data:new Uint8Array(ab)});
    task.onProgress=p=>{if(p.total)lbar(p.loaded/p.total*85);};
    pdfDoc=await task.promise;
    total=pdfDoc.numPages;
    curPage=1;
    pageCache.clear();
    lbar(100);
    await renderPage(curPage);
    showLoading(false);
    prefetch(curPage);
    hudShow(); hudScheduleHide();
  }catch(err){
    showLoading(false);
    toast('読み込みエラー: '+err.message);
    console.error(err);
  }
}

// ── STATE ──
let pdfDoc=null, curPage=1, total=0, busy=false;

// ── PAGE CACHE（先読み込み） ──
// key: ページ番号, value: ImageBitmap または offscreenCanvas
const pageCache=new Map();
const CACHE_AHEAD=1; // 前後何ページ先読みするか

async function renderToCache(num){
  if(!pdfDoc||pageCache.has(num))return;
  if(num<1||num>total)return;
  try{
    const page=await pdfDoc.getPage(num);
    const vp0=page.getViewport({scale:1});
    const vw=window.innerWidth, vh=window.innerHeight;
    const ov=Math.max(-20,Math.min(30,parseFloat(cfg.ov)||0));
    const dpr=window.devicePixelRatio||1;
    const scaleW=vw/vp0.width*(1+ov*2/100);
    const scale=scaleW*dpr;
    const vp=page.getViewport({scale});

    const oc=document.createElement('canvas');
    oc.width=Math.floor(vp.width);
    oc.height=Math.floor(vp.height);
    await page.render({canvasContext:oc.getContext('2d'),viewport:vp}).promise;
    pageCache.set(num,oc);
  }catch(e){
    console.warn('prefetch error p'+num, e);
  }
}

function prefetch(current){
  // 前後ページを非同期で先読み（エラーは無視）
  for(let d=1;d<=CACHE_AHEAD;d++){
    renderToCache(current+d);
    renderToCache(current-d);
  }
  // 遠いページのキャッシュを解放（メモリ節約）
  for(const k of pageCache.keys()){
    if(Math.abs(k-current)>CACHE_AHEAD+2) pageCache.delete(k);
  }
}

// ── CONFIG ──
const CFG_KEY='pdfv_cfg';
let cfg={dir:'h',rev:'0',ov:'3',hud:'1'};
function loadCfg(){
  try{ Object.assign(cfg,JSON.parse(localStorage.getItem(CFG_KEY)||'{}')); }catch{}
}
function saveCfg(){ localStorage.setItem(CFG_KEY,JSON.stringify(cfg)); }

// ── INIT ──
function init(){
  loadCfg();
  applyUI();
  loadGoogleAPIs();

  document.getElementById('file-input').onchange=e=>openFile(e.target.files[0]);
  document.getElementById('file-input2').onchange=e=>{openFile(e.target.files[0]);e.target.value='';};
  document.getElementById('btn-open2').onclick=()=>document.getElementById('file-input2').click();
  document.getElementById('btn-drive-open').onclick=openDrivePicker;
  document.getElementById('btn-drive2').onclick=openDrivePicker;
  document.getElementById('btn-prev').onclick=()=>go(-1);
  document.getElementById('btn-next').onclick=()=>go(1);
  document.getElementById('btn-cfg').onclick=()=>document.getElementById('settings').classList.add('open');
  document.getElementById('btn-cfg-close').onclick=closeSettings;
  document.getElementById('settings').addEventListener('click',e=>{
    if(e.target===document.getElementById('settings'))closeSettings();
  });

  document.querySelectorAll('.s-seg').forEach(seg=>{
    seg.querySelectorAll('.s-seg-btn').forEach(btn=>{
      btn.onclick=function(){
        seg.querySelectorAll('.s-seg-btn').forEach(b=>b.classList.remove('on'));
        this.classList.add('on');
        const key=seg.id==='seg-dir'?'dir':seg.id==='seg-rev'?'rev':'hud';
        cfg[key]=this.dataset.v;
        saveCfg();
        if(key==='dir') document.getElementById('row-rev').style.display=cfg.dir==='h'?'':'none';
        if(pdfDoc){pageCache.clear();renderPage(curPage);}
      };
    });
  });

  document.getElementById('s-ov').oninput=function(){
    cfg.ov=this.value;
    saveCfg();
    if(pdfDoc){pageCache.clear();renderPage(curPage);}
  };

  setupSwipe();

  document.addEventListener('keydown',e=>{
    if(!pdfDoc)return;
    if(e.key==='ArrowRight'||e.key==='ArrowDown')go(1);
    if(e.key==='ArrowLeft'||e.key==='ArrowUp')go(-1);
  });

  document.getElementById('canvas-wrap').addEventListener('click',e=>{
    if(!pdfDoc)return;
    if(e.target.closest('button'))return;
    e.clientX < window.innerWidth/2 ? go(1) : go(-1);
    hudShow(); hudScheduleHide();
  });

  let rt;
  window.addEventListener('resize',()=>{
    clearTimeout(rt);
    rt=setTimeout(()=>{if(pdfDoc){pageCache.clear();renderPage(curPage);}},250);
  });
}

function applyUI(){
  const setOn=(segId,val)=>{
    document.querySelectorAll('#'+segId+' .s-seg-btn').forEach(b=>b.classList.toggle('on',b.dataset.v===val));
  };
  setOn('seg-dir',cfg.dir);
  setOn('seg-rev',cfg.rev);
  setOn('seg-hud',cfg.hud);
  document.getElementById('s-ov').value=cfg.ov;
  document.getElementById('row-rev').style.display=cfg.dir==='h'?'':'none';
}

function closeSettings(){
  document.getElementById('settings').classList.remove('open');
}

// ── FILE OPEN ──
async function openFile(file){
  if(!file){return;}
  if(!file.name.toLowerCase().endsWith('.pdf')&&file.type&&file.type!=='application/pdf'){
    toast('PDFファイルを選択してください');return;
  }
  document.getElementById('hud-fname').textContent=file.name;
  showLoading(true);
  switchTo('viewer');

  try{
    const ab=await file.arrayBuffer();
    const task=pdfjsLib.getDocument({data:new Uint8Array(ab)});
    task.onProgress=p=>{if(p.total)lbar(p.loaded/p.total*85);};
    pdfDoc=await task.promise;
    total=pdfDoc.numPages;
    curPage=1;
    pageCache.clear();
    lbar(100);
    await renderPage(curPage);
    showLoading(false);
    prefetch(curPage);
    hudShow();
    hudScheduleHide();
  }catch(err){
    showLoading(false);
    toast('PDF読み込みエラー: '+err.message);
    console.error(err);
  }
}

// ── RENDER ──
async function renderPage(num,anim=''){
  if(!pdfDoc||busy)return;
  busy=true;
  try{
    const canvas=document.getElementById('pdf-canvas');
    const dpr=window.devicePixelRatio||1;

    // キャッシュヒット → 即座にコピーして表示
    if(pageCache.has(num)){
      const cached=pageCache.get(num);
      canvas.width=cached.width;
      canvas.height=cached.height;
      canvas.style.width=Math.floor(cached.width/dpr)+'px';
      canvas.style.height=Math.floor(cached.height/dpr)+'px';
      canvas.getContext('2d').drawImage(cached,0,0);
    } else {
      // キャッシュなし → 通常描画
      const page=await pdfDoc.getPage(num);
      const vp0=page.getViewport({scale:1});
      const vw=window.innerWidth, vh=window.innerHeight;
      const ov=Math.max(-20,Math.min(30,parseFloat(cfg.ov)||0));
      const scaleW=vw/vp0.width*(1+ov*2/100);
      const scale=scaleW*dpr;
      const vp=page.getViewport({scale});

      canvas.width=Math.floor(vp.width);
      canvas.height=Math.floor(vp.height);
      canvas.style.width=Math.floor(vp.width/dpr)+'px';
      canvas.style.height=Math.floor(vp.height/dpr)+'px';
      await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;

      // 描画したものをキャッシュにも保存
      const oc=document.createElement('canvas');
      oc.width=canvas.width; oc.height=canvas.height;
      oc.getContext('2d').drawImage(canvas,0,0);
      pageCache.set(num,oc);
    }

    // アニメーション
    if(anim){
      const wrap=document.getElementById('canvas-wrap');
      wrap.className='';
      void wrap.offsetWidth;
      wrap.className=anim;
      setTimeout(()=>wrap.className='',200);
    }

    document.getElementById('hud-page').textContent=`${num} / ${total}`;
  }catch(err){
    console.error('render error',err);
    toast('描画エラー');
  }finally{
    busy=false;
  }
}

// ── NAVIGATION ──
async function go(dir){
  if(!pdfDoc||busy)return;
  const next=curPage+dir;
  if(next<1||next>total)return;
  curPage=next;
  let anim='';
  if(cfg.dir==='h') anim=dir>0?'slide-next':'slide-prev';
  else anim=dir>0?'reel-next':'reel-prev';
  await renderPage(curPage,anim);
  prefetch(curPage); // ページ移動後に次の先読みをトリガー
  hudShow(); hudScheduleHide();
}

// ── SWIPE ──
function setupSwipe(){
  const el=document.getElementById('canvas-wrap');
  let sx=0,sy=0,moved=false;
  el.addEventListener('touchstart',e=>{
    sx=e.touches[0].clientX; sy=e.touches[0].clientY; moved=false;
  },{passive:true});
  el.addEventListener('touchmove',e=>{
    moved=true;
  },{passive:true});
  el.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx;
    const dy=e.changedTouches[0].clientY-sy;
    const adx=Math.abs(dx), ady=Math.abs(dy);

    if(adx<12&&ady<12){
      const top=document.getElementById('hud-top');
      if(top.classList.contains('hidden')){hudShow();hudScheduleHide();}
      else{clearTimeout(hudT);hudHide();}
      return;
    }

    if(cfg.dir==='h'){
      if(adx<40||adx<ady*0.8)return;
      const toNext=cfg.rev==='0'?(dx>0):(dx<0);
      go(toNext?1:-1);
    } else {
      if(ady<40||ady<adx*0.8)return;
      go(dy<0?1:-1);
    }
  },{passive:true});
}

// ── HUD ──
let hudT=null;
function hudShow(){
  document.getElementById('hud-top').classList.remove('hidden');
  document.getElementById('hud-bot').classList.remove('hidden');
}
function hudHide(){
  document.getElementById('hud-top').classList.add('hidden');
  document.getElementById('hud-bot').classList.add('hidden');
}
function hudScheduleHide(){
  if(cfg.hud!=='1')return;
  clearTimeout(hudT);
  hudT=setTimeout(hudHide,3000);
}

// ── LOADING ──
function showLoading(v){
  document.getElementById('loading').classList.toggle('show',v);
  if(v)lbar(0);
}
function lbar(pct){document.getElementById('lbar').style.width=pct+'%';}

// ── UTIL ──
function switchTo(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

let toastT;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2400);
}
</script>
