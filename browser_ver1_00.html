<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1814;--bg2:#211f1b;--bg3:#2a2722;--surface:#302d27;
  --accent:#c8a96e;--text:#e8e0d0;--text2:#a09880;--text3:#706858;
  --border:#3f3b34;--danger:#c86e6e;--success:#6ec88a;
  --font-ui:'Courier New',monospace;--font-body:'Georgia',serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-ui);overflow:hidden}

/* ─── ツールバー ─── */
#toolbar{
  height:48px;display:flex;align-items:center;gap:6px;
  padding:0 10px;background:var(--bg2);
  border-bottom:1px solid var(--border);position:relative;z-index:10;
  flex-shrink:0;
}

.tb-btn{
  width:34px;height:30px;background:var(--bg3);border:1px solid var(--border);
  color:var(--text2);cursor:pointer;font-size:14px;font-family:var(--font-ui);
  display:flex;align-items:center;justify-content:center;
  transition:border-color .15s,color .15s,background .15s;flex-shrink:0;
}
.tb-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--surface)}
.tb-btn:active{transform:scale(.95)}
.tb-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none}

#url-bar{
  flex:1;height:30px;background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-family:var(--font-ui);font-size:12px;letter-spacing:.5px;
  padding:0 10px;outline:none;min-width:0;
  transition:border-color .15s;
}
#url-bar:focus{border-color:var(--accent)}

#go-btn{
  height:30px;padding:0 14px;background:var(--bg3);border:1px solid var(--accent);
  color:var(--accent);cursor:pointer;font-family:var(--font-ui);font-size:11px;
  letter-spacing:1px;transition:background .15s,color .15s;flex-shrink:0;
}
#go-btn:hover{background:var(--accent);color:var(--bg)}

/* ─── ステータスバー ─── */
#statusbar{
  height:22px;display:flex;align-items:center;gap:12px;
  padding:0 10px;background:var(--bg2);border-top:1px solid var(--border);
  flex-shrink:0;font-size:10px;letter-spacing:.5px;color:var(--text3);
}
#status-text{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#status-indicator{
  width:7px;height:7px;border-radius:50%;background:var(--border);flex-shrink:0;
  transition:background .3s;
}
#status-indicator.loading{background:#c8a96e;animation:pulse .8s infinite}
#status-indicator.ok{background:var(--success)}
#status-indicator.err{background:var(--danger)}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ─── iframe エリア ─── */
#viewport{
  flex:1;position:relative;display:flex;flex-direction:column;overflow:hidden;
}
#browser-frame{
  flex:1;border:none;width:100%;background:#fff;display:block;
}

/* ─── 全体レイアウト ─── */
body{display:flex;flex-direction:column}

/* ─── トースト ─── */
#toast{
  position:fixed;bottom:36px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--bg3);border:1px solid var(--success);color:var(--success);
  padding:7px 20px;font-size:11px;letter-spacing:1.5px;
  opacity:0;transition:opacity .2s,transform .2s;pointer-events:none;z-index:9999;
  white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.err-toast{border-color:var(--danger);color:var(--danger)}

/* ─── ローディングオーバーレイ ─── */
#loading-overlay{
  position:absolute;inset:0;background:rgba(26,24,20,.7);
  display:flex;align-items:center;justify-content:center;
  z-index:5;opacity:0;pointer-events:none;transition:opacity .2s;
  flex-direction:column;gap:12px;
}
#loading-overlay.show{opacity:1;pointer-events:auto}
.spinner{
  width:28px;height:28px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-label{font-size:10px;letter-spacing:2px;color:var(--text3)}

/* ─── ホーム画面 ─── */
#home-screen{
  position:absolute;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;z-index:4;
}
.home-title{font-size:22px;letter-spacing:5px;color:var(--accent)}
.home-sub{font-size:10px;letter-spacing:3px;color:var(--text3)}
.home-hint{margin-top:20px;font-size:10px;letter-spacing:1px;color:var(--text3);text-align:center;line-height:1.8}

/* ─── コンテキストメニュー ─── */
#ctx-menu{
  position:fixed;background:var(--bg2);border:1px solid var(--border);
  min-width:160px;z-index:9998;display:none;
  box-shadow:0 4px 16px rgba(0,0,0,.5);
}
#ctx-menu.show{display:block}
.ctx-item{
  padding:9px 14px;font-size:11px;letter-spacing:.5px;color:var(--text2);
  cursor:pointer;transition:background .1s,color .1s;
  border-bottom:1px solid var(--border);
}
.ctx-item:last-child{border-bottom:none}
.ctx-item:hover{background:var(--surface);color:var(--accent)}
.ctx-sep{height:1px;background:var(--border)}
</style>
</head>
<body>

<!-- ツールバー -->
<div id="toolbar">
  <button class="tb-btn" id="btn-back" title="戻る" disabled>◀</button>
  <button class="tb-btn" id="btn-fwd"  title="進む" disabled>▶</button>
  <button class="tb-btn" id="btn-reload" title="更新">↺</button>
  <button class="tb-btn" id="btn-home" title="ホーム">⌂</button>
  <input id="url-bar" type="text" placeholder="URLを入力してください…" autocomplete="off" spellcheck="false">
  <button id="go-btn">GO</button>
</div>

<!-- メインビューポート -->
<div id="viewport">
  <div id="home-screen">
    <div class="home-title">BROWSER</div>
    <div class="home-sub">in-page web viewer</div>
    <div class="home-hint">
      URLバーにアドレスを入力してGOを押してください<br>
      <span style="color:var(--text3);font-size:9px">※ X-Frame-Options により表示できないサイトがあります</span>
    </div>
  </div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-label">LOADING...</div>
  </div>

  <iframe id="browser-frame"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups-to-escape-sandbox allow-downloads"
    referrerpolicy="no-referrer"
    title="browser"></iframe>
</div>

<!-- ステータスバー -->
<div id="statusbar">
  <div id="status-indicator"></div>
  <div id="status-text">待機中</div>
</div>

<!-- トースト -->
<div id="toast"></div>

<!-- コンテキストメニュー -->
<div id="ctx-menu">
  <div class="ctx-item" id="ctx-save-img">🖼 画像を保存</div>
  <div class="ctx-item" id="ctx-copy-url">🔗 URLをコピー</div>
  <div class="ctx-sep"></div>
  <div class="ctx-item" id="ctx-reload">↺ 更新</div>
  <div class="ctx-item" id="ctx-open-tab">↗ 別タブで開く</div>
</div>

<script>
const frame        = document.getElementById('browser-frame');
const urlBar       = document.getElementById('url-bar');
const goBtn        = document.getElementById('go-btn');
const btnBack      = document.getElementById('btn-back');
const btnFwd       = document.getElementById('btn-fwd');
const btnReload    = document.getElementById('btn-reload');
const btnHome      = document.getElementById('btn-home');
const homeScreen   = document.getElementById('home-screen');
const loadingOv    = document.getElementById('loading-overlay');
const statusInd    = document.getElementById('status-indicator');
const statusTxt    = document.getElementById('status-text');
const toast        = document.getElementById('toast');
const ctxMenu      = document.getElementById('ctx-menu');
const ctxSaveImg   = document.getElementById('ctx-save-img');
const ctxCopyUrl   = document.getElementById('ctx-copy-url');
const ctxReload    = document.getElementById('ctx-reload');
const ctxOpenTab   = document.getElementById('ctx-open-tab');

let history = [];
let histIdx = -1;
let currentTarget = null; // 右クリック対象要素

/* ── URL 正規化 ─────────────────────────── */
function normalizeUrl(raw){
  raw = raw.trim();
  if(!raw) return '';
  if(/^https?:\/\//i.test(raw)) return raw;
  if(/^[a-z0-9.-]+\.[a-z]{2,}/i.test(raw)) return 'https://' + raw;
  // 検索
  return 'https://www.google.com/search?q=' + encodeURIComponent(raw);
}

/* ── ナビゲーション ─────────────────────── */
function navigate(url){
  if(!url) return;
  url = normalizeUrl(url);
  urlBar.value = url;

  // ポップアップブロック: sandbox に allow-popups を含めない
  homeScreen.style.display = 'none';
  setStatus('loading', 'ロード中... ' + url);
  loadingOv.classList.add('show');

  // 履歴管理
  if(histIdx >= 0 && history[histIdx] === url) {
    // 同じURL：更新
  } else {
    history = history.slice(0, histIdx + 1);
    history.push(url);
    histIdx = history.length - 1;
  }
  updateNavBtns();

  frame.src = url;
}

function updateNavBtns(){
  btnBack.disabled = histIdx <= 0;
  btnFwd.disabled  = histIdx >= history.length - 1;
}

function setStatus(state, msg){
  statusInd.className = '';
  statusTxt.textContent = msg;
  if(state === 'loading') statusInd.classList.add('loading');
  else if(state === 'ok')  statusInd.classList.add('ok');
  else if(state === 'err') statusInd.classList.add('err');
}

/* ── iframe イベント ─────────────────────── */
frame.addEventListener('load', () => {
  loadingOv.classList.remove('show');
  try {
    const t = frame.contentWindow.location.href;
    if(t && t !== 'about:blank'){
      urlBar.value = t;
      // 同URLで履歴更新
      if(history[histIdx] !== t){
        history = history.slice(0, histIdx + 1);
        history.push(t);
        histIdx = history.length - 1;
        updateNavBtns();
      }
      setStatus('ok', t);
    } else {
      setStatus('ok', '読み込み完了');
    }
  } catch(e){
    // クロスオリジン
    setStatus('ok', '読み込み完了（クロスオリジン）');
  }
});

frame.addEventListener('error', () => {
  loadingOv.classList.remove('show');
  setStatus('err', '読み込みエラー');
});

/* ── ボタン操作 ─────────────────────────── */
goBtn.addEventListener('click', () => navigate(urlBar.value));
urlBar.addEventListener('keydown', e => { if(e.key === 'Enter') navigate(urlBar.value); });

btnBack.addEventListener('click', () => {
  if(histIdx > 0){ histIdx--; updateNavBtns(); frame.src = history[histIdx]; urlBar.value = history[histIdx]; setStatus('loading','ロード中...'); loadingOv.classList.add('show'); }
});
btnFwd.addEventListener('click', () => {
  if(histIdx < history.length - 1){ histIdx++; updateNavBtns(); frame.src = history[histIdx]; urlBar.value = history[histIdx]; setStatus('loading','ロード中...'); loadingOv.classList.add('show'); }
});
btnReload.addEventListener('click', () => {
  if(frame.src && frame.src !== 'about:blank'){ loadingOv.classList.add('show'); setStatus('loading','更新中...'); frame.src = frame.src; }
});
btnHome.addEventListener('click', () => {
  frame.src = 'about:blank';
  urlBar.value = '';
  homeScreen.style.display = 'flex';
  setStatus('', '待機中');
  history = []; histIdx = -1; updateNavBtns();
});

/* ── トースト ───────────────────────────── */
let toastTimer;
function showToast(msg, isErr = false){
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.className = 'show' + (isErr ? ' err-toast' : '');
  toastTimer = setTimeout(() => toast.className = '', 2500);
}

/* ── 画像保存ユーティリティ ─────────────── */
async function saveImageFromUrl(imgUrl){
  try {
    // 同オリジン or CORS対応の場合 fetch で blob 取得
    const resp = await fetch(imgUrl, { mode: 'cors' });
    if(!resp.ok) throw new Error('fetch failed');
    const blob = await resp.blob();
    const objUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = objUrl;
    a.download = imgUrl.split('/').pop().split('?')[0] || 'image';
    a.click();
    setTimeout(() => URL.revokeObjectURL(objUrl), 3000);
    showToast('✓ 保存成功');
  } catch(e) {
    // fetch失敗（クロスオリジン等）→ 直接リンク経由
    try {
      const a = document.createElement('a');
      a.href = imgUrl;
      a.download = imgUrl.split('/').pop().split('?')[0] || 'image';
      a.target = '_blank';
      a.click();
      showToast('✓ 保存成功');
    } catch(e2) {
      showToast('✗ 保存失敗（クロスオリジン制限）', true);
    }
  }
}

/* ── 右クリック / コンテキストメニュー ─── */
function showCtxMenu(x, y){
  ctxMenu.style.left = Math.min(x, window.innerWidth  - ctxMenu.offsetWidth  - 4) + 'px';
  ctxMenu.style.top  = Math.min(y, window.innerHeight - ctxMenu.offsetHeight - 4) + 'px';
  ctxMenu.classList.add('show');
}
function hideCtxMenu(){ ctxMenu.classList.remove('show'); currentTarget = null; }

document.addEventListener('contextmenu', e => {
  e.preventDefault();
  currentTarget = e.target;

  // 画像かどうか判定
  const isImg = e.target.tagName === 'IMG' || e.target.closest('img');
  ctxSaveImg.style.display = isImg ? 'block' : 'none';

  showCtxMenu(e.clientX, e.clientY);
});

// iframe内の右クリックはクロスオリジン制限で取れないため、
// overlay で右クリックをキャッチする補助レイヤー
const overlay = document.createElement('div');
overlay.style.cssText = 'position:absolute;inset:0;z-index:3;pointer-events:none;';
document.getElementById('viewport').appendChild(overlay);

// iframe にポインタを通しつつ右クリックだけ受け取る手法（制限あり）
frame.addEventListener('contextmenu', e => {
  e.preventDefault();
  currentTarget = e.target;
  const isImg = e.target.tagName === 'IMG';
  ctxSaveImg.style.display = isImg ? 'block' : 'none';
  showCtxMenu(e.clientX, e.clientY);
});

document.addEventListener('click', hideCtxMenu);
document.addEventListener('keydown', e => { if(e.key === 'Escape') hideCtxMenu(); });

/* コンテキストメニューアクション */
ctxSaveImg.addEventListener('click', () => {
  const img = currentTarget;
  if(!img) return;
  const src = img.src || img.getAttribute('src');
  if(src) saveImageFromUrl(src);
  else showToast('✗ 画像URLが取得できません', true);
  hideCtxMenu();
});

ctxCopyUrl.addEventListener('click', () => {
  const url = urlBar.value || '';
  if(url){
    navigator.clipboard.writeText(url).then(() => showToast('✓ URLをコピーしました'));
  }
  hideCtxMenu();
});

ctxReload.addEventListener('click', () => {
  if(frame.src && frame.src !== 'about:blank'){ frame.src = frame.src; loadingOv.classList.add('show'); setStatus('loading','更新中...'); }
  hideCtxMenu();
});

ctxOpenTab.addEventListener('click', () => {
  const url = urlBar.value;
  if(url) window.open(url, '_blank');
  hideCtxMenu();
});

/* ── ポップアップブロック ────────────────
   sandbox 属性で allow-popups を除外しているため
   iframe 内の window.open は自動的にブロックされる。
   追加で message イベントも監視。
─────────────────────────────────────────── */
window.addEventListener('message', e => {
  // 子フレームからのナビゲーション要求のみ許可
  if(e.data && e.data.type === 'navigate'){
    navigate(e.data.url);
  }
});

// 初期フォーカス
urlBar.focus();
</script>
</body>
</html>
