<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apps</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1814;
  --bg2:#211f1b;
  --bg3:#2a2722;
  --surface:#302d27;
  --accent:#c8a96e;
  --accent2:#e8c98e;
  --text:#e8e0d0;
  --text2:#a09880;
  --text3:#706858;
  --border:#3f3b34;
  --font-ui:'Courier New',monospace;
  --font-body:'Georgia',serif;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body)}

/* HEADER */
header{
  padding:48px 0 32px;
  text-align:center;
  border-bottom:1px solid var(--border);
  position:relative;
}
header::before{
  content:'';
  position:absolute;
  inset:0;
  background:radial-gradient(ellipse 60% 80% at 50% 0%, rgba(200,169,110,.06) 0%, transparent 70%);
  pointer-events:none;
}
.site-name{
  font-family:var(--font-ui);
  font-size:11px;
  letter-spacing:4px;
  color:var(--text3);
  text-transform:uppercase;
  margin-bottom:12px;
}
.site-title{
  font-family:var(--font-ui);
  font-size:28px;
  letter-spacing:6px;
  color:var(--accent);
  font-weight:normal;
  margin-bottom:8px;
}
.site-sub{
  font-size:12px;
  color:var(--text3);
  font-family:var(--font-ui);
  letter-spacing:2px;
}

/* MAIN */
main{
  max-width:900px;
  margin:0 auto;
  padding:48px 24px 80px;
}

.section-label{
  font-family:var(--font-ui);
  font-size:10px;
  letter-spacing:3px;
  color:var(--text3);
  text-transform:uppercase;
  margin-bottom:24px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}

/* CARD GRID */
.card-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
  margin-bottom:48px;
}

.card{
  background:var(--bg2);
  border:1px solid var(--border);
  display:flex;
  flex-direction:column;
  cursor:pointer;
  transition:border-color .2s, transform .2s;
  text-decoration:none;
  color:inherit;
  position:relative;
  overflow:hidden;
}
.card:hover{
  border-color:var(--accent);
  transform:translateY(-2px);
}
.card:hover .card-arrow{opacity:1;transform:translate(2px,-2px)}

/* THUMBNAIL */
.card-thumb{
  width:100%;
  aspect-ratio:16/9;
  background:var(--bg3);
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
  border-bottom:1px solid var(--border);
}
.card-thumb-icon{
  font-size:40px;
  opacity:.18;
  user-select:none;
}
.card-thumb-label{
  position:absolute;
  bottom:8px;
  left:10px;
  font-family:var(--font-ui);
  font-size:9px;
  letter-spacing:2px;
  color:var(--text3);
  text-transform:uppercase;
}
.card-thumb-tag{
  position:absolute;
  top:8px;
  right:8px;
  font-family:var(--font-ui);
  font-size:9px;
  letter-spacing:1px;
  color:var(--accent);
  border:1px solid var(--border);
  padding:2px 7px;
  background:var(--bg2);
}

/* CARD BODY */
.card-body{padding:16px 16px 14px}
.card-name{
  font-family:var(--font-ui);
  font-size:13px;
  color:var(--text);
  margin-bottom:6px;
  letter-spacing:1px;
}
.card-desc{
  font-size:12px;
  color:var(--text2);
  line-height:1.7;
  margin-bottom:12px;
}
.card-footer{
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-top:1px solid var(--border);
  padding-top:10px;
  margin-top:auto;
}
.card-tag{
  font-family:var(--font-ui);
  font-size:9px;
  letter-spacing:1px;
  color:var(--text3);
  text-transform:uppercase;
}
.card-arrow{
  font-family:var(--font-ui);
  font-size:11px;
  color:var(--accent);
  opacity:.4;
  transition:opacity .2s, transform .2s;
}

/* THUMB PREVIEW — メモアプリ用ミニUI */
.mini-ui{
  width:100%;height:100%;
  display:flex;
  align-items:stretch;
  opacity:.5;
}
.mini-sidebar{
  width:36%;
  background:rgba(33,31,27,.8);
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
  gap:4px;
  padding:8px 6px;
}
.mini-bar{height:4px;border-radius:2px;background:var(--border)}
.mini-bar.accent{background:var(--accent);width:70%}
.mini-bar.w50{width:50%}
.mini-bar.w80{width:80%}
.mini-bar.w60{width:60%}
.mini-editor{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:5px;
  padding:8px;
}
.mini-line{height:3px;border-radius:1px;background:var(--border)}
.mini-line.w90{width:90%}
.mini-line.w70{width:70%}
.mini-line.w80{width:80%}
.mini-line.w40{width:40%}
.mini-caret{
  width:2px;height:12px;
  background:var(--accent);
  display:inline-block;
  margin-top:2px;
}

/* PLACEHOLDER CARDS */
.card.placeholder{
  border-style:dashed;
  opacity:.4;
  cursor:default;
  pointer-events:none;
}
.card.placeholder:hover{transform:none;border-color:var(--border)}

/* FOOTER */
footer{
  text-align:center;
  padding:24px;
  border-top:1px solid var(--border);
  font-family:var(--font-ui);
  font-size:10px;
  letter-spacing:2px;
  color:var(--text3);
}
</style>
</head>
<body>

<header>
  <div class="site-name">my tools</div>
  <div class="site-title">APPS</div>
  <div class="site-sub">個人用ツール集</div>
</header>

<main>
  <div class="section-label">ツール一覧</div>
  <div class="card-grid">

    <!-- メモアプリ -->
    <a class="card" href="memo_app_v2.html">
      <div class="card-thumb">
        <div class="mini-ui">
          <div class="mini-sidebar">
            <div class="mini-bar accent"></div>
            <div class="mini-bar w50"></div>
            <div style="margin-top:4px">
              <div class="mini-bar w80" style="margin-bottom:3px"></div>
              <div class="mini-bar w60" style="margin-bottom:3px"></div>
              <div class="mini-bar w70"></div>
            </div>
          </div>
          <div class="mini-editor">
            <div class="mini-line w90"></div>
            <div class="mini-line w70"></div>
            <div class="mini-line w80"></div>
            <div class="mini-line w40"></div>
            <div class="mini-caret"></div>
          </div>
        </div>
        <div class="card-thumb-tag">v2.0</div>
      </div>
      <div class="card-body">
        <div class="card-name">Memo</div>
        <div class="card-desc">タイプライター型テキストエディタ。フォルダ管理・画像埋め込み・ローカル保存対応。</div>
        <div class="card-footer">
          <span class="card-tag">text editor</span>
          <span class="card-arrow">→</span>
        </div>
      </div>
    </a>

    <!-- プレースホルダー -->
    <div class="card placeholder">
      <div class="card-thumb">
        <div class="card-thumb-icon">＋</div>
      </div>
      <div class="card-body">
        <div class="card-name">Coming soon</div>
        <div class="card-desc">次のツールがここに追加されます。</div>
        <div class="card-footer">
          <span class="card-tag">—</span>
        </div>
      </div>
    </div>

    <div class="card placeholder">
      <div class="card-thumb">
        <div class="card-thumb-icon">＋</div>
      </div>
      <div class="card-body">
        <div class="card-name">Coming soon</div>
        <div class="card-desc">次のツールがここに追加されます。</div>
        <div class="card-footer">
          <span class="card-tag">—</span>
        </div>
      </div>
    </div>

  </div>
</main>

<footer>— personal tools —</footer>

</body>
</html>
