<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Writer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Noto+Sans+JP:wght@300;400;700&display=swap');
:root{
  --bg:#1a1814;--bg2:#211f1b;--bg3:#2a2722;
  --accent:#c8a96e;--text:#e8e0d0;--text2:#a09880;--text3:#706858;
  --border:#3f3b34;--danger:#c0392b;--add:#5dade2;--imgc:#a29bfe;
  --font-ui:'Share Tech Mono',monospace;--font-body:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh}

/* header */
#header{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:8px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
#htitle{font-family:var(--font-ui);font-size:11px;letter-spacing:3px;color:var(--accent);margin-right:4px;white-space:nowrap}
.hbtn{display:flex;align-items:center;gap:4px;padding:5px 10px;border:1px solid var(--border);background:var(--bg3);color:var(--text2);font-family:var(--font-ui);font-size:10px;letter-spacing:1px;cursor:pointer;transition:all .15s;white-space:nowrap}
.hbtn:hover{border-color:var(--accent);color:var(--accent)}
.hbtn.on-normal{background:var(--accent);color:#111;border-color:var(--accent)}
.hbtn.on-text{background:var(--add);color:#111;border-color:var(--add)}
.hbtn.on-img{background:var(--imgc);color:#111;border-color:var(--imgc)}
.hbtn:disabled{opacity:.3;pointer-events:none}
.sep{width:1px;height:22px;background:var(--border);flex-shrink:0}
#pnav{display:flex;align-items:center;gap:6px;font-family:var(--font-ui);font-size:10px;color:var(--text3)}
#pnav button{background:none;border:1px solid var(--border);color:var(--text2);width:22px;height:22px;cursor:pointer;font-family:var(--font-ui)}
#pnav button:hover{border-color:var(--accent);color:var(--accent)}

/* toolbar */
#toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;padding:6px 14px;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0}
.tbl{font-family:var(--font-ui);font-size:9px;color:var(--text3);letter-spacing:1px}
.tbi{background:var(--bg2);border:1px solid var(--border);color:var(--text);font-family:var(--font-ui);font-size:11px;padding:3px 6px;height:26px}
.tbi:focus{outline:none;border-color:var(--accent)}
.tbc{width:30px;height:26px;padding:1px;cursor:pointer;border:1px solid var(--border);background:var(--bg2)}
.tbt{padding:3px 8px;height:26px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);font-family:var(--font-ui);font-size:11px;cursor:pointer;transition:all .15s}
.tbt:hover{border-color:var(--accent);color:var(--accent)}
.tbt.on{background:var(--accent);color:#111;border-color:var(--accent)}
.tbsep{width:1px;height:20px;background:var(--border)}
#mhint{margin-left:auto;font-family:var(--font-ui);font-size:9px;letter-spacing:1px;padding:3px 10px;border:1px solid var(--border);color:var(--text3);white-space:nowrap}
#mhint.mn{border-color:var(--border);color:var(--text3)}
#mhint.mt{border-color:var(--add);color:var(--add)}
#mhint.mi{border-color:var(--imgc);color:var(--imgc)}

/* canvas area */
#ca{flex:1;overflow:auto;display:flex;justify-content:center;align-items:flex-start;padding:24px;background:var(--bg);position:relative}
#pw{position:relative;display:none;line-height:0}
#pc{display:block;box-shadow:0 4px 32px rgba(0,0,0,.6)}
#ov{position:absolute;top:0;left:0;width:100%;height:100%}
#ov.mn{cursor:default}
#ov.mt{cursor:crosshair}
#ov.mi{cursor:crosshair}
#rb{position:absolute;border:2px dashed var(--add);background:rgba(93,173,226,.08);pointer-events:none;display:none}

/* boxes */
.tb{position:absolute;border:1px dashed rgba(200,169,110,.4);background:transparent;min-width:40px;min-height:20px;cursor:grab}
.tb:active{cursor:grabbing}
.tb.sel{border:1px solid var(--add)}
.tb textarea{width:100%;height:100%;min-height:20px;background:transparent;border:none;outline:none;resize:none;cursor:text;padding:2px 4px;line-height:1.4;overflow:hidden}
.ib{position:absolute;border:1px dashed rgba(162,155,254,.4);cursor:grab}
.ib:active{cursor:grabbing}
.ib.sel{border:1px solid var(--imgc)}
.ib img{width:100%;height:100%;object-fit:fill;display:block;pointer-events:none}
.bdel{position:absolute;top:-9px;right:-9px;width:18px;height:18px;background:var(--danger);color:#fff;border:none;cursor:pointer;font-size:11px;line-height:18px;text-align:center;border-radius:50%;display:none;z-index:10}
.sel .bdel{display:block}
.brsz{position:absolute;bottom:-4px;right:-4px;width:10px;height:10px;cursor:se-resize;display:none;z-index:10}
.sel .brsz{display:block}
.tb .brsz{background:var(--add)}
.ib .brsz{background:var(--imgc)}

/* drop zone */
#dz{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(26,24,20,.88);border:2px dashed var(--accent);font-family:var(--font-ui);font-size:13px;letter-spacing:2px;color:var(--accent);gap:10px;z-index:200;pointer-events:none}
body.dov #dz{display:flex}

/* statusbar */
#sb{padding:4px 14px;background:var(--bg2);border-top:1px solid var(--border);font-family:var(--font-ui);font-size:9px;color:var(--text3);letter-spacing:1px;flex-shrink:0;display:flex;gap:16px;align-items:center}
#sbkb{margin-left:auto;color:#3a3530;font-size:8px}

/* loading */
#ld{display:none;position:fixed;inset:0;background:rgba(26,24,20,.82);align-items:center;justify-content:center;z-index:999;font-family:var(--font-ui);font-size:12px;letter-spacing:3px;color:var(--accent);flex-direction:column;gap:14px}
#ldb{width:200px;height:2px;background:var(--border)}
#ldp{height:100%;background:var(--accent);width:0%;transition:width .3s}

/* welcome */
#wc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;font-family:var(--font-ui);pointer-events:none}
#wc h2{font-size:13px;letter-spacing:4px;color:var(--accent)}
#wc p{font-size:10px;color:var(--text3);letter-spacing:2px}
</style>
</head>
<body>
<div id="ld"><div>PROCESSING...</div><div id="ldb"><div id="ldp"></div></div></div>
<div id="app">
  <div id="header">
    <span id="htitle">PDF WRITER</span>
    <button class="hbtn" id="bopen">📂 開く</button>
    <div class="sep"></div>
    <div id="pnav">
      <button id="bprev">◀</button>
      <span id="pinfo">— / —</span>
      <button id="bnext">▶</button>
    </div>
    <div class="sep"></div>
    <button class="hbtn on-normal" id="bmnormal" title="通常モード (Esc)">✋ 通常</button>
    <button class="hbtn" id="bmtext"   title="テキスト追加 (T)">✚ テキスト</button>
    <button class="hbtn" id="bmimg"    title="画像追加 (I)" disabled>🖼 画像</button>
    <div class="sep"></div>
    <button class="hbtn" id="bsave" disabled>💾 PDF 保存</button>
    <input type="file" id="fpdf" accept=".pdf" style="display:none">
    <input type="file" id="fimg" accept="image/*" style="display:none">
  </div>
  <div id="toolbar">
    <span class="tbl">FONT</span>
    <select class="tbi" id="tbfont" style="width:80px">
      <option value="Helvetica">Helv</option>
      <option value="Times">Times</option>
      <option value="Courier">Courier</option>
    </select>
    <span class="tbl">SIZE</span>
    <input type="number" class="tbi" id="tbsize" value="14" min="6" max="120" style="width:52px">
    <span class="tbl">COLOR</span>
    <input type="color" class="tbc" id="tbcolor" value="#000000">
    <div class="tbsep"></div>
    <button class="tbt" id="tbbold">B</button>
    <button class="tbt" id="tbunder" style="text-decoration:underline">U</button>
    <div class="tbsep"></div>
    <span class="tbl">SHADOW</span>
    <button class="tbt" id="tbshad">✦</button>
    <input type="color" class="tbc" id="tbshadc" value="#888888" style="width:28px">
    <input type="number" class="tbi" id="tbshadb" value="3" min="0" max="20" style="width:44px">
    <div id="mhint" class="mn">— 通常モード —</div>
  </div>
  <div id="ca">
    <div id="wc"><h2>PDF WRITER</h2><p>「開く」またはPDFをドロップしてください</p></div>
    <div id="pw">
      <canvas id="pc"></canvas>
      <div id="rb"></div>
      <div id="ov" class="mn"></div>
    </div>
    <div id="dz"><span>▼ DROP PDF HERE</span><span style="font-size:10px;color:var(--text3)">PDFファイルをドロップ</span></div>
  </div>
  <div id="sb">
    <span id="sbf">FILE: —</span>
    <span id="sbe">ELEMENTS: 0</span>
    <span id="sbp"></span>
    <span id="sbkb">Esc=通常　T=テキスト追加　I=画像追加　Del=削除　矢印=微移動　Shift+矢印=10px移動</span>
  </div>
</div>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ── State ──
let pdfDoc=null,pdfBytes=null,curPage=1,totPages=0;
const SC=1.5;
let els=[],selEl=null,mode='normal';

// ── DOM ──
const canvas=document.getElementById('pc');
const ov=document.getElementById('ov');
const rb=document.getElementById('rb');
const pw=document.getElementById('pw');

// ══ モード管理 ══
function setMode(m){
  mode=m;
  ov.className=m==='normal'?'mn':m==='add-text'?'mt':'mi';
  document.getElementById('bmnormal').className='hbtn'+(m==='normal'?' on-normal':'');
  document.getElementById('bmtext').className='hbtn'+(m==='add-text'?' on-text':'');
  document.getElementById('bmimg').className='hbtn'+(m==='add-img'?' on-img':'');
  const hints={'normal':'— 通常モード — クリックで選択／移動','add-text':'✚ テキスト追加 — ドラッグで範囲を描く','add-img':'🖼 画像追加 — ドラッグで配置サイズを決める'};
  const mh=document.getElementById('mhint');
  mh.textContent=hints[m]||'';
  mh.className=m==='normal'?'mn':m==='add-text'?'mt':'mi';
  desel();
}
document.getElementById('bmnormal').onclick=()=>setMode('normal');
document.getElementById('bmtext').onclick=()=>setMode('add-text');
document.getElementById('bmimg').onclick=()=>{document.getElementById('fimg').click()};

// ══ PDF読み込み ══
document.getElementById('bopen').onclick=()=>document.getElementById('fpdf').click();
document.getElementById('fpdf').onchange=e=>{if(e.target.files[0])loadPDF(e.target.files[0])};
document.body.addEventListener('dragover',e=>{e.preventDefault();document.body.classList.add('dov')});
document.body.addEventListener('dragleave',e=>{if(!e.relatedTarget)document.body.classList.remove('dov')});
document.body.addEventListener('drop',e=>{
  e.preventDefault();document.body.classList.remove('dov');
  const f=e.dataTransfer.files[0];
  if(f&&f.type==='application/pdf')loadPDF(f);
});

async function loadPDF(file){
  showLd(true);
  try{
    pdfBytes=await file.arrayBuffer();
    pdfDoc=await pdfjsLib.getDocument({data:new Uint8Array(pdfBytes)}).promise;
    totPages=pdfDoc.numPages; curPage=1; els=[];
    document.getElementById('sbf').textContent='FILE: '+file.name;
    document.getElementById('bsave').disabled=false;
    document.getElementById('bmimg').disabled=false;
    pw.style.display='inline-block';
    document.getElementById('wc').style.display='none';
    await renderPage(1); updPageInfo(); setMode('normal');
  }finally{showLd(false);}
}

async function renderPage(n){
  prog(30);
  const page=await pdfDoc.getPage(n);
  const vp=page.getViewport({scale:SC});
  canvas.width=vp.width; canvas.height=vp.height;
  ov.style.width=vp.width+'px'; ov.style.height=vp.height+'px';
  rb.style.display='none';
  await page.render({canvasContext:canvas.getContext('2d'),viewport:vp}).promise;
  prog(100);
  els.forEach(el=>el.el.style.display=(el.page===n)?'':'none');
  updStatus();
}

document.getElementById('bprev').onclick=()=>chPage(-1);
document.getElementById('bnext').onclick=()=>chPage(1);
function chPage(d){const n=curPage+d;if(!pdfDoc||n<1||n>totPages)return;curPage=n;renderPage(n);updPageInfo();}
function updPageInfo(){document.getElementById('pinfo').textContent=curPage+' / '+totPages;}

// ══ ラバーバンド ══
let rbst=null;
const MINDRAG=12;

ov.addEventListener('mousedown',e=>{
  if(mode==='normal'){desel();return;}
  e.preventDefault();
  const r=ov.getBoundingClientRect();
  rbst={sx:e.clientX-r.left,sy:e.clientY-r.top};
  rb.style.cssText=`display:block;left:${rbst.sx}px;top:${rbst.sy}px;width:0;height:0;border-color:${mode==='add-img'?'var(--imgc)':'var(--add)'};background:${mode==='add-img'?'rgba(162,155,254,.08)':'rgba(93,173,226,.08)'}`;
});

document.addEventListener('mousemove',e=>{
  if(!rbst)return;
  const r=ov.getBoundingClientRect();
  const cx=e.clientX-r.left,cy=e.clientY-r.top;
  const x=Math.min(rbst.sx,cx),y=Math.min(rbst.sy,cy),w=Math.abs(cx-rbst.sx),h=Math.abs(cy-rbst.sy);
  rb.style.left=x+'px';rb.style.top=y+'px';rb.style.width=w+'px';rb.style.height=h+'px';
  document.getElementById('sbp').textContent=`POS:${Math.round(x)},${Math.round(y)} SIZE:${Math.round(w)}x${Math.round(h)}`;
});

document.addEventListener('mouseup',e=>{
  if(!rbst)return;
  const r=ov.getBoundingClientRect();
  const cx=e.clientX-r.left,cy=e.clientY-r.top;
  const x=Math.min(rbst.sx,cx),y=Math.min(rbst.sy,cy),w=Math.abs(cx-rbst.sx),h=Math.abs(cy-rbst.sy);
  rbst=null; rb.style.display='none';
  if(w<MINDRAG||h<MINDRAG)return;
  if(mode==='add-text'){createTB(x,y,Math.max(w,60),Math.max(h,28));setMode('normal');}
  else if(mode==='add-img'){pendRect={x,y,w,h};document.getElementById('fimg').click();}
});

// ══ テキストボックス ══
function getStyle(){
  return{
    fontSize:parseInt(document.getElementById('tbsize').value)||14,
    color:document.getElementById('tbcolor').value,
    fontFamily:document.getElementById('tbfont').value,
    bold:document.getElementById('tbbold').classList.contains('on'),
    underline:document.getElementById('tbunder').classList.contains('on'),
    shadow:document.getElementById('tbshad').classList.contains('on'),
    shadowColor:document.getElementById('tbshadc').value,
    shadowBlur:parseInt(document.getElementById('tbshadb').value)||3,
  };
}

function applyTAS(ta,st){
  ta.style.fontSize=st.fontSize+'px';
  ta.style.color=st.color;
  ta.style.fontFamily=st.fontFamily+',sans-serif';
  ta.style.fontWeight=st.bold?'bold':'normal';
  ta.style.textDecoration=st.underline?'underline':'none';
  ta.style.textShadow=st.shadow?`2px 2px ${st.shadowBlur}px ${st.shadowColor}`:'none';
}

function createTB(x,y,w,h){
  const st=getStyle();
  const box=document.createElement('div');
  box.className='tb';
  box.style.cssText=`left:${x}px;top:${y}px;width:${w}px;height:${h}px`;
  const ta=document.createElement('textarea');
  applyTAS(ta,st); ta.placeholder='入力...';
  const del=document.createElement('button');
  del.className='bdel'; del.textContent='×';
  const rsz=document.createElement('div');
  rsz.className='brsz';
  box.appendChild(ta);box.appendChild(del);box.appendChild(rsz);
  ov.appendChild(box);
  const d={type:'text',el:box,page:curPage,style:st};
  els.push(d);
  del.addEventListener('mousedown',e=>{e.stopPropagation();removeEl(d);});
  setupDrag(box,d);
  setupRsz(rsz,box);
  ta.addEventListener('mousedown',e=>{e.stopPropagation();selEl2(d);});
  ta.addEventListener('focus',()=>{selEl2(d);syncTB(d);});
  selEl2(d); ta.focus(); updStatus();
}

// ══ 画像ボックス ══
let pendRect=null;
document.getElementById('fimg').onchange=e=>{
  const f=e.target.files[0]; if(!f){pendRect=null;return;}
  const rd=new FileReader();
  rd.onload=ev=>{
    const rc=pendRect||{x:40,y:40,w:200,h:150};
    pendRect=null;
    createIB(rc.x,rc.y,rc.w,rc.h,ev.target.result);
    setMode('normal');
  };
  rd.readAsDataURL(f);
  e.target.value='';
};

function createIB(x,y,w,h,src){
  const box=document.createElement('div');
  box.className='ib';
  box.style.cssText=`left:${x}px;top:${y}px;width:${w}px;height:${h}px`;
  const img=document.createElement('img'); img.src=src; img.draggable=false;
  const del=document.createElement('button'); del.className='bdel'; del.textContent='×';
  const rsz=document.createElement('div'); rsz.className='brsz';
  box.appendChild(img);box.appendChild(del);box.appendChild(rsz);
  ov.appendChild(box);
  const d={type:'image',el:box,page:curPage,src};
  els.push(d);
  del.addEventListener('mousedown',e=>{e.stopPropagation();removeEl(d);});
  setupDrag(box,d);
  setupRsz(rsz,box);
  box.addEventListener('mousedown',e=>{if(e.target!==del&&e.target!==rsz)selEl2(d);});
  selEl2(d); updStatus();
}

// ══ ドラッグ移動 ══
function setupDrag(box,d){
  box.addEventListener('mousedown',e=>{
    if(e.target.classList.contains('bdel')||e.target.classList.contains('brsz')||e.target.tagName==='TEXTAREA')return;
    if(mode!=='normal')return;
    e.stopPropagation(); selEl2(d);
    const ox=e.clientX-box.offsetLeft,oy=e.clientY-box.offsetTop;
    box.style.cursor='grabbing';
    const mm=ev=>{box.style.left=(ev.clientX-ox)+'px';box.style.top=(ev.clientY-oy)+'px';};
    const mu=()=>{box.style.cursor='';document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
    e.preventDefault();
  });
}

function setupRsz(rsz,box){
  rsz.addEventListener('mousedown',e=>{
    e.stopPropagation();e.preventDefault();
    const sx=e.clientX,sy=e.clientY,sw=box.offsetWidth,sh=box.offsetHeight;
    const mm=ev=>{box.style.width=Math.max(40,sw+ev.clientX-sx)+'px';box.style.height=Math.max(20,sh+ev.clientY-sy)+'px';};
    const mu=()=>{document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);};
    document.addEventListener('mousemove',mm);document.addEventListener('mouseup',mu);
  });
}

// ══ 選択・削除 ══
function selEl2(d){desel();selEl=d;d.el.classList.add('sel');if(d.type==='text')syncTB(d);}
function desel(){if(selEl)selEl.el.classList.remove('sel');selEl=null;}
function removeEl(d){d.el.remove();els=els.filter(e=>e!==d);if(selEl===d)selEl=null;updStatus();}

// ══ ツールバー同期 ══
function syncTB(d){
  const s=d.style;
  document.getElementById('tbsize').value=s.fontSize;
  document.getElementById('tbcolor').value=s.color;
  document.getElementById('tbfont').value=s.fontFamily;
  document.getElementById('tbbold').classList.toggle('on',s.bold);
  document.getElementById('tbunder').classList.toggle('on',s.underline);
  document.getElementById('tbshad').classList.toggle('on',s.shadow);
  document.getElementById('tbshadc').value=s.shadowColor;
  document.getElementById('tbshadb').value=s.shadowBlur;
}
function applyTB(){
  if(!selEl||selEl.type!=='text')return;
  const st=getStyle(); selEl.style=st;
  const ta=selEl.el.querySelector('textarea');
  if(ta)applyTAS(ta,st);
}
['tbsize','tbcolor','tbfont','tbshadc','tbshadb'].forEach(id=>{
  document.getElementById(id).addEventListener('input',applyTB);
  document.getElementById(id).addEventListener('change',applyTB);
});
['tbbold','tbunder','tbshad'].forEach(id=>{
  document.getElementById(id).onclick=function(){this.classList.toggle('on');applyTB();};
});

// ══ キーボード ══
document.addEventListener('keydown',e=>{
  const tag=document.activeElement.tagName;
  if(tag==='TEXTAREA'){if(e.key==='Escape'){document.activeElement.blur();setMode('normal');}return;}
  if(e.key==='Escape'){setMode('normal');return;}
  if((e.key==='t'||e.key==='T')&&pdfDoc){setMode('add-text');return;}
  if((e.key==='i'||e.key==='I')&&pdfDoc){document.getElementById('fimg').click();return;}
  if(e.key==='Delete'||e.key==='Backspace'){if(selEl)removeEl(selEl);return;}
  if(selEl&&['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    e.preventDefault();
    const s=e.shiftKey?10:1,box=selEl.el;
    if(e.key==='ArrowUp')   box.style.top =(parseFloat(box.style.top) -s)+'px';
    if(e.key==='ArrowDown') box.style.top =(parseFloat(box.style.top) +s)+'px';
    if(e.key==='ArrowLeft') box.style.left=(parseFloat(box.style.left)-s)+'px';
    if(e.key==='ArrowRight')box.style.left=(parseFloat(box.style.left)+s)+'px';
  }
});

// ══ PDF保存 ══
document.getElementById('bsave').onclick=async()=>{
  if(!pdfBytes)return;
  showLd(true);
  try{
    const{PDFDocument,rgb,StandardFonts}=PDFLib;
    const doc=await PDFDocument.load(pdfBytes);
    const pages=doc.getPages();
    const hr=h=>rgb(parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255);

    for(const d of els){
      const page=pages[d.page-1]; if(!page)continue;
      const{width,height}=page.getSize();
      const sx=width/canvas.width,sy=height/canvas.height;

      if(d.type==='text'){
        const ta=d.el.querySelector('textarea');
        const text=ta?ta.value.trim():''; if(!text)continue;
        const st=d.style;
        let font;
        try{
          if(st.fontFamily==='Times')font=await doc.embedFont(st.bold?StandardFonts.TimesRomanBold:StandardFonts.TimesRoman);
          else if(st.fontFamily==='Courier')font=await doc.embedFont(st.bold?StandardFonts.CourierBold:StandardFonts.Courier);
          else font=await doc.embedFont(st.bold?StandardFonts.HelveticaBold:StandardFonts.Helvetica);
        }catch{font=await doc.embedFont(StandardFonts.Helvetica);}
        const fs=st.fontSize*Math.min(sx,sy);
        const lh=fs*1.4;
        const bx=parseFloat(d.el.style.left)*sx;
        const by0=height-parseFloat(d.el.style.top)*sy-fs;
        text.split('\n').forEach((line,i)=>{
          if(!line)return;
          const ly=by0-i*lh;
          if(st.shadow)page.drawText(line,{x:bx+2*sx,y:ly-2*sy,size:fs,font,color:hr(st.shadowColor),opacity:.55});
          page.drawText(line,{x:bx,y:ly,size:fs,font,color:hr(st.color)});
          if(st.underline){const tw=font.widthOfTextAtSize(line,fs);page.drawLine({start:{x:bx,y:ly-1.5},end:{x:bx+tw,y:ly-1.5},thickness:1,color:hr(st.color)});}
        });
      }else if(d.type==='image'){
        try{
          const ex=parseFloat(d.el.style.left)*sx,ew=d.el.offsetWidth*sx,eh=d.el.offsetHeight*sy;
          const ey=height-parseFloat(d.el.style.top)*sy-eh;
          const b64=d.src.split(',')[1],mime=d.src.split(';')[0].split(':')[1];
          const bytes=Uint8Array.from(atob(b64),c=>c.charCodeAt(0));
          const emb=mime==='image/png'?await doc.embedPng(bytes):await doc.embedJpg(bytes);
          page.drawImage(emb,{x:ex,y:ey,width:ew,height:eh});
        }catch(err){console.warn('img',err);}
      }
    }
    const out=await doc.save();
    const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(new Blob([out],{type:'application/pdf'})),download:'written_'+Date.now()+'.pdf'});
    a.click();URL.revokeObjectURL(a.href);
  }finally{showLd(false);}
};

// ══ ユーティリティ ══
function showLd(v){document.getElementById('ld').style.display=v?'flex':'none';if(v)prog(0);}
function prog(p){document.getElementById('ldp').style.width=p+'%';}
function updStatus(){document.getElementById('sbe').textContent='ELEMENTS: '+els.filter(e=>e.page===curPage).length;}
</script>
